<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÚNKER TV</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 40px; overflow-x: hidden;
        }

        /* BOTÓN REFRESCAR FLOTANTE */
        .btn-refresh {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255,255,255,0.1); border: 1px solid #333;
            color: #fff; padding: 10px 20px; border-radius: 30px;
            cursor: pointer; font-size: 14px; z-index: 100;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .btn-refresh:hover { background: var(--main); color: #000; font-weight: bold; }

        h1 { text-align: center; color: var(--main); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; font-size: 40px; }

        .agenda-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card); border-radius: 20px; padding: 25px; 
            border: 1px solid #222; position: relative; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hora-badge { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--main); color: #000; padding: 4px 12px; 
            border-radius: 10px; font-weight: 900; font-size: 14px;
        }

        .canal-badge {
            position: absolute; top: 15px; right: 15px;
            color: #666; font-size: 12px; font-weight: bold;
        }

        /* CONTENEDOR DE LOGOS CON FONDO BLANCO */
        .vs-container { 
            display: flex; align-items: center; justify-content: center; 
            gap: 20px; margin: 30px 0 15px 0; min-height: 100px;
        }

        .img-box { 
            background: #ffffff; width: 90px; height: 90px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden;
            border: 4px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .img-box img { width: 75%; height: 75%; object-fit: contain; }

        .vs-text { font-weight: 900; color: #444; font-size: 18px; }

        .nombres { text-align: center; margin-top: 10px; }
        .nombres h3 { margin: 5px 0; font-size: 20px; letter-spacing: 1px; }
        
        .btn-link {
            display: block; width: 100%; background: #222; color: var(--main);
            text-decoration: none; text-align: center; padding: 12px;
            border-radius: 12px; margin-top: 15px; font-weight: bold;
            border: 1px solid #333; transition: 0.2s;
        }
        .btn-link:hover { background: var(--main); color: #000; }

        /* MODO LOGO ÚNICO (Para Ciclismo, F1...) */
        .single-mode .img-box { width: 120px; height: 120px; border-color: var(--main); }
        .single-mode .vs-text { display: none; }
    </style>
</head>
<body>

    <button class="btn-refresh" onclick="cargarAgenda()">🔄 REFRESCAR</button>

    <h1>BÚNKER TV</h1>

    <div id="agenda" class="agenda-container">
        </div>

<script>
    // URL de tu archivo agenda.json o el que uses en GitHub (asegúrate de que sea el "raw")
    const URL_AGENDA = 'agenda.json'; 

    async function cargarAgenda() {
        const container = document.getElementById('agenda');
        container.innerHTML = '<p style="text-align:center; color:#555;">Actualizando búnker...</p>';

        try {
            const resp = await fetch(URL_AGENDA + '?t=' + Date.now()); // t=Date.now evita el caché
            const data = await resp.json();
            
            // Si los datos vienen en Base64 desde el mando pepe
            const agendaDecodificada = JSON.parse(decodeURIComponent(escape(window.atob(data.content || data))));
            
            renderizar(agendaDecodificada);
        } catch (e) {
            container.innerHTML = '<p style="text-align:center; color:red;">Error al cargar la agenda de GitHub</p>';
        }
    }

    function renderizar(eventos) {
        const container = document.getElementById('agenda');
        container.innerHTML = '';

        eventos.forEach(ev => {
            const isSingle = !ev.e2 || ev.e2 === "";
            const card = document.createElement('div');
            card.className = `card ${isSingle ? 'single-mode' : ''}`;
            
            card.innerHTML = `
                <div class="hora-badge">${ev.hora}</div>
                <div class="canal-badge">${ev.canal}</div>
                
                <div class="vs-container">
                    <div class="img-box">
                        <img src="assets/equipos/${ev.logo1}" onerror="this.src='assets/deporte/${ev.logo1.split('/').pop()}'; this.onerror=function(){this.src='assets/default.png'};">
                    </div>
                    
                    ${!isSingle ? `<div class="vs-text">VS</div>` : ''}
                    
                    ${!isSingle ? `
                        <div class="img-box">
                            <img src="assets/equipos/${ev.logo2}" onerror="this.src='assets/default.png'">
                        </div>
                    ` : ''}
                </div>

                <div class="nombres">
                    <h3>${ev.e1} ${ev.e2 ? ' vs ' + ev.e2 : ''}</h3>
                </div>

                ${ev.links.map((link, index) => `
                    <a href="acestream://${link}" class="btn-link">OPCIÓN ${index + 1}</a>
                `).join('')}
            `;
            container.appendChild(card);
        });
    }

    // Carga inicial
    cargarAgenda();
</script>
</body>
</html>
