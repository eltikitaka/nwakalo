<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV SUPREME</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #111; --white-card: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body { 
            height: 100vh; width: 100vw; background: var(--bg); 
            color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; padding: 10px 20px;
        }

        h1 { 
            color: var(--main); text-align: center; font-size: 26px; 
            letter-spacing: 12px; margin: 10px 0; text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0,255,136,0.3);
        }

        /* REJILLA 3X3 REAL - ADAPTADA A PANTALLA TV */
        #agenda { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 28vh); 
            gap: 15px; width: 100%; flex-grow: 1;
        }

        /* CUADROS Y ENFOQUE MANDO */
        .card { 
            background: var(--card); border-radius: 15px; border: 2px solid #222;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; padding: 10px;
            transition: all 0.25s ease; text-decoration: none; color: inherit;
        }

        .card.placeholder { 
            background: var(--white-card); 
            border: 1px dashed rgba(255,255,255,0.2);
        }

        /* CUANDO PASAS CON EL MANDO */
        .card:focus { 
            border-color: var(--main); 
            background: rgba(0, 255, 136, 0.12);
            transform: scale(1.04);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            z-index: 10;
        }

        .hora-badge { 
            position: absolute; top: 10px; left: 12px; 
            background: var(--main); color: #000; padding: 2px 10px; 
            border-radius: 6px; font-weight: 900; font-size: 11px;
        }

        .vs-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        
        /* LOGOS CIRCULARES */
        .img-box { 
            background: #fff; width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; border: 2px solid #333;
        }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }

        .nombres { text-align: center; width: 100%; }
        .nombres h3 { font-size: 17px; margin: 4px 0; color: #fff; font-weight: 600; line-height: 1.2; }
        .canal-txt { color: #777; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-btn {
            width: 85%; background: #1a1a1a; color: var(--main); 
            padding: 8px; border-radius: 10px; font-weight: 800; 
            font-size: 12px; border: 1px solid #333; text-transform: uppercase; margin-top: 10px;
        }
        .locked .status-btn { color: #444; border-color: #1a1a1a; background: #080808; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>
