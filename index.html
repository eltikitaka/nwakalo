<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - TRIPLE LOGIC</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; width: 100vw; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        body::-webkit-scrollbar { width: 0px; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 28vh; gap: 15px; width: 100%; }
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 15px; transition: 0.2s; text-decoration: none; color: inherit; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }
        .hora-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 2px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; }
        .img-box { background: #fff; width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .single-logo .img-box { width: 85px; height: 85px; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        .nombres { text-align: center; width: 100%; }
        .nombres h3 { margin: 5px 0; font-size: 17px; color: #fff; font-weight: bold; }
        .canal-txt { color: #666; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-btn { width: 80%; background: #222; color: var(--main); padding: 8px; border-radius: 10px; font-weight: bold; font-size: 11px; border: 1px solid #333; text-transform: uppercase; margin-top: 8px; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const BASE = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/assets/';
    const URL_JSON = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/eventos.json';

    function motorLogos(imgElement, nombre) {
        if (!nombre) return;
        
        // Limpiamos el nombre para los partidos (minúsculas y sin espacios)
        const limpio = nombre.split('/').pop().toLowerCase().replace(/\s+/g, '');
        const file = limpio.includes('.') ? limpio : limpio + '.png';
        const original = nombre.split('/').pop(); // Por si el especial usa Mayúsculas

        // Lista de intentos priorizada
        let intentos = [
            BASE + 'equipos/' + file,    // 1. Partido (limpio)
            BASE + 'deporte/' + original, // 2. Especial (original)
            BASE + 'deporte/' + file,     // 3. Especial (limpio)
            BASE + original,              // 4. Raíz (original)
            BASE + 'equipos/' + original  // 5. Partido (original)
        ];

        let i = 0;
        imgElement.src = intentos[i];

        imgElement.onerror = function() {
            i++;
            if (i < intentos.length) {
                this.src = intentos[i];
            } else {
                this.src = BASE + 'default.png';
                this.onerror = null;
            }
        };
    }

    async function cargar() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(URL_JSON + '?v=' + Date.now());
            let raw = await r.text();
            raw = raw.replace(/["\s]/g, '').trim();
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(raw))));

            container.innerHTML = '';
            const ahora = new Date();
            let count = 0;

            evs.forEach((ev) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                if ((ahora - fEv) / 3600000 > 3) return; 

                count++;
                const ok = (fEv - ahora) / 60000 <= 15;
                const individual = !ev.e2 || ev.e2.trim() === "" || ev.e2 === "undefined";

                const card = document.createElement(ok ? 'a' : 'div');
                card.className = `card ${individual ? 'single-logo' : ''}`;
                if(ok) card.href = `acestream://${ev.link}`;
                card.tabIndex = count;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img id="la_${count}"></div>
                        ${!individual ? `<b style="color:var(--main); margin:0 10px;">VS</b><div class="img-box"><img id="lb_${count}"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${!individual ? ' vs ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${ok ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
                
                motorLogos(document.getElementById(`la_${count}`), ev.logo1);
                if(!individual) motorLogos(document.getElementById(`lb_${count}`), ev.logo2);
            });

            if(container.firstChild) container.firstChild.focus();
        } catch (e) { console.log("Error"); }
    }

    cargar();
    setInterval(cargar, 300000);
</script>
</body>
</html>
