<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV - 9 GRID FINAL</title>
    <style>
        /* --- ESTILO BASE --- */
        body { 
            background: #0a0a0a; color: #ffffff; font-family: 'Arial Black', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            user-select: none; height: 100vh; display: flex; flex-direction: column;
        }
        
        header { height: 8vh; display: flex; align-items: center; padding-left: 20px; flex-shrink: 0; }
        h1 { font-size: 2.5vh; margin: 0; font-style: italic; letter-spacing: -1px; }
        .logo-tv { border: 2px solid #ffffff; padding: 0 8px; margin-left: 10px; }

        /* --- SEGURIDAD --- */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center;
        }

        /* --- CONTENIDO PRINCIPAL (3X3) --- */
        #app-principal { display: none; height: 100vh; }

        .grid-dazn { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: 28vh; 
            gap: 1.5vh;
            padding: 0 20px 20px 20px;
            height: 92vh;
            overflow-y: auto;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        /* --- TARJETA --- */
        .tarjeta-dazn {
            background: #151515; border: 4px solid transparent; 
            display: flex; flex-direction: column;
            text-decoration: none; color: white; transition: all 0.2s;
            outline: none; overflow: hidden; box-sizing: border-box;
        }

        .tarjeta-dazn:focus { 
            border-color: #ffffff; background: #222;
            transform: scale(1.02); z-index: 10;
        }

        /* TARJETA PENDIENTE (NAVEGABLE) */
        .tarjeta-pendiente {
            border: 2px dashed #222; display: flex; justify-content: center; 
            align-items: center; color: #444; font-size: 1.6vh; text-align: center;
        }

        .tarjeta-pendiente:focus {
            border: 4px solid #444; background: #111; color: #888; transform: scale(1.02);
        }

        /* CONTENEDORES INTERNOS */
        .img-contenedor { 
            height: 55%; background: #1a1a1a; display: flex; 
            justify-content: center; align-items: center; gap: 10px; position: relative; 
        }
        .img-contenedor img { max-width: 25%; max-height: 70%; object-fit: contain; }
        
        .live-tag { 
            position: absolute; top: 5px; left: 5px; background: #e50914; 
            padding: 2px 6px; font-size: 1.2vh; font-weight: bold;
        }

        .info-contenedor { 
            padding: 10px; flex-grow: 1; display: flex; 
            flex-direction: column; justify-content: center; text-align: center;
        }
        .partido-nombres { font-size: 1.8vh; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .opcion-n { color: #ffff00; font-size: 1.4vh; font-weight: bold; }
        .detalles { font-size: 1.4vh; color: #aaa; margin-top: 3px; }

        .grid-dazn::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <h1 style="color:#e50914;">ACCESO RESTRINGIDO</h1>
        <div id="mi-id-visual" style="color:yellow; margin-top:20px; font-size:20px;"></div>
    </div>

    <div id="app-principal">
        <header>
            <h1>NWAKALO<span class="logo-tv">TV</span></h1>
        </header>
        <div id="contenedor-grid" class="grid-dazn"></div>
    </div>

    <script>
        const RUTA_LOGOS = "assets/equipos/";

        // FUNCIÓN PARA CERRAR LA APP (BOTÓN ATRÁS)
        window.addEventListener('keydown', function(event) {
            // Códigos 8 (Backspace), 27 (Esc) o 10009 (Atrás en Smart TVs)
            if (event.key === "Backspace" || event.key === "Escape" || event.keyCode === 10009) {
                event.preventDefault();
                if (confirm("¿Deseas salir de NWAKALO TV?")) {
                    window.close(); // Intenta cerrar la pestaña/app
                    // En algunos dispositivos se usa el historial para salir
                    window.history.back(); 
                }
            }
        });

        async function verificarAcceso() {
            let idPropio = localStorage.getItem('nwa_device_id') || 'NWA-' + Math.random().toString(36).substring(2, 9).toUpperCase();
            localStorage.setItem('nwa_device_id', idPropio);

            try {
                const res = await fetch('autorizados.json?t=' + Date.now());
                const autorizados = await res.json();
                if (autorizados.includes(idPropio)) {
                    document.getElementById('app-principal').style.display = 'block';
                    await cargarCartelera();
                } else {
                    document.getElementById('pantalla-bloqueo').style.display = 'flex';
                    document.getElementById('mi-id-visual').innerText = idPropio;
                }
            } catch (e) { console.error(e); }
        }

        async function cargarCartelera() {
            try {
                const res = await fetch('eventos.json?t=' + Date.now());
                const partidos = await res.json();
                const grid = document.getElementById('contenedor-grid');
                grid.innerHTML = "";
                let totalItems = 0;

                if (partidos) {
                    partidos.forEach((p) => {
                        p.links.forEach((id_ace, index) => {
                            totalItems++;
                            const card = document.createElement('a');
                            card.className = 'tarjeta-dazn';
                            card.href = `acestream://${id_ace}`;
                            card.tabIndex = 0;
                            card.innerHTML = `
                                <div class="img-contenedor">
                                    <div class="live-tag">LIVE</div>
                                    <img src="${RUTA_LOGOS}${p.logo1}" onerror="this.src='assets/default.png'">
                                    <img src="${RUTA_LOGOS}${p.logo2}" onerror="this.src='assets/default.png'">
                                </div>
                                <div class="info-contenedor">
                                    <div class="partido-nombres">${p.e1} vs ${p.e2}</div>
                                    <div class="opcion-n">OPCIÓN ${index + 1}</div>
                                    <div class="detalles">${p.hora}</div>
                                </div>
                            `;
                            grid.appendChild(card);
                        });
                    });
                }

                while (totalItems < 9) {
                    const empty = document.createElement('div');
                    empty.className = 'tarjeta-dazn tarjeta-pendiente';
                    empty.tabIndex = 0;
                    empty.innerHTML = "<div>PENDIENTE DE<br>PROGRAMAR</div>";
                    // Evitar que haga nada al pulsar en vacíos
                    empty.onclick = (e) => e.preventDefault();
                    grid.appendChild(empty);
                    totalItems++;
                }

                const first = document.querySelector('.tarjeta-dazn');
                if (first) first.focus();

            } catch (e) { console.error(e); }
        }

        document.addEventListener('focusin', (e) => {
            if (e.target.classList.contains('tarjeta-dazn')) {
                e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        verificarAcceso();
    </script>
</body>
</html>
