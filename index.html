<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV - PREMIUM GRID</title>
    <style>
        :root { 
            --main: #00ff88; --bg: #0a0a0a; 
            --liga: #00ff88; --champions: #007bff; --motor: #ffa502; --default: #444;
        }
        body { background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; user-select: none; }
        header { height: 8vh; display: flex; align-items: center; padding-left: 20px; border-bottom: 1px solid #222; flex-shrink: 0; }
        h1 { font-size: 2.5vh; margin: 0; font-style: italic; }
        .logo-tv { border: 2px solid var(--main); color: var(--main); padding: 0 8px; margin-left: 10px; font-style: normal; }
        
        #app-principal { display: none; height: 100vh; }
        .grid-dazn { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 28vh; gap: 1.5vh; padding: 20px; height: 92vh; overflow-y: auto; box-sizing: border-box; }

        /* TARJETA PREMIUM */
        .tarjeta-dazn { 
            background: #121212; border: 3px solid #222; 
            display: flex; flex-direction: column; text-decoration: none; 
            color: white; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            outline: none; overflow: hidden; position: relative; border-radius: 8px;
        }

        /* EFECTO BRILLO AL HACER FOCO */
        .tarjeta-dazn:focus { 
            transform: scale(1.04); z-index: 10; box-shadow: 0 0 25px rgba(0,0,0,0.8);
            border-color: var(--border-color, var(--main));
        }
        .tarjeta-dazn:focus::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shine 1.2s;
        }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }

        /* COLORES DE BORDES POR LIGA */
        .border-liga { --border-color: #00ff88; }
        .border-champions { --border-color: #007bff; }
        .border-motor { --border-color: #ffa502; }

        .img-contenedor { height: 55%; background: #000; display: flex; justify-content: center; align-items: center; gap: 15px; position: relative; }
        .img-contenedor img { max-width: 25%; max-height: 70%; object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        
        /* TAGS DINÁMICOS */
        .tag { position: absolute; top: 10px; left: 10px; padding: 4px 10px; font-size: 1vh; font-weight: bold; border-radius: 3px; text-transform: uppercase; }
        .tag-live { background: #e50914; color: #fff; animation: pulse 2s infinite; }
        .tag-previa { background: #ffbc00; color: #000; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .info-contenedor { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; text-align: center; background: linear-gradient(to bottom, #151515, #0a0a0a); }
        .partido-nombres { font-size: 1.8vh; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 5px; color: #eee; }
        .opcion-n { color: var(--border-color, var(--main)); font-size: 1.3vh; font-weight: bold; letter-spacing: 1px; }
        .detalles { font-size: 1.3vh; color: #777; margin-top: 3px; }

        .tarjeta-pendiente { border: 2px dashed #222; opacity: 0.5; justify-content: center; align-items: center; color: #444; }
        .grid-dazn::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app-principal">
        <header><h1>NWAKALO<span class="logo-tv">TV</span></h1></header>
        <div id="contenedor-grid" class="grid-dazn"></div>
    </div>

    <script>
        const HORAS_CADUCIDAD = 3;

        async function verificarAcceso() {
            let id = localStorage.getItem('nwa_device_id') || 'NWA-' + Math.random().toString(36).substring(2, 9).toUpperCase();
            localStorage.setItem('nwa_device_id', id);
            try {
                const r = await fetch('autorizados.json?t=' + Date.now());
                const aut = await r.json();
                if (aut.includes(id)) {
                    document.getElementById('app-principal').style.display = 'block';
                    cargarCartelera();
                } else { document.body.innerHTML = `<h1 style="text-align:center;margin-top:20vh;">ID: ${id}<br>NO AUTORIZADO</h1>`; }
            } catch (e) { console.error(e); }
        }

        async function cargarCartelera() {
            try {
                const r = await fetch('eventos.json?t=' + Date.now());
                const data = await r.json();
                const grid = document.getElementById('contenedor-grid');
                grid.innerHTML = "";
                
                const ahora = new Date();
                let count = 0;

                const activos = data.filter(ev => {
                    const inicio = new Date(`${ev.fecha}T${ev.hora}`);
                    return ahora < new Date(inicio.getTime() + (HORAS_CADUCIDAD * 3600000));
                }).sort((a,b) => (a.fecha+a.hora).localeCompare(b.fecha+b.hora));

                activos.forEach(p => {
                    p.links.forEach((link, i) => {
                        count++;
                        const card = document.createElement('a');
                        card.href = `acestream://${link}`;
                        card.className = 'tarjeta-dazn';
                        
                        // Lógica de color por liga
                        if(p.logo1.includes('deporte/f1') || p.logo1.includes('deporte/MotoGP')) card.classList.add('border-motor');
                        else if(p.canal.toLowerCase().includes('liga')) card.classList.add('border-liga');
                        else if(p.canal.toLowerCase().includes('champions')) card.classList.add('border-champions');

                        // Lógica de Previa vs Live
                        const inicio = new Date(`${p.fecha}T${p.hora}`);
                        const diffMin = (inicio - ahora) / 60000;
                        const tagHTML = (diffMin > 0 && diffMin < 30) 
                            ? `<div class="tag tag-previa">PREVIA</div>` 
                            : `<div class="tag tag-live">LIVE</div>`;

                        const base = p.logo1.includes('deporte/') ? 'assets/' : 'assets/equipos/';
                        
                        card.innerHTML = `
                            <div class="img-contenedor">
                                ${tagHTML}
                                <img src="${base}${p.logo1}" onerror="this.src='assets/default.png'">
                                <img src="${base}${p.logo2}" onerror="this.src='assets/default.png'">
                            </div>
                            <div class="info-contenedor">
                                <div class="partido-nombres">${p.e1} vs ${p.e2}</div>
                                <div class="opcion-n">OPCIÓN ${i+1} • ${p.canal}</div>
                                <div class="detalles">${p.hora} | ${p.fecha.split('-').reverse().join('/')}</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                });

                while(count < 9) {
                    const e = document.createElement('div');
                    e.className = 'tarjeta-dazn tarjeta-pendiente';
                    e.innerHTML = "PRÓXIMAMENTE";
                    grid.appendChild(e);
                    count++;
                }
                document.querySelector('.tarjeta-dazn').focus();
            } catch(e) { console.log(e); }
        }

        document.addEventListener('focusin', (e) => {
            if (e.target.classList.contains('tarjeta-dazn')) e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        verificarAcceso();
    </script>
</body>
</html>
