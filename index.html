<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - DISEÑO FINAL CON LOGOS</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            min-height: 100vh; width: 100vw; background: var(--bg); 
            color: #fff; font-family: sans-serif; display: flex; 
            flex-direction: column; padding: 15px; overflow-y: auto; 
        }

        /* Scroll invisible para TV */
        body::-webkit-scrollbar { width: 0px; }

        h1 { 
            color: var(--main); text-align: center; font-size: 28px; 
            letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase;
            position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0;
        }

        #agenda { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            /* Filas adaptativas para mantener el 3x3 visual */
            grid-auto-rows: 28vh; 
            gap: 15px; width: 100%;
        }

        .card { 
            background: var(--card); border-radius: 20px; border: 2px solid #222;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; padding: 15px;
            transition: 0.2s; text-decoration: none; color: inherit;
        }

        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }

        .hora-badge { 
            position: absolute; top: 10px; left: 10px; 
            background: var(--main); color: #000; padding: 2px 10px; 
            border-radius: 6px; font-weight: bold; font-size: 12px;
        }

        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; }
        
        .img-box { 
            background: #fff; width: 70px; height: 70px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; border: 2px solid #333;
        }
        /* Logo único (F1, MotoGP...) más grande y centrado */
        .single-logo .img-box { width: 85px; height: 85px; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }

        .nombres { text-align: center; width: 100%; }
        .nombres h3 { margin: 5px 0; font-size: 17px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000; line-height: 1.2; }
        .canal-txt { color: #666; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-btn { 
            width: 80%; background: #222; color: var(--main); 
            padding: 8px; border-radius: 10px; font-weight: bold; 
            font-size: 12px; border: 1px solid #333; text-transform: uppercase; margin-top: 8px;
        }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    // RUTA BASE ABSOLUTA DE GITHUB (PARA EVITAR FALLOS DE TV)
    const GITHUB_BASE = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/assets/';
    const URL_JSON = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/eventos.json';

    // RASTREADOR INTELIGENTE DE LOGOS
    function tratarLogo(imgElement, nombreLogo) {
        if (!nombreLogo) return;
        const archivo = nombreLogo.split('/').pop(); // Solo el nombre del archivo

        // Intento 1: assets/equipos/
        imgElement.src = GITHUB_BASE + 'equipos/' + archivo;

        imgElement.onerror = function() {
            // Intento 2: assets/deporte/ (MotoGP, F1...)
            if (this.src.includes('equipos')) {
                this.src = GITHUB_BASE + 'deporte/' + archivo;
            } 
            // Intento 3:assets/
            else if (this.src.includes('deporte')) {
                this.src = GITHUB_BASE + archivo;
            }
            // Final: Default
            else {
                this.src = GITHUB_BASE + 'default.png';
                this.onerror = null;
            }
        };
    }

    async function cargar() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(URL_JSON + '?v=' + Date.now());
            let data = await r.text();
            data = data.replace(/["\s]/g, '').trim();
            
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(data))));

            container.innerHTML = '';
            const ahora = new Date();
            let count = 0;

            evs.forEach((ev, index) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                if ((ahora - fEv) / 3600000 > 3) return; 

                count++;
                const dif = (fEv - ahora) / 60000;
                const ok = dif <= 15;
                const esIndividual = !ev.e2 || ev.e2.trim() === "" || ev.e2 === "undefined";

                // Limpieza básica de ruta (por si MandoPepe envía la ruta entera)
                let img1 = ev.logo1.split('/').pop().includes('.') ? ev.logo1.split('/').pop() : ev.logo1.split('/').pop() + '.png';
                let img2 = !esIndividual ? (ev.logo2.split('/').pop().includes('.') ? ev.logo2.split('/').pop() : ev.logo2.split('/').pop() + '.png') : '';

                const card = document.createElement(ok ? 'a' : 'div');
                card.className = `card ${esIndividual ? 'single-logo' : ''}`;
                if(ok) card.href = `acestream://${ev.link}`;
                card.tabIndex = count;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img id="l1_${count}" onerror="this.src='${GITHUB_BASE}default.png'"></div>
                        ${!esIndividual ? `
                            <b style="color:var(--main); margin: 0 10px; font-size: 14px;">VS</b>
                            <div class="img-box"><img id="l2_${count}" onerror="this.src='${GITHUB_BASE}default.png'"></div>
                        ` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${!esIndividual ? ' vs ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${ok ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
                
                // Ejecutamos el rastreador de logos
                tratarLogo(document.getElementById(`l1_${count}`), img1);
                if(!esIndividual) tratarLogo(document.getElementById(`l2_${count}`), img2);
            });

            // Foco inicial
            if(container.firstChild) container.firstChild.focus();

        } catch (e) { console.log("Error sincronizando..."); }
    }

    cargar();
    setInterval(cargar, 300000);
</script>
</body>
</html>
