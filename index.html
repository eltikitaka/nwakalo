<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV - 9 GRID NAVEGABLE</title>
    <style>
        /* --- ESTILO BASE --- */
        body { 
            background: #0a0a0a; color: #ffffff; font-family: 'Arial Black', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header { height: 8vh; display: flex; align-items: center; padding-left: 20px; flex-shrink: 0; }
        h1 { font-size: 2.5vh; margin: 0; font-style: italic; letter-spacing: -1px; }
        .logo-tv { border: 2px solid #ffffff; padding: 0 8px; margin-left: 10px; }

        /* --- PANTALLA DE SEGURIDAD --- */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center;
        }

        /* --- CONTENIDO PRINCIPAL (FORZAR 3X3) --- */
        #app-principal { display: none; height: 100vh; }

        .grid-dazn { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: 28vh; /* Todas las filas miden esto */
            gap: 1.5vh;
            padding: 0 20px 20px 20px;
            height: 92vh;
            overflow-y: auto;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        /* --- TARJETA OPTIMIZADA --- */
        .tarjeta-dazn {
            background: #151515; 
            border: 4px solid transparent; 
            display: flex; 
            flex-direction: column;
            text-decoration: none; 
            color: white; 
            transition: all 0.2s;
            outline: none;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* FOCO EN TARJETAS REALES */
        .tarjeta-dazn:focus { 
            border-color: #ffffff; 
            background: #222;
            transform: scale(1.02);
            z-index: 10;
        }

        /* TARJETA PENDIENTE (AHORA NAVEGABLE) */
        .tarjeta-pendiente {
            border: 2px dashed #222;
            display: flex; justify-content: center; align-items: center;
            color: #444; font-size: 1.6vh; text-align: center;
            cursor: default;
        }

        /* FOCO EN TARJETAS VACÍAS */
        .tarjeta-pendiente:focus {
            border: 4px solid #444; /* Borde más suave para indicar que está vacío */
            background: #111;
            color: #888;
            transform: scale(1.02);
        }

        /* CONTENEDORES INTERNOS */
        .img-contenedor { 
            height: 55%; background: #1a1a1a; display: flex; 
            justify-content: center; align-items: center; gap: 10px; position: relative; 
        }
        .img-contenedor img { max-width: 25%; max-height: 70%; object-fit: contain; }
        
        .live-tag { 
            position: absolute; top: 5px; left: 5px; background: #e50914; 
            padding: 2px 6px; font-size: 1.2vh; font-weight: bold;
        }

        .info-contenedor { 
            padding: 10px; flex-grow: 1; display: flex; 
            flex-direction: column; justify-content: center; text-align: center;
        }
        .partido-nombres { font-size: 1.8vh; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .opcion-n { color: #ffff00; font-size: 1.4vh; font-weight: bold; }
        .detalles { font-size: 1.4vh; color: #aaa; margin-top: 3px; }

        /* Ocultar scrollbar */
        .grid-dazn::-webkit-scrollbar { display: none; }
    </style>
</head>
