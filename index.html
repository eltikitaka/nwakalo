<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - ULTIMATE EDITION</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; background: var(--bg); color: #fff; 
            font-family: Arial, sans-serif; padding: 10px; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        h1 { 
            color: var(--main); text-align: center; font-size: 18px; 
            letter-spacing: 10px; margin-bottom: 10px; text-transform: uppercase; 
        }

        #agenda { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: calc(33.33vh - 22px); 
            gap: 10px; width: 100%; flex-grow: 1;
        }
        
        .card { 
            background: var(--card); border-radius: 15px; border: 2px solid #222; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; position: relative; padding: 12px 8px; 
            text-decoration: none; color: inherit; outline: none; transition: 0.1s;
        }

        .card:focus { 
            border-color: var(--main); background: #1a1a1a; 
            transform: scale(1.03); z-index: 10;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }
        
        .card.blocked { opacity: 0.4; cursor: default; }
        .card.empty { border: 2px dashed #222; background: transparent; opacity: 0.1; pointer-events: none; }

        .fecha-badge { 
            position: absolute; top: 8px; left: 8px; 
            background: var(--main); color: #000; 
            padding: 1px 6px; border-radius: 4px; 
            font-weight: bold; font-size: 10px; 
        }

        .vs-container { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; gap: 10px; flex-grow: 1;
        }
        
        .img-box { 
            background: #fff; width: 85px; height: 85px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; border: 2px solid #333;
            flex-shrink: 1;
        }
        .img-box img { width: 75%; height: 75%; object-fit: contain; }
        
        .nombres-box { 
            width: 100%; height: 20px; margin: 5px 0;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        
        .nombres-box h3 { 
            font-size: 12px; color: #ffffff; text-transform: uppercase; 
            white-space: nowrap; text-align: center; width: 100%;
            display: block; text-overflow: ellipsis; overflow: hidden;
        }

        .status-btn { 
            width: 85%; padding: 5px; border-radius: 8px; font-size: 9px; 
            border: 1px solid var(--main); text-transform: uppercase; 
            font-weight: bold; text-align: center; color: var(--main);
        }
        .card:focus .status-btn { background: var(--main); color: #000; }

        /* Capa de bloqueo sobre el diseño original */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h1 style="font-size: 24px;">DISPOSITIVO NO ACTIVADO</h1>
        <p style="margin: 20px 0; opacity: 0.7;">Envía este código al administrador:</p>
        <div style="border: 2px dashed var(--main); padding: 20px; border-radius: 10px;">
            <span id="display-code" style="font-size: 32px; font-weight: bold; color: var(--main); letter-spacing: 3px;"></span>
        </div>
        <p style="margin-top: 20px; font-size: 12px; color: var(--main);">Verificando estado...</p>
    </div>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';

    // --- LÓGICA DE SEGURIDAD ---
    let miID = localStorage.getItem('nw_device_id');
    if (!miID) {
        miID = "NW-" + Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('nw_device_id', miID);
    }
    document.getElementById('display-code').innerText = miID;

    async function validarAcceso() {
        try {
            const res = await fetch(REPO + 'autorizado.json?v=' + Date.now());
            const data = await res.json();
            if (data.usuarios.includes(miID)) {
                document.getElementById('bloqueo').style.display = 'none';
                actualizarTV();
            } else {
                document.getElementById('bloqueo').style.display = 'flex';
            }
        } catch (e) {
            console.error("Error seguridad");
        }
    }
    // ----------------------------

    function resolverRuta(logo) {
        if (!logo || logo === "" || logo === "undefined") return ASSETS + 'default.png';
        return logo.includes('/') ? ASSETS + 'equipos/' + logo.trim() : ASSETS + 'deporte/' + (logo.includes('.') ? logo : logo + '.png');
    }

    async function actualizarTV() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const b64 = text.trim().replace(/["\s]/g, '');
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
            
            evs.sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));
            container.innerHTML = '';
            const ahora = new Date();
            let count = 0;

            evs.forEach((ev) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(ev.fecha); 
                fEv.setHours(h, m, 0);
                
                if ((ahora - fEv) / 3600000 > 3) return; 

                const estaBloqueado = (fEv - ahora) / 60000 > 15;
                count++;

                let linkID = ev.link.toString().replace('acestream://', '').trim();

                const card = document.createElement(estaBloqueado ? 'div' : 'a');
                card.className = `card ${estaBloqueado ? 'blocked' : ''}`;
                if(!estaBloqueado) card.href = "acestream://" + linkID;
                card.tabIndex = count;

                const tieneRival = ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined";
                const textoFinal = tieneRival ? ev.e1 + " - " + ev.e2 : ev.e1;

                card.innerHTML = `
                    <div class="fecha-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img src="${resolverRuta(ev.logo1)}" onerror="this.src='${ASSETS}default.png'"></div>
                        ${tieneRival ? `<b style="color:var(--main); font-size: 14px;">VS</b><div class="img-box"><img src="${resolverRuta(ev.logo2)}" onerror="this.src='${ASSETS}default.png'"></div>` : ''}
                    </div>
                    <div class="nombres-box">
                        <h3>${textoFinal}</h3>
                    </div>
                    <div class="status-btn">${estaBloqueado ? 'BLOQUEADO' : 'VER AHORA'}</div>
                `;
                container.appendChild(card);
            });

            while (count < 9) {
                count++;
                const empty = document.createElement('div');
                empty.className = 'card empty';
                empty.innerHTML = '<span style="color:#222; font-size:9px;">SIN EVENTO</span>';
                container.appendChild(empty);
            }

            const first = container.querySelector('.card:not(.empty)');
            if(first) first.focus();

        } catch (e) { console.error("Error cargando JSON"); }
    }

    document.addEventListener('keydown', (e) => {
        const current = document.activeElement;
        if (!current || !current.classList.contains('card')) return;
        const cards = Array.from(document.querySelectorAll('.card'));
        const index = cards.indexOf(current);
        let next = index;
        
        switch(e.key) {
            case 'ArrowRight': if ((index + 1) % 3 !== 0) next = index + 1; break;
            case 'ArrowLeft': if (index % 3 !== 0) next = index - 1; break;
            case 'ArrowDown': next = index + 3; break;
            case 'ArrowUp': next = index - 3; break;
            case 'Enter': current.click(); break;
        }
        
        if (cards[next] && !cards[next].classList.contains('empty')) {
            cards[next].focus();
            e.preventDefault();
        }
    });

    // Iniciar con validación
    validarAcceso();
    setInterval(validarAcceso, 30000); // Revisa cada 30 seg por si lo autorizas en vivo
</script>
</body>
</html>
