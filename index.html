<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - RESCATE</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 15px; min-height: 240px; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }
        .fecha-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 3px 10px; border-radius: 6px; font-weight: bold; font-size: 11px; }
        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; gap: 12px; }
        .img-box { background: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        .nombres { text-align: center; width: 100%; }
        .nombres h3 { margin: 5px 0; font-size: 15px; color: #fff; text-transform: uppercase; }
        .canal-txt { color: var(--main); font-size: 11px; font-weight: bold; }
        .status-btn { width: 90%; background: #222; color: var(--main); padding: 8px; border-radius: 10px; font-size: 10px; border: 1px solid var(--main); text-transform: uppercase; margin-top: 10px; text-align: center; }
        .error-msg { grid-column: 1/-1; color: #ff4444; background: rgba(255,0,0,0.1); padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #ff4444; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';

    function resolverRuta(logo) {
        if (!logo || logo === "undefined" || logo === "") return ASSETS + 'default.png';
        const limpio = logo.trim();
        // Si el mando mando la carpeta (laliga/madrid.png)
        if (limpio.includes('/')) return ASSETS + 'equipos/' + limpio;
        // Por defecto carpeta deporte
        return ASSETS + 'deporte/' + (limpio.includes('.') ? limpio : limpio + '.png');
    }

    async function actualizarTV() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            let text = await r.text();
            
            // Limpieza extrema del Base64
            const b64 = text.trim().replace(/["\s]/g, '');
            
            let evs;
            try {
                evs = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
            } catch(e) {
                container.innerHTML = `<div class="error-msg">ERROR EN EL FORMATO DE DATOS (BASE64)<br><small>${e.message}</small></div>`;
                return;
            }

            container.innerHTML = '';

            evs.forEach((ev, i) => {
                const tieneRival = ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined";
                const card = document.createElement('div');
                card.className = 'card';
                card.tabIndex = i + 1;

                card.innerHTML = `
                    <div class="fecha-badge">${ev.fecha || ''} | ${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo1)}" onerror="this.src='${ASSETS}default.png'">
                        </div>
                        ${tieneRival ? `
                        <b style="color:var(--main)">VS</b>
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo2)}" onerror="this.src='${ASSETS}default.png'">
                        </div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${tieneRival ? '<br>vs<br>' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">EVENTO CARGADO</div>
                `;
                container.appendChild(card);
            });

            if (container.innerHTML === '') {
                container.innerHTML = '<div class="error-msg">ARCHIVO LEÍDO PERO SIN EVENTOS DENTRO</div>';
            }

            if(container.firstChild) container.firstChild.focus();

        } catch (e) { 
            container.innerHTML = `<div class="error-msg">FALLO DE CONEXIÓN CON GITHUB<br><small>${e.message}</small></div>`;
        }
    }

    actualizarTV();
    setInterval(actualizarTV, 30000); // Recarga cada 30 segundos
</script>
</body>
</html>
