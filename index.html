<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - ORDEN Y FECHA</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; overflow-y: auto; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 15px; transition: 0.2s; text-decoration: none; color: inherit; min-height: 240px; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }
        
        /* Badge de Fecha y Hora */
        .fecha-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 3px 10px; border-radius: 6px; font-weight: bold; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .fecha-badge span { font-size: 9px; opacity: 0.8; }

        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; gap: 12px; }
        .img-box { background: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        
        .nombres { text-align: center; width: 100%; }
        .nombres h3 { margin: 5px 0; font-size: 15px; color: #fff; line-height: 1.2; font-weight: 800; text-transform: uppercase; }
        .canal-txt { color: var(--main); font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        
        .status-btn { width: 90%; background: #222; color: #555; padding: 8px; border-radius: 10px; font-size: 10px; border: 1px solid #333; text-transform: uppercase; margin-top: 10px; text-align: center; font-weight: bold; }
        .activo .status-btn { color: var(--main); border-color: var(--main); background: #000; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';
    let DB_EQUIPOS = [];

    async function cargarSincronizacion() {
        try {
            const r = await fetch(REPO + 'base_datos.json?v=' + Date.now());
            DB_EQUIPOS = await r.json();
            actualizarTV();
        } catch (e) { actualizarTV(); }
    }

    function resolverRuta(logo) {
        if (!logo || logo === "undefined" || logo === "null" || logo === "") return ASSETS + 'default.png';
        const limpio = logo.trim();
        
        // Prioridad: Si el mando ya manda la carpeta (champions/arsenal.png)
        if (limpio.includes('/')) return ASSETS + 'equipos/' + limpio;

        // Respaldo: Buscar en DB
        const match = DB_EQUIPOS.find(x => x.logo === limpio || x.logo === limpio + '.png');
        if (match && match.categoria) {
            return ASSETS + 'equipos/' + match.categoria + '/' + (limpio.includes('.') ? limpio : limpio + '.png');
        }

        // Si no hay nada, carpeta deporte
        return ASSETS + 'deporte/' + (limpio.includes('.') ? limpio : limpio + '.png');
    }

    async function actualizarTV() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const base64 = text.replace(/[^A-Za-z0-9+/=]/g, "");
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(base64))));

            // Lógica de ORDENACIÓN: De más temprano a más tarde
            evs.sort((a, b) => a.hora.localeCompare(b.hora));

            container.innerHTML = '';
            const ahora = new Date();

            evs.forEach((ev, i) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                
                // Ocultar si terminó hace más de 3h
                if ((ahora - fEv) / 3600000 > 3) return; 

                const estaActivo = (fEv - ahora) / 60000 <= 20;
                const tieneRival = ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined";

                const card = document.createElement(estaActivo ? 'a' : 'div');
                card.className = `card ${estaActivo ? 'activo' : ''}`;
                if(estaActivo) card.href = `acestream://${ev.link}`;
                card.tabIndex = i + 1;

                // Si no hay campo fecha en tu JSON, no se rompe
                const fechaTexto = ev.fecha ? `<span>${ev.fecha}</span>` : '';

                card.innerHTML = `
                    <div class="fecha-badge">${fechaTexto}${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo1)}" onerror="this.onerror=null; this.src='${ASSETS}default.png';">
                        </div>
                        ${tieneRival ? `
                        <b style="color:var(--main); font-size: 14px;">VS</b>
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo2)}" onerror="this.onerror=null; this.src='${ASSETS}default.png';">
                        </div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${tieneRival ? '<br>vs<br>' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${estaActivo ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
            });

            if(container.firstChild) container.firstChild.focus();
        } catch (e) { console.error("Error App"); }
    }

    cargarSincronizacion();
    setInterval(actualizarTV, 60000);
</script>
</body>
</html>
