<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - REFIX TOTAL</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; width: 100vw; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 10px 0; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 28vh; gap: 15px; width: 100%; }
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 15px; transition: 0.2s; text-decoration: none; color: inherit; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }
        .hora-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 2px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; gap: 10px; }
        .img-box { background: #fff; width: 68px; height: 68px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .single-logo .img-box { width: 85px; height: 85px; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        .nombres { text-align: center; width: 100%; }
        .nombres h3 { margin: 5px 0; font-size: 17px; color: #fff; font-weight: bold; }
        .canal-txt { color: var(--main); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-btn { width: 80%; background: #222; color: #666; padding: 8px; border-radius: 10px; font-weight: bold; font-size: 11px; border: 1px solid #333; text-transform: uppercase; margin-top: 8px; }
        .ready .status-btn { color: var(--main); border-color: var(--main); }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    // Asegúrate de que esta URL es EXACTA a tu repositorio
    const BASE = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/assets/';
    const URL_JSON = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/eventos.json';

    function cargarFoto(imgId, ruta) {
        const el = document.getElementById(imgId);
        if (!el) return;
        
        // Si no hay ruta, directo al default
        if (!ruta || ruta === "undefined" || ruta === "null") {
            el.src = BASE + 'default.png';
            return;
        }

        const nombreArchivo = ruta.includes('/') ? ruta.split('/').pop() : ruta;
        
        // Lista de intentos en orden de probabilidad
        const intentos = [
            BASE + 'equipos/' + ruta,        // 1. Ruta completa (laliga/madrid.png)
            BASE + 'deporte/' + nombreArchivo, // 2. En deporte
            BASE + 'equipos/' + nombreArchivo, // 3. En equipos a pelo
            BASE + nombreArchivo,              // 4. En raíz de assets
            BASE + 'default.png'               // 5. El último recurso
        ];

        let i = 0;
        el.src = intentos[i];

        el.onerror = () => {
            i++;
            if (i < intentos.length) {
                el.src = intentos[i];
            } else {
                el.onerror = null; // Evitar bucle infinito
            }
        };
    }

    async function cargar() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(URL_JSON + '?v=' + Date.now());
            const rawText = await r.text();
            
            // Descifrado
            const b64 = rawText.replace(/["\s]/g, '').trim();
            const jsonStr = decodeURIComponent(escape(window.atob(b64)));
            const evs = JSON.parse(jsonStr);

            container.innerHTML = '';
            const ahora = new Date();

            evs.forEach((ev, idx) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                
                if ((ahora - fEv) / 3600000 > 3) return; 

                const listo = (fEv - ahora) / 60000 <= 20;
                const esDuelo = (ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined" && ev.e2 !== "null");

                const card = document.createElement(listo ? 'a' : 'div');
                card.className = `card ${!esDuelo ? 'single-logo' : ''} ${listo ? 'ready' : ''}`;
                if(listo) card.href = `acestream://${ev.link}`;
                card.tabIndex = idx + 1;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img id="img_a_${idx}"></div>
                        ${esDuelo ? `<b style="color:var(--main)">VS</b><div class="img-box"><img id="img_b_${idx}"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${esDuelo ? ' vs ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${listo ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
                
                // Disparo de carga de fotos
                cargarFoto(`img_a_${idx}`, ev.logo1);
                if(esDuelo) cargarFoto(`img_b_${idx}`, ev.logo2);
            });

            if(container.firstChild) container.firstChild.focus();
        } catch (e) { console.error("Fallo en App:", e); }
    }

    cargar();
    setInterval(cargar, 60000);
</script>
</body>
</html>
