<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - 3x3 ESTRUCTURA TOTAL</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; --text-sec: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', sans-serif; padding: 10px; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        h1 { 
            color: var(--main); text-align: center; font-size: 20px; 
            letter-spacing: 12px; margin-bottom: 10px; text-transform: uppercase; 
        }

        #agenda { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: calc(33.33vh - 22px); 
            gap: 10px; width: 100%; flex-grow: 1;
            overflow-y: auto; padding-bottom: 10px;
        }
        
        .card { 
            background: var(--card); border-radius: 15px; border: 2px solid #222; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; padding: 8px; 
            text-decoration: none; color: inherit; transition: 0.2s;
        }

        /* Estado Bloqueado */
        .card.blocked { opacity: 0.7; cursor: default; pointer-events: none; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.02); outline: none; }
        
        /* Tarjeta Vacía para rellenar 3x3 */
        .card.empty { border: 2px dashed #222; background: transparent; opacity: 0.3; }
        .card.empty h4 { color: #444; font-size: 10px; letter-spacing: 2px; }

        .fecha-badge { 
            position: absolute; top: 8px; left: 8px; 
            background: var(--main); color: #000; 
            padding: 2px 8px; border-radius: 4px; 
            font-weight: bold; font-size: 10px; 
        }

        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; gap: 15px; margin-bottom: 5px; }
        
        .img-box { 
            background: #fff; width: 90px; height: 90px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; border: 3px solid #333; 
        }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        
        .nombres { text-align: center; width: 100%; }
        .nombres h3 { font-size: 11px; color: #eee; text-transform: uppercase; margin: 3px 0; }
        .canal-txt { color: var(--main); font-size: 10px; font-weight: bold; margin-bottom: 2px; }
        
        .status-btn { 
            width: 85%; padding: 5px; border-radius: 8px; font-size: 9px; 
            border: 1px solid var(--main); text-transform: uppercase; 
            font-weight: bold; text-align: center; margin-top: 8px;
        }
        .blocked .status-btn { border-color: #444; color: #444; }
        .card:focus .status-btn { background: var(--main); color: #000; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';

    function resolverRuta(logo) {
        if (!logo || logo === "" || logo === "undefined") return ASSETS + 'default.png';
        if (logo.includes('/')) return ASSETS + 'equipos/' + logo.trim();
        return ASSETS + 'deporte/' + (logo.includes('.') ? logo : logo + '.png');
    }

    async function actualizarTV() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const b64 = text.trim().replace(/["\s]/g, '');
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
            
            evs.sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));

            container.innerHTML = '';
            const ahora = new Date();
            let eventosMostrados = 0;

            evs.forEach((ev) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(ev.fecha); 
                fEv.setHours(h, m, 0);
                
                const difMinutos = (fEv - ahora) / 60000;
                const horasDesdeInicio = (ahora - fEv) / 3600000;

                // 1. Regla de las 3 horas para eliminar
                if (horasDesdeInicio > 3) return; 

                // 2. Regla de los 15 minutos para bloquear
                const estaBloqueado = difMinutos > 15;
                eventosMostrados++;

                const card = document.createElement(estaBloqueado ? 'div' : 'a');
                card.className = `card ${estaBloqueado ? 'blocked' : ''}`;
                if(!estaBloqueado) card.href = "acestream://" + ev.link;
                card.tabIndex = eventosMostrados;

                const tieneRival = ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined";

                card.innerHTML = `
                    <div class="fecha-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img src="${resolverRuta(ev.logo1)}" onerror="this.src='${ASSETS}default.png'"></div>
                        ${tieneRival ? `<b style="color:var(--main); font-size: 14px;">VS</b><div class="img-box"><img src="${resolverRuta(ev.logo2)}" onerror="this.src='${ASSETS}default.png'"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${tieneRival ? ' <br> ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${estaBloqueado ? 'BLOQUEADO' : 'VER AHORA'}</div>
                `;
                container.appendChild(card);
            });

            // 3. Relleno hasta completar cuadrícula 3x3 (Punto 1 de tu lógica)
            const minCards = 9;
            while (eventosMostrados < minCards) {
                eventosMostrados++;
                const emptyCard = document.createElement('div');
                emptyCard.className = 'card empty';
                emptyCard.innerHTML = '<h4>AGENDA VACÍA</h4>';
                container.appendChild(emptyCard);
            }

            if(container.querySelector('.card:not(.empty)')) {
                container.querySelector('.card:not(.empty)').focus();
            }

        } catch (e) { 
            console.log("Error de carga");
        }
    }

    actualizarTV();
    setInterval(actualizarTV, 60000);
</script>
</body>
</html>
