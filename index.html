<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÚNKER TV DEFINITIVO</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        /* BOTÓN FLOTANTE REFRESCAR */
        .btn-refresh {
            position: fixed; top: 15px; right: 15px; background: var(--main); color: #000;
            border: none; padding: 12px 20px; border-radius: 50px; font-weight: 900;
            cursor: pointer; z-index: 1000; box-shadow: 0 0 20px rgba(0,255,136,0.4);
        }

        h1 { color: var(--main); letter-spacing: 5px; margin: 30px 0; font-size: 28px; }

        .agenda-container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: auto; padding-bottom: 50px;
        }

        .card { 
            background: var(--card); border-radius: 20px; padding: 20px; 
            border: 1px solid #222; position: relative; display: flex; flex-direction: column; align-items: center;
        }

        .hora { position: absolute; top: 15px; left: 15px; background: var(--main); color: #000; padding: 3px 10px; border-radius: 8px; font-weight: bold; font-size: 13px; }

        /* LOGOS BLANCOS REDONDOS */
        .vs-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 35px 0 15px; width: 100%; }
        
        .logo-circulo { 
            background: #fff; width: 85px; height: 85px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 3px solid #333; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .logo-circulo img { width: 75%; height: 75%; object-fit: contain; }

        .vs-txt { font-weight: 900; color: var(--main); font-size: 16px; font-style: italic; }

        .info h3 { margin: 10px 0 5px; font-size: 18px; color: #fff; }
        .info p { margin: 0; color: #666; font-size: 12px; font-weight: bold; text-transform: uppercase; }

        .links-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 15px; }
        .btn-link { 
            background: #1a1a1a; color: #fff; text-decoration: none; padding: 12px; 
            border-radius: 12px; font-size: 12px; font-weight: bold; border: 1px solid #333;
        }
        .btn-link:hover { background: var(--main); color: #000; }

        /* MODO UN SOLO LOGO */
        .single .logo-circulo { width: 120px; height: 120px; border-color: var(--main); }
        
        #status { color: #444; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <button class="btn-refresh" onclick="obtenerAgenda()">🔄 ACTUALIZAR</button>

    <h1>BÚNKER TV</h1>

    <div id="agenda" class="agenda-container"></div>
    <div id="status">Esperando conexión...</div>

<script>
    const URL_RAW = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/refs/heads/main/eventos.json';

    async function obtenerAgenda() {
        const container = document.getElementById('agenda');
        const status = document.getElementById('status');
        status.innerText = "Sincronizando con GitHub...";

        try {
            // Intento 1: Carga Directa con bypass de caché
            let response = await fetch(URL_RAW + '?v=' + Date.now());
            
            // Si la carga directa falla (CORS), usamos el Proxy AllOrigins
            if (!response.ok) {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(URL_RAW)}&ts=${Date.now()}`;
                const proxyResponse = await fetch(proxyUrl);
                const proxyData = await proxyResponse.json();
                renderizar(JSON.parse(proxyData.contents));
            } else {
                const data = await response.json();
                renderizar(data);
            }
            
            status.innerText = "Última actualización: " + new Date().toLocaleTimeString();
        } catch (error) {
            console.error("Error crítico:", error);
            status.innerHTML = "<b style='color:red'>Error al leer el archivo eventos.json.</b><br>Asegúrate de que el archivo en GitHub no esté vacío.";
        }
    }

    function renderizar(eventos) {
        const container = document.getElementById('agenda');
        container.innerHTML = '';

        if (!eventos || eventos.length === 0) {
            container.innerHTML = "<p style='grid-column:1/-1'>No hay eventos programados.</p>";
            return;
        }

        eventos.forEach(ev => {
            const isSingle = !ev.e2 || ev.e2.trim() === "";
            const div = document.createElement('div');
            div.className = `card ${isSingle ? 'single' : ''}`;
            
            // Corregir rutas de logos
            let l1 = ev.logo1.includes('http') ? ev.logo1 : `assets/equipos/${ev.logo1}`;
            let l2 = ev.logo2 && !isSingle ? (ev.logo2.includes('http') ? ev.logo2 : `assets/equipos/${ev.logo2}`) : '';

            div.innerHTML = `
                <div class="hora">${ev.hora}</div>
                <div class="vs-box">
                    <div class="logo-circulo">
                        <img src="${l1}" onerror="this.src='assets/default.png'">
                    </div>
                    ${!isSingle ? `<div class="vs-txt">VS</div>` : ''}
                    ${!isSingle ? `<div class="logo-circulo"><img src="${l2}" onerror="this.src='assets/default.png'"></div>` : ''}
                </div>
                <div class="info">
                    <p>${ev.canal || 'BÚNKER'}</p>
                    <h3>${ev.e1}${ev.e2 ? ' vs ' + ev.e2 : ''}</h3>
                </div>
                <div class="links-area">
                    ${ev.links.map((link, i) => `
                        <a href="acestream://${link}" class="btn-link">OPCIÓN ${i + 1}</a>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Ejecutar al cargar la página
    obtenerAgenda();
</script>
</body>
</html>
