<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - LÓGICA COMPETICIÓN</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; overflow-y: auto; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 15px; transition: 0.2s; text-decoration: none; color: inherit; min-height: 220px; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }
        .hora-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 2px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; gap: 10px; }
        .img-box { background: #fff; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }
        .nombres { text-align: center; }
        .nombres h3 { margin: 5px 0; font-size: 16px; color: #fff; }
        .canal-txt { color: var(--main); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-btn { width: 90%; background: #222; color: #555; padding: 8px; border-radius: 10px; font-size: 11px; border: 1px solid #333; text-transform: uppercase; margin-top: 10px; text-align: center; }
        .activo .status-btn { color: var(--main); border-color: var(--main); }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';
    let DB_EQUIPOS = [];

    // Lógica 1: Carga de Base de Datos para conocer categorías
    async function cargarSincronizacion() {
        try {
            const r = await fetch(REPO + 'base_datos.json?v=' + Date.now());
            DB_EQUIPOS = await r.json();
            iniciarProcesoTV();
        } catch (e) { 
            console.error("Error cargando DB de sincronización"); 
            iniciarProcesoTV(); 
        }
    }

    // Lógica 2: Constructor de rutas idéntico al Mando
    function resolverRuta(logo) {
        if (!logo || logo === "undefined" || logo === "null") return ASSETS + 'default.png';

        // Si el mando ya especificó competición (ej: laliga/madrid.png)
        if (logo.includes('/')) {
            return ASSETS + 'equipos/' + logo;
        }

        // Si es solo el nombre, buscamos la categoría en la DB
        const busca = DB_EQUIPOS.find(x => x.logo === logo || x.logo === logo + '.png');
        if (busca && busca.categoria) {
            const ext = logo.includes('.') ? '' : '.png';
            return ASSETS + 'equipos/' + busca.categoria + '/' + logo + ext;
        }

        // Caso Evento Único o Deporte
        const extDef = logo.includes('.') ? '' : '.png';
        return ASSETS + 'deporte/' + logo + extDef;
    }

    async function iniciarProcesoTV() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const b64 = text.replace(/["\s]/g, '').trim();
            const evs = JSON.parse(decodeURIComponent(escape(window.atob(b64))));

            container.innerHTML = '';
            const ahora = new Date();

            evs.forEach((ev, i) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                if ((ahora - fEv) / 3600000 > 3) return; 

                const activo = (fEv - ahora) / 60000 <= 20;
                const esDuelo = (ev.logo2 && ev.logo2 !== "" && ev.logo2 !== "undefined");

                const card = document.createElement(activo ? 'a' : 'div');
                card.className = `card ${activo ? 'activo' : ''}`;
                if(activo) card.href = `acestream://${ev.link}`;
                card.tabIndex = i + 1;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo1)}" onerror="this.onerror=null; this.src='${ASSETS}default.png';">
                        </div>
                        ${esDuelo ? `
                        <b style="color:var(--main)">VS</b>
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo2)}" onerror="this.onerror=null; this.src='${ASSETS}default.png';">
                        </div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${esDuelo ? ' vs ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${activo ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
            });

            if(container.firstChild) container.firstChild.focus();
        } catch (e) { console.error("Error en procesamiento de eventos"); }
    }

    cargarSincronizacion();
    setInterval(iniciarProcesoTV, 60000);
</script>
</body>
</html>
