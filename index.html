<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV</title>
    <style>
        :root { --main: #00cc6a; --bg: #f0f2f5; --text: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; height: 100vh; }
        h1 { text-align: center; font-size: 18px; letter-spacing: 5px; margin: 10px 0; text-transform: uppercase; }
        #agenda { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-gap: 10px; height: calc(100vh - 80px); overflow-y: auto;
        }
        .card { 
            background: #fff; border-radius: 10px; border: 2px solid #ddd;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px; text-align: center; min-height: 150px; outline: none;
        }
        .card:focus { border-color: var(--main); background: #eaffe5; }
        .card img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; }
        .card h3 { font-size: 12px; margin: 5px 0; text-transform: uppercase; }
        .badge { background: var(--main); color: #fff; padding: 2px 5px; font-size: 10px; border-radius: 4px; }
        
        /* Modal */
        #modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .btn { 
            width: 80%; padding: 15px; margin: 5px; background: #eee; 
            border-radius: 10px; font-weight: bold; cursor: pointer; outline: none; border: 2px solid transparent;
        }
        .btn:focus { border-color: var(--main); background: var(--main); color: #fff; }
        
        /* Bloqueo */
        #bloqueo { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:#fff; display:none; flex-direction:column; align-items:center; justify-content:center; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <h2 style="color:red">ACCESO RESTRINGIDO</h2>
        <p>Tu ID de dispositivo es:</p>
        <h1 id="my-id-display" style="color:var(--main); letter-spacing: 2px;"></h1>
        <p>Pide acceso al administrador.</p>
    </div>

    <h1 onclick="location.reload()">NWAKALO TV</h1>
    <div id="agenda">Cargando eventos...</div>

    <div id="modal">
        <h2 id="m-title"></h2>
        <div id="m-links" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <div class="btn" onclick="cerrarMenu()" style="color:red; margin-top:20px;">CERRAR</div>
    </div>

<script>
    // Configuración
    var REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    var ASSETS = REPO + 'assets/';
    var adminIDs = ['NW-828277'];
    
    // Generar ID
    var miID = localStorage.getItem('nw_id') || ('NW-' + Math.floor(Math.random()*900000 + 100000));
    localStorage.setItem('nw_id', miID);
    document.getElementById('my-id-display').innerText = miID;

    // Función para decodificar Base64 con tildes (Forma infalible)
    function b64ToUtf8(str) {
        try {
            var s = window.atob(str.trim().replace(/["\s]/g, ''));
            return decodeURIComponent(Array.prototype.map.call(s, function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch(e) { return null; }
    }

    async function cargarTodo() {
        var container = document.getElementById('agenda');
        
        try {
            // 1. Cargar Autorizados
            var resAuth = await fetch(REPO + 'autorizado.json?v=' + Date.now());
            var authData = await resAuth.json();
            
            if (authData.usuarios.indexOf(miID) === -1 && adminIDs.indexOf(miID) === -1) {
                document.getElementById('bloqueo').style.display = 'flex';
                return;
            }

            // 2. Cargar Eventos
            var resEv = await fetch(REPO + 'eventos.json?v=' + Date.now());
            var bText = await resEv.text();
            var jsonStr = b64ToUtf8(bText);
            
            if (!jsonStr) {
                container.innerHTML = "Error decodificando Base64";
                return;
            }

            var evs = JSON.parse(jsonStr);
            container.innerHTML = ""; // Limpiar "Cargando..."

            // 3. Renderizar
            var procesados = [];
            for (var i = 0; i < evs.length; i++) {
                var ev = evs[i];
                var idUnico = ev.e1 + ev.hora;

                if (procesados.indexOf(idUnico) === -1) {
                    var links = evs.filter(function(x){ return (x.e1 + x.hora) === idUnico; });
                    crearCard(ev, links);
                    procesados.push(idUnico);
                }
            }
        } catch(e) {
            container.innerHTML = "Error de conexión con GitHub: " + e.message;
        }
    }

    function crearCard(ev, links) {
        var card = document.createElement('div');
        card.className = 'card';
        card.tabIndex = 0;
        
        var logo1 = ev.logo1.indexOf('/') !== -1 ? ASSETS + 'equipos/' + ev.logo1 : ASSETS + 'deporte/' + ev.logo1;
        
        card.innerHTML = 
            '<div class="badge">' + ev.hora + '</div>' +
            '<div style="display:flex; align-items:center; gap:10px; margin:10px 0;">' +
                '<img src="' + logo1 + '" onerror="this.src=\''+ASSETS+'default.png\'">' +
            '</div>' +
            '<h3>' + ev.e1 + (ev.e2 ? ' vs ' + ev.e2 : '') + '</h3>' +
            '<div style="color:var(--main); font-weight:bold; font-size:10px;">VER CANALES</div>';

        card.onclick = function() { abrirMenu(ev, links); };
        card.onkeydown = function(e) { if(e.keyCode === 13) abrirMenu(ev, links); };
        
        document.getElementById('agenda').appendChild(card);
    }

    function abrirMenu(ev, links) {
        document.getElementById('m-title').innerText = ev.e1;
        var list = document.getElementById('m-links');
        list.innerHTML = "";
        
        for (var j = 0; j < links.length; j++) {
            var b = document.createElement('div');
            b.className = "btn";
            b.tabIndex = 0;
            b.innerText = links[j].canal;
            (function(link){
                b.onclick = function() { window.location.href = "acestream://" + link; };
            })(links[j].link);
            list.appendChild(b);
        }
        document.getElementById('modal').style.display = "flex";
        list.firstChild.focus();
    }

    function cerrarMenu() {
        document.getElementById('modal').style.display = "none";
    }

    // Iniciar
    cargarTodo();
</script>
</body>
</html>
