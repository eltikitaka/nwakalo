<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV LOGO-FIX</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        body { display: flex; flex-direction: column; padding: 15px 25px; }
        h1 { color: var(--main); letter-spacing: 12px; text-transform: uppercase; margin: 0 0 15px 0; font-size: 32px; font-weight: 900; text-align: center; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 28vh); gap: 15px; flex-grow: 1; width: 100%; }
        .card { background: var(--card); border-radius: 20px; padding: 10px; border: 2px solid #222; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; color: inherit; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.02); }
        .card.placeholder { background: rgba(255,255,255,0.05); border: 1px dashed #444; opacity: 0.5; }
        .hora-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 2px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .vs-container { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .img-box { background: #fff; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        .nombres { text-align: center; }
        .nombres h3 { margin: 5px 0; font-size: 18px; color: #fff; }
        .canal-txt { color: #666; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-btn { width: 80%; background: #222; color: var(--main); padding: 8px; border-radius: 10px; font-weight: bold; font-size: 12px; border: 1px solid #333; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const GITHUB_BASE = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';

    // FUNCIÓN INTELIGENTE PARA CARGAR IMÁGENES
    function tratarImagen(img, nombre) {
        if (!nombre) return;
        const nombreLimpio = nombre.split('/').pop().toLowerCase();
        
        // Intento 1: assets/equipos/
        img.src = GITHUB_BASE + 'assets/equipos/' + nombreLimpio;
        
        img.onerror = function() {
            // Intento 2: assets/deporte/
            if (img.src.includes('equipos')) {
                img.src = GITHUB_BASE + 'assets/deporte/' + nombreLimpio;
            } 
            // Intento 3: Nombre tal cual sin minúsculas
            else if (img.src.includes('deporte')) {
                img.src = GITHUB_BASE + 'assets/equipos/' + nombre.split('/').pop();
            }
            // Final: Imagen por defecto
            else {
                img.src = GITHUB_BASE + 'assets/default.png';
                img.onerror = null;
            }
        };
    }

    async function cargarAgenda() {
        const container = document.getElementById('agenda');
        try {
            const resp = await fetch(GITHUB_BASE + 'eventos.json?v=' + Date.now());
            let base64Data = await resp.text();
            base64Data = base64Data.replace(/["\s]/g, '').trim();
            
            let eventos = [];
            if(base64Data.length > 10) {
                const jsonStr = decodeURIComponent(escape(window.atob(base64Data)));
                eventos = JSON.parse(jsonStr);
            }

            container.innerHTML = '';
            const ahora = new Date();
            let mostrados = 0;

            eventos.forEach(ev => {
                if(mostrados >= 9) return;
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                const dif = (fEv - ahora) / 60000;
                if ((ahora - fEv) / 3600000 > 3) return; 

                mostrados++;
                const disponible = dif <= 15;

                const card = document.createElement(disponible ? 'a' : 'div');
                card.className = 'card';
                if(disponible) card.href = `acestream://${ev.link}`;
                card.tabIndex = mostrados;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img id="l1_${mostrados}"></div>
                        ${ev.e2 ? `<b style="color:var(--main)">VS</b><div class="img-box"><img id="l2_${mostrados}"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1} ${ev.e2 ? 'vs ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${disponible ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
                
                // Ejecutar carga inteligente de logos
                tratarImagen(document.getElementById(`l1_${mostrados}`), ev.logo1);
                if(ev.e2) tratarImagen(document.getElementById(`l2_${mostrados}`), ev.logo2);
            });

            for (let i = mostrados; i < 9; i++) {
                const dummy = document.createElement('div');
                dummy.className = 'card placeholder';
                dummy.innerHTML = `<h3 style="color:rgba(255,255,255,0.4); font-size:14px;">EVENTO A PROGRAMAR</h3>`;
                container.appendChild(dummy);
            }

            if(container.firstChild) container.firstChild.focus();

        } catch (e) { console.error("Error crítico"); }
    }

    cargarAgenda();
    setInterval(cargarAgenda, 300000);
</script>
</body>
</html>
