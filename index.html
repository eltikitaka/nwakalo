<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - SYNC LOGIC</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; overflow-y: auto; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 15px; transition: 0.2s; text-decoration: none; color: inherit; min-height: 220px; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }
        .hora-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 2px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 10px; gap: 10px; }
        .img-box { background: #fff; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }
        .nombres { text-align: center; }
        .nombres h3 { margin: 5px 0; font-size: 16px; color: #fff; line-height: 1.2; }
        .canal-txt { color: var(--main); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .status-btn { width: 90%; background: #222; color: #555; padding: 8px; border-radius: 10px; font-size: 11px; border: 1px solid #333; text-transform: uppercase; margin-top: 10px; text-align: center; }
        .activo .status-btn { color: var(--main); border-color: var(--main); }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';
    let DB_EQUIPOS = [];

    // 1. Cargar Base de Datos para conocer categorías/competiciones
    async function sincronizarDB() {
        try {
            const r = await fetch(REPO + 'base_datos.json?v=' + Date.now());
            DB_EQUIPOS = await r.json();
            actualizarApp();
        } catch (e) { 
            console.error("Error sincronizando DB"); 
            actualizarApp(); 
        }
    }

    // 2. Lógica de resolución de rutas (Igual que el Mando)
    function obtenerRuta(logo) {
        if (!logo || logo === "undefined" || logo === "null" || logo === "") return ASSETS + 'default.png';

        const limpio = logo.trim();
        // Prioridad: El mando manda la subcarpeta (ej: laliga/madrid.png)
        if (limpio.includes('/')) return ASSETS + 'equipos/' + limpio;

        // Respaldo: Buscar competición en la DB
        const match = DB_EQUIPOS.find(x => x.logo === limpio || x.logo === limpio + '.png');
        if (match && match.categoria) {
            const ext = limpio.includes('.') ? '' : '.png';
            return ASSETS + 'equipos/' + match.categoria + '/' + limpio + ext;
        }

        // Por defecto: Carpeta deporte
        const extD = limpio.includes('.') ? '' : '.png';
        return ASSETS + 'deporte/' + limpio + extD;
    }

    async function actualizarApp() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            // Limpieza estricta de Base64 para evitar que los nombres desaparezcan
            const base64 = text.replace(/[^A-Za-z0-9+/=]/g, "");
            const evs = JSON.parse(decodeURIComponent(escape(window.atob(base64))));

            container.innerHTML = '';
            const ahora = new Date();

            evs.forEach((ev, i) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                if ((ahora - fEv) / 3600000 > 3) return; 

                const estaActivo = (fEv - ahora) / 60000 <= 20;
                // Detección estricta de Duelo
                const tieneRival = ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined";

                const card = document.createElement(estaActivo ? 'a' : 'div');
                card.className = `card ${estaActivo ? 'activo' : ''}`;
                if(estaActivo) card.href = `acestream://${ev.link}`;
                card.tabIndex = i + 1;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box">
                            <img src="${obtenerRuta(ev.logo1)}" onerror="this.onerror=null; this.src='${ASSETS}default.png';">
                        </div>
                        ${tieneRival ? `
                        <b style="color:var(--main); font-size: 14px;">VS</b>
                        <div class="img-box">
                            <img src="${obtenerRuta(ev.logo2)}" onerror="this.onerror=null; this.src='${ASSETS}default.png';">
                        </div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${tieneRival ? '<br>vs<br>' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${estaActivo ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
            });

            if(container.firstChild) container.firstChild.focus();
        } catch (e) { console.error("Error cargando eventos"); }
    }

    sincronizarDB();
    setInterval(actualizarApp, 60000);
</script>
</body>
</html>
