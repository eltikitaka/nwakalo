<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 40px; text-align: center; overflow-x: hidden;
        }

        /* BOTÓN REFRESCAR NWAKALO */
        .btn-refresh {
            position: fixed; top: 25px; right: 25px;
            background: rgba(0, 255, 136, 0.1); border: 1px solid var(--main);
            color: var(--main); padding: 12px 25px; border-radius: 50px;
            cursor: pointer; font-size: 14px; z-index: 100;
            font-weight: bold; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .btn-refresh:hover { background: var(--main); color: #000; box-shadow: 0 0 20px var(--main); }

        h1 { 
            color: var(--main); letter-spacing: 12px; text-transform: uppercase; 
            margin-bottom: 50px; font-size: 45px; font-weight: 900;
            text-shadow: 0 0 20px rgba(0,255,136,0.3);
        }

        /* CONTENEDOR FLEXIBLE / GRID */
        #agenda { 
            display: grid; 
            gap: 30px; 
            max-width: 1400px; 
            margin: auto; 
            transition: 0.5s;
        }

        /* DISEÑO DE TARJETA */
        .card { 
            background: var(--card); border-radius: 30px; padding: 30px; 
            border: 1px solid #222; position: relative; transition: 0.4s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .card:hover { border-color: var(--main); transform: scale(1.02); }

        .hora-badge { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--main); color: #000; padding: 6px 16px; 
            border-radius: 12px; font-weight: 900; font-size: 16px;
        }

        /* LOGOS BLANCOS CIRCULARES */
        .vs-container { 
            display: flex; align-items: center; justify-content: center; 
            gap: 20px; margin: 40px 0 20px 0; width: 100%;
        }

        .img-box { 
            background: #ffffff; width: 100px; height: 100px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden;
            border: 5px solid #333; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .img-box img { width: 75%; height: 75%; object-fit: contain; }
        .vs-text { font-weight: 900; color: var(--main); font-size: 20px; font-style: italic; }

        .nombres h3 { margin: 15px 0 5px 0; font-size: 24px; color: #fff; letter-spacing: 0.5px; }
        .canal-txt { color: #555; text-transform: uppercase; font-size: 14px; font-weight: bold; letter-spacing: 2px; }
        
        /* BOTÓN DE ACCESO DIRECTO */
        .btn-link {
            display: block; width: 100%; max-width: 250px;
            background: #1a1a1a; color: var(--main); text-decoration: none; text-align: center; 
            padding: 16px; border-radius: 20px; font-weight: 900; margin-top: 20px;
            border: 1px solid #333; transition: 0.2s; text-transform: uppercase;
        }
        .btn-link:hover { background: var(--main); color: #000; border-color: var(--main); }

        /* --- ESTILOS DE ESCALADO INTELIGENTE --- */
        
        /* Caso 1: Pocos eventos (1 a 6) -> Íconos Grandes */
        .grid-pocos { grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); }
        .grid-pocos .img-box { width: 150px; height: 150px; }
        .grid-pocos .nombres h3 { font-size: 32px; }

        /* Caso 2: Muchos eventos (+6) -> Filas de 3 */
        .grid-muchos { grid-template-columns: repeat(3, 1fr); }
        .grid-muchos .img-box { width: 90px; height: 90px; }
        .grid-muchos .nombres h3 { font-size: 20px; }

        /* MODO LOGO ÚNICO (MotoGP, F1...) */
        .single-mode .vs-text { display: none; }
        .single-mode .img-box { width: 180px; height: 180px; border-color: var(--main); }
        .grid-muchos .single-mode .img-box { width: 120px; height: 120px; }

        #status { margin-top: 40px; color: #333; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <button class="btn-refresh" onclick="cargarAgenda()">🔄 REFRESCAR</button>

    <h1>NWAKALO TV</h1>

    <div id="agenda"></div>
    <div id="status">Sincronizando con el servidor NWAKALO...</div>

<script>
    // URL DE TU ARCHIVO EN GITHUB
    const URL_RAW = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/refs/heads/main/eventos.json';

    async function cargarAgenda() {
        const container = document.getElementById('agenda');
        const status = document.getElementById('status');
        
        try {
            // Bypass de caché para leer siempre lo último de GitHub
            const resp = await fetch(URL_RAW + '?v=' + Date.now());
            const base64Data = await resp.text();
            
            // DESCIFRADO DE BASE64 A JSON
            const jsonStr = decodeURIComponent(escape(window.atob(base64Data.trim())));
            const eventos = JSON.parse(jsonStr);
            
            // APLICAR ESCALADO INTELIGENTE
            container.className = ""; // Limpiar clases
            if (eventos.length <= 6) {
                container.classList.add('grid-pocos');
            } else {
                container.classList.add('grid-muchos');
            }

            container.innerHTML = '';
            
            eventos.forEach(ev => {
                const isSingle = !ev.e2 || ev.e2.trim() === "";
                const card = document.createElement('div');
                card.className = `card ${isSingle ? 'single-mode' : ''}`;
                
                // Construcción de rutas de logos
                let l1 = ev.logo1.includes('http') ? ev.logo1 : `assets/equipos/${ev.logo1}`;
                let l2 = ev.logo2 && !isSingle ? (ev.logo2.includes('http') ? ev.logo2 : `assets/equipos/${ev.logo2}`) : '';

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box">
                            <img src="${l1}" onerror="this.src='assets/default.png'">
                        </div>
                        ${!isSingle ? `<div class="vs-text">VS</div>` : ''}
                        ${!isSingle ? `
                            <div class="img-box">
                                <img src="${l2}" onerror="this.src='assets/default.png'">
                            </div>
                        ` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${ev.e2 ? ' <span style="color:var(--main)">vs</span> ' + ev.e2 : ''}</h3>
                    </div>
                    <a href="acestream://${ev.link}" class="btn-link">VER AHORA</a>
                `;
                container.appendChild(card);
            });

            status.innerText = "Sincronización NWAKALO completa: " + new Date().toLocaleTimeString();
        } catch (e) {
            console.error(e);
            status.innerHTML = "<b style='color:red'>ERROR: Asegúrate de que eventos.json tenga el código cifrado del mando.</b>";
        }
    }

    // Carga inicial al abrir la web
    cargarAgenda();

    // Auto-refresco cada 3 minutos por si hay cambios en GitHub
    setInterval(cargarAgenda, 180000);
</script>
</body>
</html>
