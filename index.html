<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÚNKER TV PRO</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 40px; overflow-x: hidden;
        }

        .btn-refresh {
            position: fixed; top: 25px; right: 25px;
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: #fff; padding: 12px 25px; border-radius: 50px;
            cursor: pointer; font-size: 14px; z-index: 100;
            transition: 0.3s; backdrop-filter: blur(10px);
            font-weight: bold;
        }
        .btn-refresh:hover { background: var(--main); color: #000; box-shadow: 0 0 15px var(--main); }

        h1 { text-align: center; color: var(--main); letter-spacing: 8px; text-transform: uppercase; margin-bottom: 50px; font-size: 35px; }

        .agenda-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); 
            gap: 30px; max-width: 1400px; margin: auto;
        }

        .card { 
            background: var(--card); border-radius: 25px; padding: 30px; 
            border: 1px solid #222; position: relative; transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center;
        }

        .hora-badge { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--main); color: #000; padding: 5px 15px; 
            border-radius: 12px; font-weight: 900; font-size: 15px;
        }

        /* LOGOS BLANCOS CIRCULARES */
        .vs-container { 
            display: flex; align-items: center; justify-content: center; 
            gap: 25px; margin: 40px 0 20px 0; width: 100%;
        }

        .img-box { 
            background: #ffffff; width: 100px; height: 100px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden;
            border: 4px solid #222; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .img-box img { width: 75%; height: 75%; object-fit: contain; }

        .vs-text { font-weight: 900; color: var(--main); font-size: 18px; background: #222; padding: 5px 10px; border-radius: 8px; }

        .nombres { text-align: center; margin-bottom: 20px; width: 100%; }
        .nombres h3 { margin: 10px 0; font-size: 22px; color: #eee; }
        
        .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }

        .btn-link {
            background: #1a1a1a; color: #fff; text-decoration: none; text-align: center; 
            padding: 14px; border-radius: 15px; font-weight: bold; font-size: 13px;
            border: 1px solid #333; transition: 0.2s;
        }
        .btn-link:hover { background: var(--main); color: #000; }

        .single-mode .img-box { width: 140px; height: 140px; }
        #msg { text-align: center; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <button class="btn-refresh" onclick="cargarAgenda()">🔄 REFRESCAR</button>

    <h1>BÚNKER TV</h1>

    <div id="agenda" class="agenda-container"></div>
    <div id="msg">Iniciando sistema...</div>

<script>
    // URL de tu archivo en GitHub
    const URL_RAW = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/refs/heads/main/eventos.json';

    async function cargarAgenda() {
        const container = document.getElementById('agenda');
        const msg = document.getElementById('msg');
        msg.innerText = "Sincronizando con GitHub...";

        try {
            // Usamos un proxy para evitar el error de CORS y el caché
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(URL_RAW)}&ts=${Date.now()}`);
            
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            // AllOrigins devuelve el contenido dentro de data.contents como un string
            const eventos = JSON.parse(data.contents);
            
            renderizar(eventos);
            msg.innerText = "Agenda actualizada: " + new Date().toLocaleTimeString();
        } catch (e) {
            msg.innerText = "⚠️ Error de conexión. Revisa el archivo en GitHub.";
            console.error(e);
        }
    }

    function renderizar(eventos) {
        const container = document.getElementById('agenda');
        container.innerHTML = '';

        eventos.forEach(ev => {
            const isSingle = !ev.e2 || ev.e2.trim() === "";
            const card = document.createElement('div');
            card.className = `card ${isSingle ? 'single-mode' : ''}`;
            
            // Construcción de rutas de logos
            let logo1 = ev.logo1.includes('http') ? ev.logo1 : `assets/equipos/${ev.logo1}`;
            let logo2 = ev.logo2 && !isSingle ? (ev.logo2.includes('http') ? ev.logo2 : `assets/equipos/${ev.logo2}`) : '';

            card.innerHTML = `
                <div class="hora-badge">${ev.hora}</div>
                <div class="vs-container">
                    <div class="img-box">
                        <img src="${logo1}" onerror="this.src='assets/default.png'">
                    </div>
                    ${!isSingle ? `<div class="vs-text">VS</div>` : ''}
                    ${!isSingle ? `
                        <div class="img-box">
                            <img src="${logo2}" onerror="this.src='assets/default.png'">
                        </div>
                    ` : ''}
                </div>
                <div class="nombres">
                    <h3>${ev.e1}${ev.e2 ? ' vs ' + ev.e2 : ''}</h3>
                    <p style="color:#555; font-size:12px; margin:0;">${ev.canal || ''}</p>
                </div>
                <div class="links-grid">
                    ${ev.links.map((link, i) => `
                        <a href="acestream://${link}" class="btn-link">OPCIÓN ${i + 1}</a>
                    `).join('')}
                </div>
            `;
            container.appendChild(card);
        });
    }

    cargarAgenda();
    // Auto-refrescar cada 2 minutos
    setInterval(cargarAgenda, 120000);
</script>
</body>
</html>
