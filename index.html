<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV - BÚNKER PREMIUM</title>
    <style>
        :root { 
            --main: #00ff88; --bg: #0a0a0a; --accent: #1a1a1a;
            --liga: #00ff88; --champions: #007bff; --motor: #ffa502;
        }
        body { 
            background: var(--bg); color: #fff; font-family: 'Arial Black', sans-serif; 
            margin: 0; padding: 0; overflow: hidden; height: 100vh; 
            display: flex; flex-direction: column; user-select: none; 
        }
        header { 
            height: 8vh; display: flex; align-items: center; padding-left: 20px; 
            border-bottom: 1px solid #222; flex-shrink: 0; 
        }
        h1 { font-size: 2.5vh; margin: 0; font-style: italic; color: #fff; }
        .logo-tv { border: 2px solid var(--main); color: var(--main); padding: 0 8px; margin-left: 10px; font-style: normal; }
        
        #app-principal { display: none; height: 100vh; }
        .grid-dazn { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: 28vh; gap: 1.5vh; padding: 20px; 
            height: 92vh; overflow-y: auto; box-sizing: border-box; 
        }

        /* --- TARJETA PREMIUM --- */
        .tarjeta-dazn { 
            background: #121212; border: 3px solid #222; border-radius: 8px;
            display: flex; flex-direction: column; text-decoration: none; 
            color: white; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            outline: none; overflow: hidden; position: relative; 
        }

        .tarjeta-dazn:focus { 
            transform: scale(1.04); z-index: 10; border-color: var(--main);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        /* EFECTO BRILLO (SHINE) */
        .tarjeta-dazn:focus::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shine 1.2s forwards;
        }
        @keyframes shine { 0% { left: -150%; } 100% { left: 150%; } }

        /* ESTADO BLOQUEADO */
        .bloqueada { filter: grayscale(1) opacity(0.5); cursor: not-allowed; }
        .bloqueada::before {
            content: "🔒"; position: absolute; top: 10px; right: 10px; z-index: 20; font-size: 1.5vh;
        }

        .img-contenedor { 
            height: 55%; background: #000; display: flex; 
            justify-content: center; align-items: center; gap: 15px; position: relative; 
        }
        .img-contenedor img { max-width: 25%; max-height: 70%; object-fit: contain; }
        
        .tag { position: absolute; top: 10px; left: 10px; padding: 4px 10px; font-size: 1vh; font-weight: bold; border-radius: 3px; z-index: 10; }
        .tag-live { background: #e50914; color: #fff; animation: pulse 2s infinite; }
        .tag-espera { background: #444; color: #aaa; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        .info-contenedor { 
            padding: 12px; flex-grow: 1; display: flex; 
            flex-direction: column; justify-content: center; text-align: center; 
            background: linear-gradient(to bottom, #151515, #0a0a0a); 
        }
        .partido-nombres { font-size: 1.8vh; font-weight: 900; text-transform: uppercase; margin-bottom: 4px; }
        .opcion-n { color: var(--main); font-size: 1.3vh; font-weight: bold; }
        .detalles { font-size: 1.3vh; color: #777; margin-top: 2px; }

        .tarjeta-pendiente { 
            border: 2px dashed #222; opacity: 0.3; justify-content: center; 
            align-items: center; color: #444; font-size: 1.4vh; text-align: center; 
        }
        .grid-dazn::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="app-principal">
        <header><h1>NWAKALO<span class="logo-tv">TV</span></h1></header>
        <div id="contenedor-grid" class="grid-dazn"></div>
    </div>

    <script>
        const MINUTOS_ANTES = 15; 
        const HORAS_CADUCIDAD = 3;

        async function verificarAcceso() {
            let id = localStorage.getItem('nwa_device_id') || 'NWA-' + Math.random().toString(36).substring(2, 9).toUpperCase();
            localStorage.setItem('nwa_device_id', id);
            try {
                const r = await fetch('autorizados.json?t=' + Date.now());
                const aut = await r.json();
                if (aut.includes(id)) {
                    document.getElementById('app-principal').style.display = 'block';
                    await cargarCartelera();
                } else {
                    document.body.innerHTML = `<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;text-align:center;">
                        <h1 style="color:#e50914;">ACCESO RESTRINGIDO</h1>
                        <p style="color:#666;">ID de dispositivo no autorizado:</p>
                        <div style="color:yellow; font-size:24px; border: 1px dashed yellow; padding: 15px; margin-top:10px;">${id}</div>
                    </div>`;
                }
            } catch (e) { console.error("Error acceso:", e); }
        }

        async function cargarCartelera() {
            try {
                // 1. OBTENER CÓDIGO CIFRADO DE GITHUB
                const r = await fetch('eventos.json?t=' + Date.now());
                const textoCifrado = await r.text();
                
                if (!textoCifrado || textoCifrado.trim() === "") {
                    renderizarVacios(0);
                    return;
                }

                // 2. DESCIFRAR BÚNKER (Base64 -> JSON)
                const jsonDecodificado = decodeURIComponent(escape(window.atob(textoCifrado.trim())));
                const data = JSON.parse(jsonDecodificado);
                
                const grid = document.getElementById('contenedor-grid');
                grid.innerHTML = "";
                const ahora = new Date();
                let count = 0;

                // 3. FILTRAR POR CADUCIDAD (3H) Y REORDENAR
                const activos = data.filter(ev => {
                    const inicio = new Date(`${ev.fecha}T${ev.hora}`);
                    const expiracion = new Date(inicio.getTime() + (HORAS_CADUCIDAD * 3600000));
                    return ahora < expiracion;
                }).sort((a,b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));

                // 4. GENERAR TARJETAS DINÁMICAS
                activos.forEach(p => {
                    const inicio = new Date(`${p.fecha}T${p.hora}`);
                    const diffMin = (inicio - ahora) / 60000;
                    const abierto = diffMin <= MINUTOS_ANTES;

                    p.links.forEach((link, i) => {
                        count++;
                        const card = document.createElement('a');
                        card.href = "#";
                        card.className = 'tarjeta-dazn' + (!abierto ? ' bloqueada' : '');
                        
                        card.onclick = (e) => {
                            e.preventDefault();
                            if(abierto) {
                                window.location.href = `acestream://${link}`;
                            } else {
                                alert(`🔒 ACCESO CERRADO\nEste evento se activará ${MINUTOS_ANTES} minutos antes de las ${p.hora}.`);
                            }
                        };

                        const base = 'assets/equipos/';
                        const tagHTML = abierto 
                            ? `<div class="tag tag-live">LIVE</div>` 
                            : `<div class="tag tag-espera">ESPERA</div>`;

                        card.innerHTML = `
                            <div class="img-contenedor">
                                ${tagHTML}
                                <img src="${base}${p.logo1}" onerror="this.src='assets/default.png'">
                                <img src="${base}${p.logo2}" onerror="this.src='assets/default.png'">
                            </div>
                            <div class="info-contenedor">
                                <div class="partido-nombres">${p.e1} vs ${p.e2}</div>
                                <div class="opcion-n">OPCIÓN ${i+1} • ${p.canal}</div>
                                <div class="detalles">${p.hora} | ${p.fecha.split('-').reverse().join('/')}</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                });

                // 5. RELLENAR HASTA 9 CELDAS
                renderizarVacios(count);

            } catch(e) { 
                console.error("Fallo en el descifrado:", e);
                renderizarVacios(0);
            }
        }

        function renderizarVacios(existentes) {
            const grid = document.getElementById('contenedor-grid');
            for (let i = existentes; i < 9; i++) {
                const e = document.createElement('div');
                e.className = 'tarjeta-dazn tarjeta-pendiente';
                e.innerHTML = "<div>PRÓXIMO EVENTO<br>DISPONIBLE PRONTO</div>";
                grid.appendChild(e);
            }
            // Foco inicial para control remoto
            const focusTarget = document.querySelector('.tarjeta-dazn');
            if(focusTarget) focusTarget.focus();
        }

        // Navegación fluida para Smart TV
        document.addEventListener('focusin', (e) => {
            if (e.target.classList.contains('tarjeta-dazn')) {
                e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        // Auto-recorrido cada minuto para abrir eventos que cumplan los 15 min
        setInterval(cargarCartelera, 60000);

        verificarAcceso();
    </script>
</body>
</html>
