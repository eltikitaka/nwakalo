<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - DATABASE SYNC</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; overflow-y: auto; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; position: relative; text-decoration: none; color: inherit; min-height: 220px; }
        .card:focus { border-color: var(--main); background: #1a1a1a; outline: none; transform: scale(1.02); }
        .hora-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 2px 10px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .vs-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .img-box { background: #fff; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .single-logo .img-box { width: 95px; height: 95px; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }
        .nombres { text-align: center; }
        .nombres h3 { font-size: 16px; margin: 5px 0; }
        .canal-txt { color: var(--main); font-size: 11px; font-weight: bold; }
        .status-btn { width: 90%; background: #222; color: #555; padding: 8px; border-radius: 10px; font-size: 11px; text-align: center; margin-top: 10px; border: 1px solid #333; }
        .activo .status-btn { color: var(--main); border-color: var(--main); }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const BASE_URL = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = BASE_URL + 'assets/';
    let BASE_DATOS = {};

    // 1. CARGAR LA BASE DE DATOS IGUAL QUE EL MANDO
    async function cargarBaseDatos() {
        try {
            const r = await fetch(BASE_URL + 'base_datos.json?v=' + Date.now());
            BASE_DATOS = await r.json();
            iniciarApp();
        } catch (e) { console.error("Error cargando base_datos.json"); }
    }

    // 2. FUNCIÓN PARA ENCONTRAR LA RUTA REAL (Lógica del Mando)
    function obtenerRutaReal(logoRecibido) {
        if (!logoRecibido || logoRecibido === "undefined") return ASSETS + 'default.png';
        
        // Si ya viene con carpeta (ej: "laliga/madrid.png"), le ponemos el prefijo equipos
        if (logoRecibido.includes('/')) {
            return ASSETS + 'equipos/' + logoRecibido;
        }
        
        // Si es un logo suelto, lo buscamos en la carpeta 'deporte'
        return ASSETS + 'deporte/' + logoRecibido;
    }

    async function iniciarApp() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(BASE_URL + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const raw = text.replace(/["\s]/g, '').trim();
            const evs = JSON.parse(decodeURIComponent(escape(window.atob(raw))));

            container.innerHTML = '';
            const ahora = new Date();

            evs.forEach((ev, i) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                if ((ahora - fEv) / 3600000 > 3) return; 

                const activo = (fEv - ahora) / 60000 <= 20;
                const esDuelo = (ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined");

                const card = document.createElement(activo ? 'a' : 'div');
                card.className = `card ${!esDuelo ? 'single-logo' : ''} ${activo ? 'activo' : ''}`;
                if(activo) card.href = `acestream://${ev.link}`;
                card.tabIndex = i + 1;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img src="${obtenerRutaReal(ev.logo1)}" onerror="this.src='${ASSETS}default.png'"></div>
                        ${esDuelo ? `<b style="color:var(--main)">VS</b><div class="img-box"><img src="${obtenerRutaReal(ev.logo2)}" onerror="this.src='${ASSETS}default.png'"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${esDuelo ? ' vs ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${activo ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
            });

            if(container.firstChild) container.firstChild.focus();
        } catch (e) { console.error("Error en eventos"); }
    }

    cargarBaseDatos();
    setInterval(iniciarApp, 60000);
</script>
</body>
</html>
