<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV DATABASE ENGINE</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        body { display: flex; flex-direction: column; padding: 10px 20px; }
        h1 { color: var(--main); letter-spacing: 12px; text-transform: uppercase; margin: 5px 0 10px 0; font-size: 28px; font-weight: 900; text-align: center; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 28vh); gap: 12px; flex-grow: 1; width: 100%; }
        .card { background: var(--card); border-radius: 15px; border: 2px solid #222; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; text-decoration: none; color: inherit; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .card.placeholder { background: rgba(255,255,255,0.05); border: 1px dashed #444; opacity: 0.3; }
        .hora-badge { position: absolute; top: 8px; left: 8px; background: var(--main); color: #000; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 11px; }
        .vs-container { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .img-box { background: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #333; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }
        .nombres { text-align: center; width: 100%; }
        .nombres h3 { margin: 3px 0; font-size: 16px; color: #fff; font-weight: bold; }
        .canal-txt { color: #666; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .status-btn { width: 80%; background: #222; color: var(--main); padding: 6px; border-radius: 8px; font-weight: bold; font-size: 11px; border: 1px solid #333; text-transform: uppercase; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const GITHUB_RAW = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let diccionario = {};

    // 1. CARGAR EL DICCIONARIO
    async function cargarDiccionario() {
        try {
            const r = await fetch(GITHUB_RAW + 'base_datos.json?v=' + Date.now());
            diccionario = await r.json();
            console.log("Diccionario cargado:", diccionario);
        } catch (e) { console.error("No se pudo cargar el diccionario"); }
    }

    // 2. BUSCAR EL LOGO EN EL DICCIONARIO
    function obtenerRutaLogo(nombreEquipo) {
        if (!nombreEquipo) return GITHUB_RAW + 'assets/default.png';
        
        // Si el equipo está en el diccionario (ej: "Arsenal" -> "ars.png")
        if (diccionario[nombreEquipo]) {
            return GITHUB_RAW + 'assets/equipos/' + diccionario[nombreEquipo];
        }
        
        // Plan B: Nombre en minúsculas + .png
        let planB = nombreEquipo.toLowerCase().trim().replace(/\s+/g, '') + '.png';
        return GITHUB_RAW + 'assets/equipos/' + planB;
    }

    async function cargarAgenda() {
        const container = document.getElementById('agenda');
        try {
            const resp = await fetch(GITHUB_RAW + 'eventos.json?v=' + Date.now());
            let base64Data = await resp.text();
            base64Data = base64Data.replace(/["\s]/g, '').trim();
            
            let eventos = [];
            if(base64Data.length > 10) {
                const jsonStr = decodeURIComponent(escape(window.atob(base64Data)));
                eventos = JSON.parse(jsonStr);
            }

            container.innerHTML = '';
            const ahora = new Date();
            let count = 0;

            eventos.forEach((ev, i) => {
                if(count >= 9) return;
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(); fEv.setHours(h, m, 0);
                if ((ahora - fEv) / 3600000 > 3) return; 

                count++;
                const dif = (fEv - ahora) / 60000;
                const ok = dif <= 15;

                const card = document.createElement(ok ? 'a' : 'div');
                card.className = 'card';
                if(ok) card.href = `acestream://${ev.link}`;
                card.tabIndex = count;

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img src="${obtenerRutaLogo(ev.e1)}" onerror="this.src='${GITHUB_RAW}assets/default.png'"></div>
                        ${ev.e2 ? `<b style="color:var(--main); font-size:10px;">VS</b><div class="img-box"><img src="${obtenerRutaLogo(ev.e2)}" onerror="this.src='${GITHUB_RAW}assets/default.png'"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1} ${ev.e2 ? 'vs ' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">${ok ? 'VER AHORA' : 'BLOQUEADO'}</div>
                `;
                container.appendChild(card);
            });

            for (let i = count; i < 9; i++) {
                const dummy = document.createElement('div');
                dummy.className = 'card placeholder';
                dummy.innerHTML = `<h3 style="color:#333; font-size:12px;">DISPONIBLE</h3>`;
                container.appendChild(dummy);
            }

            if(container.firstChild) container.firstChild.focus();

        } catch (e) { console.error("Error cargando eventos"); }
    }

    // INICIO
    async function inicio() {
        await cargarDiccionario(); // Primero el diccionario
        await cargarAgenda();     // Luego los partidos
    }

    inicio();
    setInterval(cargarAgenda, 300000); // Refresco cada 5 min
</script>
</body>
</html>
