<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - REPAIR MODE</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; background: var(--bg); color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Pantalla de Bloqueo Mejorada */
        #auth-screen { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; width: 100vw; 
            position: fixed; top: 0; left: 0; background: var(--bg); z-index: 999;
        }
        .code-box { background: #111; border: 3px dashed var(--main); padding: 30px; border-radius: 20px; margin: 20px 0; }
        .code-text { font-size: 50px; font-weight: bold; color: var(--main); letter-spacing: 5px; font-family: monospace; }
        
        #agenda { display: none; grid-template-columns: repeat(3, 1fr); grid-auto-rows: calc(33.33vh - 22px); gap: 10px; padding: 10px; flex-grow: 1; }
        .card { background: var(--card); border-radius: 15px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 12px 8px; text-decoration: none; color: inherit; outline: none; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); }
        .card.empty { opacity: 0.1; pointer-events: none; border: 2px dashed #333; }
        .status-btn { width: 85%; padding: 5px; border-radius: 8px; font-size: 9px; border: 1px solid var(--main); text-align: center; color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color:var(--main); letter-spacing:5px;">NWAKALO TV</h1>
        <h2 style="margin-top:20px; color:#ff4444;">DISPOSITIVO NO ACTIVADO</h2>
        <p style="margin-top:10px; opacity:0.8;">Facilita este código al administrador:</p>
        <div class="code-box">
            <div id="display-code" class="code-text">CARGANDO...</div>
        </div>
        <p id="status-msg" style="font-size: 14px; color: var(--main);">Verificando conexión...</p>
    </div>

    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    
    // 1. GENERAR ID INMEDIATAMENTE (Sin esperar a nada)
    let miID = localStorage.getItem('nw_device_id');
    if (!miID) {
        miID = "NW-" + Math.floor(100000 + Math.random() * 900000);
        localStorage.setItem('nw_device_id', miID);
    }
    document.getElementById('display-code').innerText = miID;

    async function checkAuth() {
        try {
            const res = await fetch(REPO + 'autorizado.json?v=' + Date.now());
            if (!res.ok) throw new Error("No se pudo leer el archivo");
            
            const data = await res.json();
            
            if (data.usuarios && data.usuarios.includes(miID)) {
                // EXITO: Usuario autorizado
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('agenda').style.display = 'grid';
                cargarEventos();
            } else {
                document.getElementById('status-msg').innerText = "Esperando activación de " + miID;
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Error de red. Reintentando...";
            console.log("Error:", e);
        }
    }

    async function cargarEventos() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const b64 = text.trim().replace(/["\s]/g, '');
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
            
            container.innerHTML = '';
            let count = 0;
            const ahora = new Date();

            evs.forEach(ev => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(ev.fecha); fEv.setHours(h, m);
                if ((ahora - fEv) / 3600000 > 3) return;

                count++;
                let linkID = ev.link.toString().replace('acestream://', '').trim();
                const card = document.createElement('a');
                card.className = 'card';
                card.href = "acestream://" + linkID;
                card.tabIndex = count;
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--main)">${ev.hora}</div>
                    <div style="flex-grow:1; display:flex; align-items:center; color:white; font-weight:bold; font-size:12px; text-align:center;">
                        ${ev.e1} ${ev.e2 ? 'vs ' + ev.e2 : ''}
                    </div>
                    <div class="status-btn">VER AHORA</div>
                `;
                container.appendChild(card);
            });

            while(count < 9) {
                count++;
                container.innerHTML += '<div class="card empty"></div>';
            }
            if(container.firstChild) container.firstChild.focus();
        } catch(e) { container.innerHTML = "Error cargando eventos"; }
    }

    // Navegación Básica
    document.addEventListener('keydown', (e) => {
        const current = document.activeElement;
        const cards = Array.from(document.querySelectorAll('.card'));
        const index = cards.indexOf(current);
        if (index === -1) return;
        let next = index;
        if (e.key === 'ArrowRight') next = index + 1;
        if (e.key === 'ArrowLeft') next = index - 1;
        if (e.key === 'ArrowDown') next = index + 3;
        if (e.key === 'ArrowUp') next = index - 3;
        if (cards[next]) cards[next].focus();
    });

    // Bucle de comprobación
    checkAuth();
    setInterval(checkAuth, 10000); // Comprueba cada 10 seg si ya lo has autorizado
</script>
</body>
</html>
