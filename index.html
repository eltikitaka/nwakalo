<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; --grey: #222; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 40px; text-align: center; overflow-x: hidden;
        }

        .btn-refresh {
            position: fixed; top: 25px; right: 25px;
            background: rgba(0, 255, 136, 0.1); border: 1px solid var(--main);
            color: var(--main); padding: 12px 25px; border-radius: 50px;
            cursor: pointer; font-size: 14px; z-index: 100; font-weight: bold;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .btn-refresh:hover { background: var(--main); color: #000; box-shadow: 0 0 20px var(--main); }

        h1 { 
            color: var(--main); letter-spacing: 12px; text-transform: uppercase; 
            margin-bottom: 50px; font-size: 45px; font-weight: 900;
            text-shadow: 0 0 20px rgba(0,255,136,0.2);
        }

        /* DISEÑO FIJO 3X3 */
        #agenda { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            max-width: 1400px; 
            margin: auto; 
        }

        .card { 
            background: var(--card); border-radius: 25px; padding: 25px; 
            border: 1px solid #222; position: relative; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-height: 320px;
        }
        .card:hover { border-color: var(--main); transform: translateY(-5px); }

        /* ESTILO PARA CUADROS DE RELLENO */
        .card.placeholder { opacity: 0.4; border: 1px dashed #333; background: rgba(255,255,255,0.02); }
        .card.placeholder:hover { transform: none; border-color: #333; }

        .hora-badge { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--main); color: #000; padding: 4px 12px; 
            border-radius: 10px; font-weight: 900; font-size: 14px;
        }

        .vs-container { 
            display: flex; align-items: center; justify-content: center; 
            gap: 15px; margin: 35px 0 15px 0; width: 100%;
        }

        .img-box { 
            background: #ffffff; width: 85px; height: 85px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden;
            border: 4px solid #333;
        }

        .img-box img { width: 75%; height: 75%; object-fit: contain; }
        .vs-text { font-weight: 900; color: var(--main); font-size: 18px; font-style: italic; }

        .nombres h3 { margin: 10px 0; font-size: 20px; color: #fff; letter-spacing: 0.5px; }
        .canal-txt { color: #555; text-transform: uppercase; font-size: 12px; font-weight: bold; letter-spacing: 1px; }
        
        .btn-link {
            display: block; width: 100%; max-width: 200px;
            background: #1a1a1a; color: var(--main); text-decoration: none; text-align: center; 
            padding: 14px; border-radius: 15px; font-weight: 900; margin-top: 15px;
            border: 1px solid #333; transition: 0.2s; text-transform: uppercase;
        }

        .btn-link.locked { background: #111; color: #333; border-color: #222; cursor: not-allowed; }
        .wait-msg { font-size: 10px; color: #ff9f43; margin-top: 8px; font-weight: bold; }

        #status { margin-top: 50px; color: #333; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <button class="btn-refresh" onclick="cargarAgenda()">🔄 ACTUALIZAR</button>

    <h1>NWAKALO TV</h1>

    <div id="agenda"></div>
    <div id="status">Sincronizando con NWAKALO Server...</div>

<script>
    const URL_RAW = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/refs/heads/main/eventos.json';

    async function cargarAgenda() {
        const container = document.getElementById('agenda');
        const status = document.getElementById('status');
        
        try {
            const resp = await fetch(URL_RAW + '?v=' + Date.now());
            let base64Data = await resp.text();
            base64Data = base64Data.replace(/["\s]/g, '').trim();
            
            let eventos = [];
            if(base64Data && base64Data.length > 10) {
                const jsonStr = decodeURIComponent(escape(window.atob(base64Data)));
                eventos = JSON.parse(jsonStr);
            }

            container.innerHTML = '';
            const ahora = new Date();
            let eventosMostrados = 0;

            // 1. RENDERIZAR EVENTOS REALES
            eventos.forEach(ev => {
                const [horas, minutos] = ev.hora.split(':');
                const fechaEvento = new Date();
                fechaEvento.setHours(parseInt(horas), parseInt(minutos), 0);

                const difMinutos = (fechaEvento - ahora) / (1000 * 60);
                const horasPasadas = (ahora - fechaEvento) / (1000 * 60 * 60);

                if (horasPasadas > 3) return; 

                eventosMostrados++;
                const estaDisponible = difMinutos <= 15;
                const isSingle = !ev.e2 || ev.e2.trim() === "";
                
                const card = document.createElement('div');
                card.className = `card ${isSingle ? 'single-mode' : ''}`;
                
                let l1 = ev.logo1.includes('http') ? ev.logo1 : `assets/equipos/${ev.logo1}`;
                let l2 = ev.logo2 && !isSingle ? (ev.logo2.includes('http') ? ev.logo2 : `assets/equipos/${ev.logo2}`) : '';

                card.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img src="${l1}" onerror="this.src='assets/default.png'"></div>
                        ${!isSingle ? `<div class="vs-text">VS</div><div class="img-box"><img src="${l2}" onerror="this.src='assets/default.png'"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${ev.e2 ? ' <span style="color:var(--main); font-size:14px;">vs</span> ' + ev.e2 : ''}</h3>
                    </div>
                    ${estaDisponible 
                        ? `<a href="acestream://${ev.link}" class="btn-link">VER AHORA</a>` 
                        : `<div class="btn-link locked">BLOQUEADO</div><div class="wait-msg">Disponible a las ${calcularHoraApertura(ev.hora)}</div>`
                    }
                `;
                container.appendChild(card);
            });

            // 2. RENDERIZAR RELLENO (Hasta llegar a 9)
            const minEventos = 9;
            for (let i = eventosMostrados; i < minEventos; i++) {
                const dummy = document.createElement('div');
                dummy.className = 'card placeholder';
                dummy.innerHTML = `
                    <div class="vs-container">
                        <div class="img-box" style="background:#1a1a1a; border-color:#222;">
                            <img src="assets/default.png" style="opacity:0.2; filter:grayscale(1);">
                        </div>
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">PRÓXIMO EVENTO</div>
                        <h3 style="color:#333;">A PROGRAMAR</h3>
                    </div>
                    <div class="btn-link locked" style="border-style:dashed;">PRÓXIMAMENTE</div>
                `;
                container.appendChild(dummy);
            }

            status.innerText = "Sincronizado: " + ahora.toLocaleTimeString();
        } catch (e) {
            console.error(e);
            status.innerHTML = "<b style='color:#ff4444'>ERROR: Código no válido.</b>";
        }
    }

    function calcularHoraApertura(horaEvento) {
        const [h, m] = horaEvento.split(':');
        let fecha = new Date();
        fecha.setHours(h, m, 0);
        fecha.setMinutes(fecha.getMinutes() - 15);
        return fecha.getHours().toString().padStart(2, '0') + ":" + fecha.getMinutes().toString().padStart(2, '0');
    }

    cargarAgenda();
    setInterval(cargarAgenda, 60000);
</script>
</body>
</html>
