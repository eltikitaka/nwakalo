<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - NOMBRES VISIBLES</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; background: var(--bg); color: #fff; 
            font-family: sans-serif; padding: 10px; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        h1 { 
            color: var(--main); text-align: center; font-size: 20px; 
            letter-spacing: 12px; margin-bottom: 15px; text-transform: uppercase; 
        }

        #agenda { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: calc(33.33vh - 25px); 
            gap: 12px; width: 100%; flex-grow: 1;
        }
        
        .card { 
            background: var(--card); border-radius: 18px; border: 2px solid #222; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; padding: 10px; 
            text-decoration: none; color: inherit; transition: 0.15s; outline: none;
        }

        .card:focus { 
            border-color: var(--main); background: #181818; 
            transform: scale(1.04); box-shadow: 0 0 20px rgba(0,255,136,0.2);
            z-index: 10;
        }
        
        .card.blocked { opacity: 0.5; pointer-events: none; }
        .card.empty { border: 2px dashed #222; background: transparent; opacity: 0.15; }

        .fecha-badge { 
            position: absolute; top: 10px; left: 10px; 
            background: var(--main); color: #000; 
            padding: 2px 10px; border-radius: 5px; 
            font-weight: bold; font-size: 11px; 
        }

        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; gap: 15px; margin-bottom: 10px; }
        
        .img-box { 
            background: #fff; width: 95px; height: 95px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; border: 3px solid #333; 
        }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }
        
        /* AJUSTE CRÍTICO DE NOMBRES */
        .nombres { 
            text-align: center; 
            width: 100%; 
            padding: 0 5px;
            display: flex;
            justify-content: center;
        }
        
        .nombres h3 { 
            font-size: 13px; 
            color: #ffffff; 
            text-transform: uppercase; 
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            width: 100%;
        }

        .status-btn { 
            width: 80%; padding: 6px; border-radius: 10px; font-size: 10px; 
            border: 1px solid var(--main); text-transform: uppercase; 
            font-weight: bold; text-align: center; margin-top: 12px; color: var(--main);
        }
        .card:focus .status-btn { background: var(--main); color: #000; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';

    function resolverRuta(logo) {
        if (!logo || logo === "" || logo === "undefined") return ASSETS + 'default.png';
        if (logo.includes('/')) return ASSETS + 'equipos/' + logo.trim();
        return ASSETS + 'deporte/' + (logo.includes('.') ? logo : logo + '.png');
    }

    async function actualizarTV() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const b64 = text.trim().replace(/["\s]/g, '');
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
            
            evs.sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));
            container.innerHTML = '';
            const ahora = new Date();
            let count = 0;

            evs.forEach((ev) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(ev.fecha); 
                fEv.setHours(h, m, 0);
                if ((ahora - fEv) / 3600000 > 3) return; 

                const estaBloqueado = (fEv - ahora) / 60000 > 15;
                count++;

                const card = document.createElement('a');
                card.className = `card ${estaBloqueado ? 'blocked' : ''}`;
                card.href = estaBloqueado ? "#" : "acestream://" + ev.link;

                const tieneRival = ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined";
                const textoEquipos = tieneRival ? `${ev.e1} - ${ev.e2}` : ev.e1;

                card.innerHTML = `
                    <div class="fecha-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img src="${resolverRuta(ev.logo1)}" onerror="this.src='${ASSETS}default.png'"></div>
                        ${tieneRival ? `<b style="color:var(--main); font-size: 16px;">VS</b><div class="img-box"><img src="${resolverRuta(ev.logo2)}" onerror="this.src='${ASSETS}default.png'"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <h3>${textoEquipos}</h3>
                    </div>
                    <div class="status-btn">${estaBloqueado ? 'BLOQUEADO' : 'VER AHORA'}</div>
                `;
                container.appendChild(card);
            });

            while (count < 9) {
                count++;
                const empty = document.createElement('div');
                empty.className = 'card empty';
                empty.innerHTML = '<h4 style="color:#222; font-size:9px;">SIN EVENTO</h4>';
                container.appendChild(empty);
            }

            const first = container.querySelector('.card:not(.empty)');
            if(first) first.focus();

        } catch (e) { console.log("Error de datos"); }
    }

    document.addEventListener('keydown', (e) => {
        const current = document.activeElement;
        if (!current || !current.classList.contains('card')) return;
        const cards = Array.from(document.querySelectorAll('.card'));
        const index = cards.indexOf(current);
        let next = index;
        if (e.key === 'ArrowRight' && (index + 1) % 3 !== 0) next = index + 1;
        if (e.key === 'ArrowLeft' && index % 3 !== 0) next = index - 1;
        if (e.key === 'ArrowDown') next = index + 3;
        if (e.key === 'ArrowUp') next = index - 3;
        if (cards[next] && !cards[next].classList.contains('empty')) {
            cards[next].focus();
            e.preventDefault();
        }
    });

    actualizarTV();
    setInterval(actualizarTV, 60000);
</script>
</body>
</html>
