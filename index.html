<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV - AUTO-CLEAN GRID</title>
    <style>
        /* --- ESTILO BASE --- */
        body { 
            background: #0a0a0a; color: #ffffff; font-family: 'Arial Black', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            user-select: none; height: 100vh; display: flex; flex-direction: column;
        }
        
        header { height: 8vh; display: flex; align-items: center; padding-left: 20px; flex-shrink: 0; border-bottom: 1px solid #222; }
        h1 { font-size: 2.5vh; margin: 0; font-style: italic; letter-spacing: -1px; color: #fff; }
        .logo-tv { border: 2px solid #00ff88; color: #00ff88; padding: 0 8px; margin-left: 10px; font-style: normal; }

        /* --- SEGURIDAD --- */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center;
        }

        /* --- CONTENIDO PRINCIPAL (3X3) --- */
        #app-principal { display: none; height: 100vh; }

        .grid-dazn { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-auto-rows: 28vh; 
            gap: 1.5vh;
            padding: 20px;
            height: 92vh;
            overflow-y: auto;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        /* --- TARJETA --- */
        .tarjeta-dazn {
            background: #151515; border: 4px solid transparent; 
            display: flex; flex-direction: column;
            text-decoration: none; color: white; transition: all 0.2s;
            outline: none; overflow: hidden; box-sizing: border-box;
            position: relative;
        }

        .tarjeta-dazn:focus { 
            border-color: #00ff88; background: #222;
            transform: scale(1.03); z-index: 10;
        }

        .tarjeta-pendiente {
            border: 2px dashed #222; display: flex; justify-content: center; 
            align-items: center; color: #333; font-size: 1.6vh; text-align: center;
        }

        /* CONTENEDORES INTERNOS */
        .img-contenedor { 
            height: 55%; background: #1a1a1a; display: flex; 
            justify-content: center; align-items: center; gap: 15px; position: relative; 
        }
        .img-contenedor img { max-width: 25%; max-height: 70%; object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        
        .live-tag { 
            position: absolute; top: 8px; left: 8px; background: #e50914; 
            padding: 3px 8px; font-size: 1.1vh; font-weight: bold; border-radius: 2px;
        }

        .info-contenedor { 
            padding: 10px; flex-grow: 1; display: flex; 
            flex-direction: column; justify-content: center; text-align: center;
        }
        .partido-nombres { font-size: 1.7vh; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .opcion-n { color: #00ff88; font-size: 1.3vh; font-weight: bold; margin-bottom: 2px; }
        .detalles { font-size: 1.4vh; color: #aaa; }

        .grid-dazn::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="pantalla-bloqueo">
        <h1 style="color:#e50914;">ACCESO RESTRINGIDO</h1>
        <p style="color: #666;">Contacta con el administrador para activar tu dispositivo</p>
        <div id="mi-id-visual" style="color:yellow; margin-top:20px; font-size:20px; border: 1px dashed yellow; padding: 10px;"></div>
    </div>

    <div id="app-principal">
        <header>
            <h1>NWAKALO<span class="logo-tv">TV</span></h1>
        </header>
        <div id="contenedor-grid" class="grid-dazn"></div>
    </div>

    <script>
        const HORAS_CADUCIDAD = 8; // Tiempo tras el cual el partido desaparece de la parrilla

        async function verificarAcceso() {
            let idPropio = localStorage.getItem('nwa_device_id') || 'NWA-' + Math.random().toString(36).substring(2, 9).toUpperCase();
            localStorage.setItem('nwa_device_id', idPropio);

            try {
                const res = await fetch('autorizados.json?t=' + Date.now());
                const autorizados = await res.json();
                if (autorizados.includes(idPropio)) {
                    document.getElementById('app-principal').style.display = 'block';
                    await cargarCartelera();
                } else {
                    document.getElementById('pantalla-bloqueo').style.display = 'flex';
                    document.getElementById('mi-id-visual').innerText = idPropio;
                }
            } catch (e) { console.error("Error acceso:", e); }
        }

        async function cargarCartelera() {
            try {
                const res = await fetch('eventos.json?t=' + Date.now());
                const data = await res.json();
                const grid = document.getElementById('contenedor-grid');
                grid.innerHTML = "";
                
                const ahora = new Date();
                let totalItems = 0;

                // 1. FILTRADO POR TIEMPO Y ORDENACIÓN
                const eventosActivos = data.filter(ev => {
                    const inicio = new Date(`${ev.fecha}T${ev.hora}`);
                    const expiracion = new Date(inicio.getTime() + (HORAS_CADUCIDAD * 60 * 60 * 1000));
                    return ahora < expiracion; // Solo mostramos si no han pasado 8h del inicio
                }).sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));

                // 2. RENDERIZADO DE TARJETAS
                eventosActivos.forEach((p) => {
                    // Ruta dinámica basada en el ID de la liga
                    const path = `assets/equipos/${p.liga}/`;
                    
                    p.links.forEach((id_ace, index) => {
                        totalItems++;
                        const card = document.createElement('a');
                        card.className = 'tarjeta-dazn';
                        card.href = `acestream://${id_ace}`;
                        card.tabIndex = 0;
                        
                        // Formateo de fecha para visualización (DD/MM)
                        const fArr = p.fecha.split('-');
                        const fechaVisual = `${fArr[2]}/${fArr[1]}`;

                        card.innerHTML = `
                            <div class="img-contenedor">
                                <div class="live-tag">LIVE</div>
                                <img src="${path}${p.logo1}" onerror="this.src='assets/default.png'">
                                <img src="${path}${p.logo2}" onerror="this.src='assets/default.png'">
                            </div>
                            <div class="info-contenedor">
                                <div class="partido-nombres">${p.e1} vs ${p.e2}</div>
                                <div class="opcion-n">OPCIÓN ${index + 1} - ${p.canal}</div>
                                <div class="detalles">📅 ${fechaVisual} | 🕒 ${p.hora}</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                });

                // 3. RELLENO DE CELDAS VACÍAS (Hasta completar 9)
                while (totalItems < 9) {
                    const empty = document.createElement('div');
                    empty.className = 'tarjeta-dazn tarjeta-pendiente';
                    empty.tabIndex = 0;
                    empty.innerHTML = "<div>PENDIENTE DE<br>PROGRAMACIÓN</div>";
                    grid.appendChild(empty);
                    totalItems++;
                }

                // Foco inicial en el primer elemento para control remoto
                const first = document.querySelector('.tarjeta-dazn');
                if (first) first.focus();

            } catch (e) { 
                console.error("Error cartelera:", e); 
                document.getElementById('contenedor-grid').innerHTML = "<p style='padding:20px; color:red;'>Error cargando eventos.json</p>";
            }
        }

        // Gestión de scroll automático al navegar con flechas (Smart TV)
        document.addEventListener('focusin', (e) => {
            if (e.target.classList.contains('tarjeta-dazn')) {
                e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        // Botón atrás para cerrar o volver
        window.addEventListener('keydown', (e) => {
            if (e.key === "Backspace" || e.key === "Escape" || e.keyCode === 10009) {
                if (confirm("¿Deseas salir de la aplicación?")) window.history.back();
            }
        });

        verificarAcceso();
    </script>
</body>
</html>
