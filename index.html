<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV - FINAL VITAMINADA</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; overflow-y: auto; }
        h1 { color: var(--main); text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; }
        #agenda { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        
        /* Convertimos la card en enlace */
        .card { background: var(--card); border-radius: 20px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding: 15px; min-height: 260px; text-decoration: none; color: inherit; transition: 0.2s; }
        .card:focus { border-color: var(--main); background: #1a1a1a; transform: scale(1.03); outline: none; }
        
        .fecha-badge { position: absolute; top: 10px; left: 10px; background: var(--main); color: #000; padding: 3px 10px; border-radius: 6px; font-weight: bold; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .fecha-badge span { font-size: 9px; opacity: 0.8; }

        .vs-container { display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 15px; gap: 15px; }
        
        /* Logos más grandes (90px) y destacados */
        .img-box { background: #fff; width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 3px solid #333; transition: 0.2s; }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }
        .card:focus .img-box { border-color: var(--main); transform: scale(1.1); }
        
        .nombres { text-align: center; width: 100%; margin-top: 5px; }
        
        /* Nombres más pequeños (13px) y compactos */
        .nombres h3 { margin: 5px 0; font-size: 13px; color: #eee; line-height: 1.2; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .canal-txt { color: var(--main); font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        
        .status-btn { width: 90%; background: #000; color: var(--main); padding: 8px; border-radius: 10px; font-size: 10px; border: 1px solid var(--main); text-transform: uppercase; margin-top: 15px; text-align: center; font-weight: bold; }
        .card:focus .status-btn { background: var(--main); color: #000; }

        .error-msg { grid-column: 1/-1; text-align: center; padding: 100px; color: #444; border: 2px dashed #222; border-radius: 20px; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    const ASSETS = REPO + 'assets/';

    function resolverRuta(logo) {
        if (!logo || logo === "undefined" || logo === "") return ASSETS + 'default.png';
        const limpio = logo.trim();
        if (limpio.includes('/')) return ASSETS + 'equipos/' + limpio;
        return ASSETS + 'deporte/' + (limpio.includes('.') ? limpio : limpio + '.png');
    }

    async function actualizarTV() {
        const container = document.getElementById('agenda');
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            
            // Limpieza extrema del Base64
            const b64 = text.trim().replace(/["\s]/g, '');
            
            let evs = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
            
            // Ordenar: Primero por fecha, luego por hora
            evs.sort((a, b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));

            container.innerHTML = '';
            const ahora = new Date();

            evs.forEach((ev, i) => {
                const [h, m] = ev.hora.split(':');
                const fEv = new Date(ev.fecha); 
                fEv.setHours(h, m, 0);
                
                // Caducidad: Ocultar si pasaron más de 6 horas del inicio (Margen seguro)
                if ((ahora - fEv) / 3600000 > 6) return; 

                const tieneRival = ev.e2 && ev.e2 !== "" && ev.e2 !== "undefined";
                
                // Creamos un enlace real para AceStream
                const card = document.createElement('a');
                card.className = 'card';
                card.href = "acestream://" + ev.link;
                card.tabIndex = i + 1;

                card.innerHTML = `
                    <div class="fecha-badge"><span>${ev.fecha || ''}</span>${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo1)}" onerror="this.src='${ASSETS}default.png'">
                        </div>
                        ${tieneRival ? `
                        <b style="color:var(--main); font-size: 16px; opacity:0.8;">VS</b>
                        <div class="img-box">
                            <img src="${resolverRuta(ev.logo2)}" onerror="this.src='${ASSETS}default.png'">
                        </div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1}${tieneRival ? '<br>vs<br>' + ev.e2 : ''}</h3>
                    </div>
                    <div class="status-btn">VER EVENTO</div>
                `;
                container.appendChild(card);
            });

            // Lógica de Pantalla Vacía
            if (container.innerHTML === '') {
                container.innerHTML = `
                    <div class="error-msg">
                        <h2 style="letter-spacing:5px; opacity:0.5;">SIN EVENTOS ACTIVOS</h2>
                        <p style="font-size:12px; margin-top:10px;">La agenda se actualizará automáticamente cuando haya partidos.</p>
                    </div>`;
            }

            if(container.firstChild) container.firstChild.focus();

        } catch (e) { 
            console.log("Error de carga"); 
            container.innerHTML = `<div class="error-msg">FALLO DE CONEXIÓN CON GITHUB<br><small>${e.message}</small></div>`;
        }
    }

    actualizarTV();
    setInterval(actualizarTV, 60000); // Recarga cada minuto
</script>
</body>
</html>
