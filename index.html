<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÚNKER TV PRO</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #121212; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 40px; overflow-x: hidden;
        }

        /* BOTÓN REFRESCAR */
        .btn-refresh {
            position: fixed; top: 25px; right: 25px;
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: #fff; padding: 12px 25px; border-radius: 50px;
            cursor: pointer; font-size: 14px; z-index: 100;
            transition: 0.3s; backdrop-filter: blur(10px);
            font-weight: bold; letter-spacing: 1px;
        }
        .btn-refresh:hover { background: var(--main); color: #000; border-color: var(--main); box-shadow: 0 0 15px var(--main); }

        h1 { text-align: center; color: var(--main); letter-spacing: 8px; text-transform: uppercase; margin-bottom: 50px; font-size: 35px; text-shadow: 0 0 10px rgba(0,255,136,0.3); }

        .agenda-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); 
            gap: 30px; 
            max-width: 1400px;
            margin: auto;
        }

        .card { 
            background: var(--card); border-radius: 25px; padding: 30px; 
            border: 1px solid #222; position: relative; transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { border-color: var(--main); transform: translateY(-5px); }

        .hora-badge { 
            position: absolute; top: 20px; left: 20px; 
            background: var(--main); color: #000; padding: 5px 15px; 
            border-radius: 12px; font-weight: 900; font-size: 15px;
        }

        .canal-badge {
            position: absolute; top: 22px; right: 25px;
            color: #555; font-size: 13px; font-weight: bold; text-transform: uppercase;
        }

        /* LOGOS CON FONDO BLANCO CIRCULAR */
        .vs-container { 
            display: flex; align-items: center; justify-content: center; 
            gap: 25px; margin: 40px 0 20px 0; width: 100%;
        }

        .img-box { 
            background: #ffffff; width: 100px; height: 100px; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; overflow: hidden;
            border: 4px solid #222; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        .card:hover .img-box { border-color: #fff; }

        .img-box img { width: 70%; height: 70%; object-fit: contain; }

        .vs-text { font-weight: 900; color: #333; font-size: 20px; background: #222; padding: 5px 10px; border-radius: 8px; color: var(--main); }

        .nombres { text-align: center; margin-bottom: 20px; width: 100%; }
        .nombres h3 { margin: 10px 0; font-size: 22px; letter-spacing: 0.5px; color: #eee; }
        
        .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }

        .btn-link {
            background: #1a1a1a; color: #fff;
            text-decoration: none; text-align: center; padding: 14px;
            border-radius: 15px; font-weight: bold; font-size: 13px;
            border: 1px solid #333; transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-link:hover { background: var(--main); color: #000; border-color: var(--main); }

        /* MODO LOGO ÚNICO (Ciclismo, F1...) */
        .single-mode .img-box { width: 140px; height: 140px; }
        .single-mode .vs-text { display: none; }

        #msg { text-align: center; color: #444; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <button class="btn-refresh" onclick="cargarAgenda()">🔄 REFRESCAR</button>

    <h1>BÚNKER TV</h1>

    <div id="agenda" class="agenda-container">
        </div>
    
    <div id="msg">Cargando eventos desde el búnker...</div>

<script>
    // URL RAW DE TU GITHUB
    const URL_AGENDA = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/refs/heads/main/eventos.json'; 

    async function cargarAgenda() {
        const container = document.getElementById('agenda');
        const msg = document.getElementById('msg');
        msg.innerText = "Buscando actualizaciones...";

        try {
            // El ?nocache evita que el navegador guarde la versión vieja del archivo
            const resp = await fetch(URL_AGENDA + '?nocache=' + Date.now());
            if (!resp.ok) throw new Error('Error al conectar');
            
            const eventos = await resp.json();
            
            renderizar(eventos);
            msg.innerText = "Sincronizado con éxito";
        } catch (e) {
            console.error(e);
            msg.innerText = "Error al conectar con GitHub";
            if(container.innerHTML === "") {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:red;">No se pudo cargar la agenda. Revisa la conexión.</p>';
            }
        }
    }

    function renderizar(eventos) {
        const container = document.getElementById('agenda');
        container.innerHTML = '';

        if(eventos.length === 0) {
            container.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#555;">No hay eventos activos en la agenda.</p>';
            return;
        }

        eventos.forEach(ev => {
            // Si no hay e2, es modo logo único
            const isSingle = !ev.e2 || ev.e2.trim() === "";
            const card = document.createElement('div');
            card.className = `card ${isSingle ? 'single-mode' : ''}`;
            
            // Lógica de rutas de logos (asegurando fondo blanco)
            // Si el logo ya tiene la ruta completa no la tocamos, si no, la construimos
            let logo1 = ev.logo1.includes('http') ? ev.logo1 : `assets/equipos/${ev.logo1}`;
            let logo2 = ev.logo2 ? (ev.logo2.includes('http') ? ev.logo2 : `assets/equipos/${ev.logo2}`) : '';

            card.innerHTML = `
                <div class="hora-badge">${ev.hora}</div>
                <div class="canal-badge">${ev.canal}</div>
                
                <div class="vs-container">
                    <div class="img-box">
                        <img src="${logo1}" onerror="this.src='assets/deporte/${ev.logo1.split('/').pop()}'; this.onerror=function(){this.src='assets/default.png'};">
                    </div>
                    
                    ${!isSingle ? `<div class="vs-text">VS</div>` : ''}
                    
                    ${!isSingle ? `
                        <div class="img-box">
                            <img src="${logo2}" onerror="this.src='assets/default.png'">
                        </div>
                    ` : ''}
                </div>

                <div class="nombres">
                    <h3>${ev.e1}${ev.e2 ? ' <span style="color:var(--main)">vs</span> ' + ev.e2 : ''}</h3>
                </div>

                <div class="links-grid">
                    ${ev.links.map((link, index) => `
                        <a href="acestream://${link}" class="btn-link">OPCIÓN ${index + 1}</a>
                    `).join('')}
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Carga automática al abrir
    cargarAgenda();

    // Refrescar automáticamente cada 5 minutos por si se te olvida darle al botón
    setInterval(cargarAgenda, 300000);
</script>
</body>
</html>
