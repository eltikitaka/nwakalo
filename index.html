<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO TV PRO</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --card: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; width: 100vw; background: var(--bg); 
            color: #fff; font-family: sans-serif; overflow: hidden;
            display: flex; flex-direction: column; padding: 10px;
        }

        h1 { 
            color: var(--main); text-align: center; font-size: 28px; 
            letter-spacing: 10px; margin-bottom: 10px; text-transform: uppercase;
        }

        /* CUADRICULA 3X3 SIN FALLOS */
        #agenda { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, 30vh); /* CADA FILA OCUPA EXACTO EL 30% DEL ALTO */
            gap: 10px; 
            width: 100%;
        }

        .card { 
            background: var(--card); border-radius: 15px; border: 1px solid #222;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; padding: 5px;
        }

        /* EVENTOS VACÍOS SIN LOGOS ROTOS */
        .card.placeholder { opacity: 0.15; border: 1px dashed #444; }
        .card.placeholder .vs-container, .card.placeholder .img-box { display: none; }

        .hora-badge { 
            position: absolute; top: 8px; left: 8px; 
            background: var(--main); color: #000; padding: 2px 8px; 
            border-radius: 5px; font-weight: bold; font-size: 12px;
        }

        .vs-container { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .img-box { 
            background: #fff; width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .img-box img { width: 80%; height: 80%; object-fit: contain; }

        .nombres { text-align: center; width: 100%; }
        .nombres h3 { font-size: 16px; margin: 2px 0; color: #fff; }
        .canal-txt { color: #555; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .btn-link {
            width: 80%; background: #222; color: var(--main); 
            padding: 8px; border-radius: 10px; font-weight: bold; 
            font-size: 12px; border: 1px solid #333; text-decoration: none; margin-top: 5px;
        }
        .btn-link.locked { color: #444; border-color: #1a1a1a; }
    </style>
</head>
<body>

    <h1>NWAKALO TV</h1>
    <div id="agenda"></div>

<script>
    const URL_RAW = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/refs/heads/main/eventos.json';

    async function cargar() {
        try {
            const r = await fetch(URL_RAW + '?nocache=' + Date.now());
            let data = await r.text();
            data = data.replace(/["\s]/g, '').trim();
            
            let evs = [];
            if(data.length > 10) {
                evs = JSON.parse(decodeURIComponent(escape(window.atob(data))));
            }

            const container = document.getElementById('agenda');
            container.innerHTML = '';
            const ahora = new Date();
            let count = 0;

            // Pintar eventos reales
            evs.forEach(ev => {
                if(count >= 9) return;
                const [h, m] = ev.hora.split(':');
                const f = new Date(); f.setHours(h, m, 0);
                const dif = (f - ahora) / 60000;
                
                if ((ahora - f) / 3600000 > 3) return; // Borrado tras 3h

                count++;
                const ok = dif <= 15;
                const single = !ev.e2;
                
                const div = document.createElement('div');
                div.className = `card ${single ? 'single' : ''}`;
                div.innerHTML = `
                    <div class="hora-badge">${ev.hora}</div>
                    <div class="vs-container">
                        <div class="img-box"><img src="assets/equipos/${ev.logo1}" onerror="this.src='assets/default.png'"></div>
                        ${!single ? `<b style="color:var(--main)">VS</b><div class="img-box"><img src="assets/equipos/${ev.logo2}" onerror="this.src='assets/default.png'"></div>` : ''}
                    </div>
                    <div class="nombres">
                        <div class="canal-txt">${ev.canal}</div>
                        <h3>${ev.e1} ${ev.e2?'vs '+ev.e2:''}</h3>
                    </div>
                    <div class="btn-link ${ok?'':'locked'}">${ok?'VER AHORA':'BLOQUEADO'}</div>
                `;
                container.appendChild(div);
            });

            // Relleno vacío (Sin logos rotos)
            for (let i = count; i < 9; i++) {
                const dummy = document.createElement('div');
                dummy.className = 'card placeholder';
                dummy.innerHTML = `<div class="canal-txt">LIBRE</div><h3 style="color:#222">A PROGRAMAR</h3>`;
                container.appendChild(dummy);
            }
        } catch (e) { console.log("Error"); }
    }

    cargar();
    setInterval(cargar, 300000); // 5 MINUTOS
</script>
</body>
</html>
