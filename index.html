<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWAKALO TV - Privado</title>
        <style>
        /* --- DISEÑO DAZN --- */
        body { 
            background: #101010; color: #ffffff; font-family: 'Arial Black', sans-serif;
            margin: 0; padding: 20px; overflow-x: hidden;
        }
        h1 { font-size: 35px; margin: 0 0 30px 10px; font-style: italic; letter-spacing: -1px; }
        .logo-tv { border: 3px solid #ffffff; padding: 0 8px; margin-left: 10px; }

        /* --- PANTALLA DE SEGURIDAD --- */
        #pantalla-bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; text-align: center;
        }
        .id-box { 
            background: #1a1a1a; color: #ffff00; padding: 20px; 
            border: 2px dashed #ffff00; margin-top: 20px; font-family: monospace; font-size: 24px; 
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #app-principal { display: none; }

        .fila-dazn { 
            display: flex; gap: 15px; overflow-x: auto; padding: 20px 10px; 
            scrollbar-width: none; -ms-overflow-style: none; 
        }
        .fila-dazn::-webkit-scrollbar { display: none; }

        .tarjeta-dazn {
            min-width: 240px; max-width: 240px; height: 320px; background: #1a1a1a; 
            position: relative; transition: transform 0.2s ease; cursor: pointer;
            border: 4px solid transparent; display: flex; flex-direction: column;
            text-decoration: none; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .tarjeta-dazn:focus, .tarjeta-dazn:hover { 
            transform: scale(1.05); border-color: #ffffff; outline: none; z-index: 10; 
        }

        /* AJUSTE DE ICONOS: Aquí es donde se soluciona el tamaño gigante */
        .img-contenedor { 
            height: 140px; background: #222; display: flex; 
            justify-content: center; align-items: center; gap: 10px; position: relative; 
            padding: 10px;
        }
        .img-contenedor img { 
            max-width: 60px; /* Tamaño máximo del logo */
            max-height: 60px; 
            width: auto; height: auto; 
            object-fit: contain; 
        }
        
        .live-tag { 
            position: absolute; top: 10px; left: 10px; background: #e50914; 
            padding: 3px 8px; font-size: 11px; font-weight: bold; z-index: 2;
        }

        .info-contenedor { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .partido-nombres { font-size: 16px; text-transform: uppercase; line-height: 1.2; font-weight: bold; }
        .opcion-n { color: #ffff00; font-size: 13px; font-weight: bold; margin-top: 5px; }
        .detalles { font-size: 11px; color: #888; margin-top: 5px; text-transform: uppercase; }

        /* Ajuste específico para TV/Fire Stick */
        @media (max-width: 1280px) {
            .tarjeta-dazn { min-width: 200px; height: 280px; }
            .img-contenedor img { max-width: 45px; max-height: 45px; }
        }
    </style>
</head>
<body>

    <!-- 1. BLOQUEO -->
    <div id="pantalla-bloqueo">
        <h1 style="color:#e50914;">ACCESO RESTRINGIDO</h1>
        <p style="font-family: sans-serif;">Dispositivo no autorizado para NWAKALO TV.</p>
        <p style="font-family: sans-serif; color: #aaa;">Envía este código al administrador:</p>
        <div id="mi-id-visual" class="id-box">GENERANDO ID...</div>
    </div>

    <!-- 2. CARTELERA -->
    <div id="app-principal">
        <h1>NWAKALO<span class="logo-tv">TV</span></h1>
        <div id="contenedor-fila" class="fila-dazn"></div>
    </div>

    <script>
        const RUTA_LOGOS = "assets/equipos/";

        async function verificarAcceso() {
            // Generar o recuperar ID del dispositivo
            let idPropio = localStorage.getItem('nwa_device_id');
            if (!idPropio) {
                idPropio = 'NWA-' + Math.random().toString(36).substring(2, 9).toUpperCase();
                localStorage.setItem('nwa_device_id', idPropio);
            }

            try {
                // Leer lista de autorizados (archivo local en la misma carpeta)
                const res = await fetch('autorizados.json?t=' + Date.now());
                if (!res.ok) throw new Error("No se pudo leer autorizados.json");
                
                const autorizados = await res.json();

                if (autorizados.includes(idPropio)) {
                    document.getElementById('app-principal').style.display = 'block';
                    cargarCartelera();
                } else {
                    mostrarBloqueo(idPropio);
                }
            } catch (error) {
                // Si hay error de red, mostramos el ID para que puedas autorizarte
                console.log("Error de seguridad, mostrando ID...");
                mostrarBloqueo(idPropio);
            }
        }

        function mostrarBloqueo(id) {
            document.getElementById('pantalla-bloqueo').style.display = 'flex';
            document.getElementById('mi-id-visual').innerText = id;
        }

        async function cargarCartelera() {
            try {
                const res = await fetch('eventos.json?t=' + Date.now());
                const partidos = await res.json();
                const fila = document.getElementById('contenedor-fila');

                if (partidos.length === 0) {
                    fila.innerHTML = "<p style='margin-left:20px; color:#666;'>No hay partidos hoy.</p>";
                    return;
                }

                partidos.forEach(p => {
                    p.links.forEach((id_ace, index) => {
                        const card = document.createElement('a');
                        card.className = 'tarjeta-dazn';
                        card.href = `acestream://${id_ace}`;
                        card.setAttribute('tabindex', '0');
                        
                        card.innerHTML = `
                            <div class="img-contenedor">
                                <div class="live-tag">LIVE</div>
                                <img src="${RUTA_LOGOS}${p.logo1}">
                                <img src="${RUTA_LOGOS}${p.logo2}">
                            </div>
                            <div class="info-contenedor">
                                <div class="partido-nombres">${p.e1}<br>vs ${p.e2}</div>
                                <div class="opcion-n">OPCIÓN ${index + 1}</div>
                                <div style="font-size:12px; color:#888; margin-top:5px;">${p.canal} | ${p.hora}</div>
                            </div>
                        `;
                        fila.appendChild(card);
                    });
                });
            } catch (e) {
                console.log("Error cargando eventos.json");
            }
        }

        // Iniciar proceso
        verificarAcceso();
    </script>
</body>
</html>
