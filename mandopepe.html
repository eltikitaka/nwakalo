<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANDO PEPE 2.0 - NWAKALO TV</title>
    <style>
        :root { --main: #00ff88; --bg: #0f0f0f; --panel: #1a1a1a; --accent: #007bff; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 1400px; margin: auto; }
        
        .layout { display: flex; gap: 20px; align-items: flex-start; }
        .seccion { background: var(--panel); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        
        /* GRID EQUIPOS CON LOGOS CIRCULARES */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; max-height: 450px; overflow-y: auto; padding: 15px; background: #0a0a0a; border-radius: 10px; border: 1px solid #222; }
        
        .btn-equipo { background: #222; border: 1px solid #444; color: #ccc; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-equipo img { 
            height: 50px; width: 50px; 
            background: #fff; /* FONDO BLANCO */
            padding: 5px; 
            border-radius: 50%; /* CÍRCULO */
            object-fit: contain; 
            margin-bottom: 8px;
            border: 2px solid #444;
        }

        /* BOTONES LIGAS */
        .btn-liga { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 110px; padding: 10px; border: 1px solid #333; background: #222; color: #ccc; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .btn-liga img { height: 40px; width: 40px; background: #fff; padding: 5px; border-radius: 50%; object-fit: contain; }
        .btn-liga.active { background: var(--main) !important; color: #000; border-color: #fff; }

        /* ESTADOS SELECCIÓN */
        .btn-equipo.local { background: var(--accent) !important; color: #fff; border-color: #fff; }
        .btn-equipo.visita { background: #dc3545 !important; color: #fff; border-color: #fff; }
        .btn-equipo.solo-evento { background: #ff9800 !important; color: #000; font-weight: bold; }

        /* INPUTS */
        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 2fr; gap: 15px; margin-top: 15px; background: #111; padding: 15px; border-radius: 10px; }
        input { background: #1e1e1e; color: var(--main); border: 1px solid #444; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; box-sizing: border-box; }
        
        /* GESTOR DE IDs */
        .visor-ids { font-size: 11px; color: #aaa; background: #000; padding: 10px; border-radius: 6px; margin-top: 10px; border: 1px solid #333; min-height: 40px; }
        .id-tag { display: flex; justify-content: space-between; background: #222; padding: 4px 8px; border-radius: 4px; margin-bottom: 4px; border-left: 3px solid var(--main); }

        /* PREVIEW */
        .preview { background: #000; color: var(--main); padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 12px; max-height: 250px; overflow-y: auto; border: 1px solid #333; }
        .cola-item { background: #252525; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 5px solid var(--main); display: flex; justify-content: space-between; align-items: center; }
        
        h3 { color: var(--main); margin: 0 0 15px 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:var(--main); letter-spacing: 4px; margin-bottom: 30px;">🛰️ MANDO PEPE PRO</h2>

    <div class="layout">
        
        <div style="flex: 2.5;">
            <div class="seccion">
                <h3>1. Elegir Competición</h3>
                <div id="listaLigas" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
                
                <h3 style="margin-top:25px;">2. Definir Equipos o Sesión</h3>
                <div id="boxMotor" style="display:none; margin-bottom: 15px;">
                    <input type="text" id="nombre_gp" placeholder="Nombre del Evento (Ej: GP de España, Torneo X...)">
                </div>
                <div id="listaEquipos" class="grid"></div>
            </div>

            <div class="seccion">
                <h3>3. Programación y Enlaces</h3>
                <div class="form-row">
                    <div>
                        <label style="font-size:10px; color:#888;">FECHA:</label>
                        <input type="date" id="fecha">
                    </div>
                    <div>
                        <label style="font-size:10px; color:#888;">HORA:</label>
                        <input type="time" id="hora" value="21:00">
                    </div>
                    <div>
                        <label style="font-size:10px; color:var(--main);">NOMBRE CANAL:</label>
                        <input type="text" id="nombre_canal" placeholder="Ej: DAZN LaLiga">
                    </div>
                    <div>
                        <label style="font-size:10px; color:var(--main);">AÑADIR ID UNA A UNA (+):</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="id_input" placeholder="Pega el hash aquí...">
                            <button onclick="agregarId()" style="background:var(--main); color:#000; font-weight:bold; width:50px; border:none; border-radius:6px; cursor:pointer;">+</button>
                        </div>
                        <div id="visor_ids" class="visor-ids">No hay IDs añadidas.</div>
                    </div>
                </div>
            </div>

            <button onclick="añadirEventoALista()" style="width:100%; background:var(--main); color:#000; font-weight:bold; padding:20px; border:none; border-radius:12px; cursor:pointer; font-size: 1.2rem;">+ AÑADIR A LA PARRILLA</button>
        </div>

        <div style="flex: 1.5;">
            <div class="seccion">
                <h3>PARTIDOS EN COLA</h3>
                <div id="colaPartidos"></div>
                <button onclick="limpiarTodo()" style="background:none; border:none; color:#ff5252; font-size:11px; width:100%; cursor:pointer; margin-top:10px;">🗑️ Vaciar todo</button>
            </div>

            <div class="seccion">
                <h3>CÓDIGO FINAL (eventos.json)</h3>
                <div id="codigoPreview" class="preview">[]</div>
                <button onclick="copiarCodigo()" style="width:100%; margin-top:10px; background:#fff; color:#000; font-weight:bold; padding:15px; border:none; border-radius:8px; cursor:pointer;">📋 COPIAR JSON</button>
            </div>
        </div>
    </div>

<script>
    let BD = {};
    let pTemp = { e1: "", l1: "", e2: "", l2: "", ligaId: "", tipo: "" };
    let idsAcumuladas = [];
    let listaFinal = [];

    document.getElementById('fecha').valueAsDate = new Date();

    fetch('base_datos.json?t=' + Date.now())
        .then(res => res.json())
        .then(data => {
            BD = data;
            renderLigas();
        });

    function renderLigas() {
        const div = document.getElementById('listaLigas');
        div.innerHTML = '';
        Object.keys(BD.ligas).forEach(n => {
            const btn = document.createElement('button');
            btn.className = 'btn-liga';
            btn.innerHTML = `<img src="assets/deporte/${BD.ligas[n].logo}"><span>${n}</span>`;
            btn.onclick = () => {
                document.querySelectorAll('.btn-liga').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                cargarEquipos(n);
            };
            div.appendChild(btn);
        });
    }

    function cargarEquipos(nombreLiga) {
        const liga = BD.ligas[nombreLiga];
        pTemp.ligaId = liga.id;
        pTemp.tipo = (liga.id === "f1" || liga.id === "MotoGP") ? "motor" : "futbol";
        
        document.getElementById('boxMotor').style.display = (pTemp.tipo === "motor") ? "block" : "none";
        const grid = document.getElementById('listaEquipos');
        grid.innerHTML = '';
        pTemp.e1 = ""; pTemp.e2 = "";

        liga.equipos.forEach(eq => {
            const btn = document.createElement('button');
            btn.className = 'btn-equipo';
            btn.innerHTML = `<img src="assets/equipos/${liga.id}/${eq.a}"><br>${eq.n}`;
            btn.onclick = () => {
                if(pTemp.tipo === "motor") {
                    pTemp.e1 = eq.n; pTemp.l1 = eq.a;
                    document.querySelectorAll('.btn-equipo').forEach(b => b.classList.remove('solo-evento'));
                    btn.classList.add('solo-evento');
                } else {
                    if (!pTemp.e1 || (pTemp.e1 && pTemp.e2)) {
                        pTemp.e1 = eq.n; pTemp.l1 = eq.a; pTemp.e2 = "";
                        document.querySelectorAll('.btn-equipo').forEach(b => b.classList.remove('local', 'visita'));
                        btn.classList.add('local');
                    } else {
                        pTemp.e2 = eq.n; pTemp.l2 = eq.a;
                        btn.classList.add('visita');
                    }
                }
            };
            grid.appendChild(btn);
        });
    }

    function agregarId() {
        const input = document.getElementById('id_input');
        const id = input.value.trim();
        if(id.length < 10) return alert("ID no válida");
        idsAcumuladas.push(id);
        input.value = "";
        actualizarVisor();
    }

    function actualizarVisor() {
        const visor = document.getElementById('visor_ids');
        visor.innerHTML = idsAcumuladas.length === 0 ? "No hay IDs añadidas..." : 
            idsAcumuladas.map((id, i) => `<div class="id-tag"><span>Link ${i+1}: ${id.substring(0,10)}...</span> <span onclick="quitarId(${i})" style="color:red; cursor:pointer;">✖</span></div>`).join('');
    }

    function quitarId(i) { idsAcumuladas.splice(i,1); actualizarVisor(); }

    function añadirEventoALista() {
        const canalNombre = document.getElementById('nombre_canal').value;
        const gpExtra = document.getElementById('nombre_gp').value;

        if(!pTemp.e1 || idsAcumuladas.length === 0 || !canalNombre) return alert("Faltan datos (Equipos, Canal o IDs)");

        const nuevo = {
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('hora').value,
            e1: (pTemp.tipo === "motor") ? gpExtra : pTemp.e1,
            logo1: (pTemp.tipo === "motor") ? `deporte/${pTemp.ligaId}.png` : `${pTemp.ligaId}/${pTemp.l1}`,
            e2: (pTemp.tipo === "motor") ? pTemp.e1 : pTemp.e2,
            logo2: (pTemp.tipo === "motor") ? `deporte/${pTemp.ligaId}.png` : `${pTemp.ligaId}/${pTemp.l2}`,
            canal: canalNombre,
            links: [...idsAcumuladas]
        };

        listaFinal.push(nuevo);
        idsAcumuladas = [];
        actualizarVisor();
        actualizarParrilla();
    }

    function actualizarParrilla() {
        const cola = document.getElementById('colaPartidos');
        cola.innerHTML = '';
        listaFinal.forEach((ev, i) => {
            cola.innerHTML += `<div class="cola-item">
                <span><b>${ev.hora}</b> - ${ev.e1} vs ${ev.e2}</span>
                <button onclick="eliminarEvento(${i})" style="background:none; border:none; color:red; cursor:pointer;">✖</button>
            </div>`;
        });
        document.getElementById('codigoPreview').innerText = JSON.stringify(listaFinal, null, 2);
    }

    function eliminarEvento(i) { listaFinal.splice(i,1); actualizarParrilla(); }
    function limpiarTodo() { if(confirm("¿Borrar todo?")) { listaFinal = []; actualizarParrilla(); } }
    
    function copiarCodigo() {
        navigator.clipboard.writeText(document.getElementById('codigoPreview').innerText).then(() => alert("✅ Copiado!"));
    }
</script>
</body>
</html>
