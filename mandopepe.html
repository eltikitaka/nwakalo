<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANDO PEPE 4.0 - BÚNKER EDITION</title>
    <style>
        :root { --main: #00ff88; --bg: #0a0a0a; --panel: #161616; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .pin-card { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #333; text-align: center; }
        #mando-root { display: none; max-width: 1200px; margin: auto; }
        .layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .seccion { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; max-height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; }
        .btn-eq { background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 10px; }
        .btn-eq img { width: 35px; height: 35px; background: #fff; border-radius: 50%; padding: 3px; margin-bottom: 5px; }
        .btn-eq.sel { border-color: var(--main); background: #004422; }
        .btn-liga { background: #222; color: #fff; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 10px; border: 1px solid #444; }
        .btn-liga.active { background: var(--main); color: #000; }
        input, textarea { background: #000; color: var(--main); border: 1px solid #333; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        .btn-main { width: 100%; background: var(--main); color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .item-cola { background: #000; padding: 10px; border-radius: 5px; margin-bottom: 5px; font-size: 11px; border-left: 3px solid var(--main); position: relative; }
        .del-btn { position: absolute; right: 10px; top: 10px; color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="pin-card">
        <h2>NWAKALO BÚNKER</h2>
        <input type="password" id="pin_input" placeholder="Clave Maestra..." style="text-align:center; margin-bottom:15px;">
        <button onclick="acceso()" class="btn-main">ENTRAR</button>
    </div>
</div>

<div id="mando-root">
    <div class="layout">
        <div>
            <div class="seccion">
                <h3>1. Selección de Evento</h3>
                <div id="ligas" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:15px;"></div>
                <div id="equipos" class="grid"></div>
            </div>
            <div class="seccion">
                <h3>2. Datos y Links</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <input type="date" id="f_in">
                    <input type="time" id="h_in" value="21:00">
                    <input type="text" id="c_in" placeholder="Canal (Ej: DAZN 1)">
                </div>
                <input type="text" id="l_in" placeholder="Pegar ID AceStream y pulsar Enter..." onkeydown="if(event.key==='Enter') addLink()">
                <div id="v_links" style="font-size:10px; margin-top:10px; color:#888;"></div>
            </div>
            <button onclick="guardarEvento()" class="btn-main">AÑADIR A MI AGENDA PRIVADA</button>
        </div>

        <div>
            <div class="seccion">
                <h3>Agenda Actual</h3>
                <div id="cola_eventos"></div>
                <button onclick="limpiarExpirados()" style="background:none; border:1px solid #444; color:#666; font-size:10px; width:100%; cursor:pointer; margin-top:10px;">Forzar Limpieza (-3h)</button>
            </div>
            <div class="seccion">
                <h3>Código para GitHub</h3>
                <p style="font-size:9px; color:#666;">Copia este código cifrado en tu eventos.json</p>
                <textarea id="output" readonly style="height:80px; font-size:9px; word-break: break-all;"></textarea>
                <button onclick="copy()" class="btn-main" style="background:#fff;">COPIAR CÓDIGO CIFRADO</button>
            </div>
        </div>
    </div>
</div>

<script>
    let BD = {};
    let agenda = JSON.parse(localStorage.getItem('pepe_agenda') || "[]");
    let current = { e1:"", l1:"", e2:"", l2:"", liga:"", tipo:"" };
    let links = [];

    // ACCESO
    function acceso() {
        if(window.btoa(document.getElementById('pin_input').value) === "THVzaWxlY3RyYV8wMUA=") {
            document.getElementById('bloqueo').style.display='none';
            document.getElementById('mando-root').style.display='block';
            limpiarExpirados();
        }
    }

    // CARGAR BD
    fetch('base_datos.json').then(r => r.json()).then(data => {
        BD = data;
        const div = document.getElementById('ligas');
        Object.keys(BD.ligas).forEach(l => {
            div.innerHTML += `<button class="btn-liga" onclick="verEq('${l}', this)">${l}</button>`;
        });
    });

    function verEq(l, btn) {
        document.querySelectorAll('.btn-liga').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const liga = BD.ligas[l];
        current.liga = liga.id;
        const grid = document.getElementById('equipos');
        grid.innerHTML = "";
        liga.equipos.forEach(eq => {
            const b = document.createElement('button');
            b.className = 'btn-eq';
            b.innerHTML = `<img src="assets/equipos/${liga.id}/${eq.a}"><br>${eq.n}`;
            b.onclick = () => {
                if(!current.e1 || (current.e1 && current.e2)) {
                    current.e1 = eq.n; current.l1 = eq.a; current.e2 = "";
                    document.querySelectorAll('.btn-eq').forEach(x => x.classList.remove('sel'));
                    b.classList.add('sel');
                } else {
                    current.e2 = eq.n; current.l2 = eq.a;
                    b.classList.add('sel');
                }
            };
            grid.appendChild(b);
        });
    }

    function addLink() {
        const val = document.getElementById('l_in').value;
        if(val) { links.push(val); document.getElementById('l_in').value=""; drawLinks(); }
    }

    function drawLinks() {
        document.getElementById('v_links').innerText = "Links: " + links.length;
    }

    function guardarEvento() {
        if(!current.e1 || links.length === 0) return alert("Faltan datos");
        const ev = {
            fecha: document.getElementById('f_in').value,
            hora: document.getElementById('h_in').value,
            e1: current.e1, logo1: `${current.liga}/${current.l1}`,
            e2: current.e2, logo2: `${current.liga}/${current.l2}`,
            canal: document.getElementById('c_in').value,
            links: [...links]
        };
        agenda.push(ev);
        save();
        renderAgenda();
        links = []; current = {e1:"",l1:"",e2:"",l2:"",liga:""};
        document.querySelectorAll('.btn-eq').forEach(x => x.classList.remove('sel'));
    }

    function save() {
        localStorage.setItem('pepe_agenda', JSON.stringify(agenda));
        // CIFRAMOS EN BASE64 PARA GITHUB
        const str = JSON.stringify(agenda);
        document.getElementById('output').value = window.btoa(unescape(encodeURIComponent(str)));
    }

    function renderAgenda() {
        document.getElementById('cola_eventos').innerHTML = agenda.map((e, i) => `
            <div class="item-cola">
                <b>${e.hora}</b> - ${e.e1} vs ${e.e2}
                <span class="del-btn" onclick="borrar(${i})">✖</span>
            </div>
        `).join('');
    }

    function borrar(i) { agenda.splice(i, 1); save(); renderAgenda(); }

    function limpiarExpirados() {
        const ahora = new Date();
        agenda = agenda.filter(ev => {
            const inicio = new Date(`${ev.fecha}T${ev.hora}`);
            const exp = new Date(inicio.getTime() + (3 * 3600000));
            return ahora < exp;
        });
        save();
        renderAgenda();
    }

    function copy() { 
        const area = document.getElementById('output');
        area.select();
        document.execCommand('copy');
        alert("¡Código cifrado copiado! Pégalo en tu eventos.json");
    }

    document.getElementById('f_in').valueAsDate = new Date();
</script>
</body>
</html>
