<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mando Pepe - Programación</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .titulo-principal { color: #00ff88; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        /* Contenedor de Ligas (Ruta: assets/deporte/) */
        .grid-ligas { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 20px; }
        .card-liga { cursor: pointer; transition: 0.3s; text-align: center; padding: 15px; background: #1e1e1e; border-radius: 12px; border: 1px solid #333; }
        .card-liga:hover { border-color: #00ff88; background: #252525; }
        .img-liga { width: 90px; height: 90px; object-fit: contain; }

        /* Contenedor de Equipos (Ruta: assets/equipos/...) */
        .grid-equipos { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .card-equipo { cursor: pointer; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; font-size: 0.75rem; border: 1px solid transparent; }
        .card-equipo:hover { border-color: #00ff88; color: #00ff88; }
        .img-equipo { width: 45px; height: 45px; object-fit: contain; margin-bottom: 5px; }

        /* Zona de Programación */
        .zona-programacion { background: #1e1e1e; padding: 20px; border-radius: 15px; border-left: 5px solid #00ff88; margin-bottom: 30px; }
        .slot-equipo { background: #333; padding: 15px; border-radius: 10px; min-height: 80px; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 2px dashed #555; }
        .vs { font-size: 1.5rem; font-weight: bold; color: #00ff88; display: flex; align-items: center; justify-content: center; }

        .hidden { display: none !important; }
        .btn-accion { background-color: #00ff88; color: black; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center titulo-principal mb-4">CONTROL DE PROGRAMACIÓN</h2>

    <!-- BLOQUE 1: CREADOR DE PARTIDO -->
    <div class="zona-programacion shadow">
        <div class="row align-items-center">
            <div class="col-md-4">
                <div id="slot1" class="slot-equipo" onclick="activarSeleccion(1)">
                    <span class="text-muted">Toca para añadir Local</span>
                </div>
            </div>
            <div class="col-md-1 vs">VS</div>
            <div class="col-md-4">
                <div id="slot2" class="slot-equipo" onclick="activarSeleccion(2)">
                    <span class="text-muted">Toca para añadir Visitante</span>
                </div>
            </div>
            <div class="col-md-3">
                <input type="time" id="horaPartido" class="form-control mb-2" value="21:00">
                <button class="btn btn-accion" onclick="guardarProgramacion()">GENERAR PARTIDO</button>
            </div>
        </div>
    </div>

    <!-- SECCIÓN 2: SELECTOR DE DEPORTES/LIGAS (CARPETA assets/deporte/) -->
    <div id="seccionLigas">
        <h5 class="text-muted mb-3">Selecciona una Competición:</h5>
        <div class="grid-ligas">
            <div class="card-liga" onclick="mostrarEquipos('laligaespana')">
                <img src="assets/deporte/1.png" class="img-liga" alt="La Liga">
                <div class="mt-2 small fw-bold">LALIGA ESPAÑA</div>
            </div>
            <div class="card-liga" onclick="mostrarEquipos('premierleague')">
                <img src="assets/deporte/2.png" class="img-liga" alt="PREMIER LEAGUE">
                <div class="mt-2 small fw-bold">PREMIER LEAGUE</div>
            </div>
        </div>
    </div>

    <!-- SECCIÓN 3: LISTADO DE EQUIPOS -->
    <div id="seccionEquipos" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-sm btn-outline-light" onclick="volverALigas()">← Volver</button>
            <h4 id="tituloLiga" class="m-0 text-info"></h4>
            <div style="width: 60px;"></div>
        </div>
        <div id="contenedorEquipos" class="grid-equipos"></div>
    </div>
</div>

<script>
    let equipoSeleccionando = 1; // Controla si estamos eligiendo el 1 o el 2
    let datosPartido = { local: null, visitante: null };

    const datosEquipos = {
        laligaespana: [
            { nombre: "Alavés", archivo: "ala.png" }, { nombre: "Athletic", archivo: "ath.png" },
            { nombre: "Atlético", archivo: "atm.png" }, { nombre: "Barcelona", archivo: "bar.png" },
            { nombre: "Betis", archivo: "bet.png" }, { nombre: "Celta", archivo: "cel.png" },
            { nombre: "Espanyol", archivo: "esp.png" }, { nombre: "Getafe", archivo: "get.png" },
            { nombre: "Girona", archivo: "gir.png" }, { nombre: "Las Palmas", archivo: "lpa.png" },
            { nombre: "Leganés", archivo: "leg.png" }, { nombre: "Mallorca", archivo: "mal.png" },
            { nombre: "Osasuna", archivo: "osa.png" }, { nombre: "Rayo Vallecano", archivo: "ray.png" },
            { nombre: "Real Madrid", archivo: "rma.png" }, { nombre: "Real Sociedad", archivo: "rso.png" },
            { nombre: "Sevilla", archivo: "sev.png" }, { nombre: "Valencia", archivo: "val.png" },
            { nombre: "Valladolid", archivo: "vld.png" }, { nombre: "Villarreal", archivo: "vil.png" }
        ],
        premierleague: [
            { nombre: "AFC Bournemouth", archivo: "bou.png" }, { nombre: "Arsenal FC", archivo: "ars.png" },
            { nombre: "Aston Villa", archivo: "av.png" }, { nombre: "Brentford FC", archivo: "bre.png" },
            { nombre: "Brighton", archivo: "bri.png" }, { nombre: "Burnley FC", archivo: "bur.png" },
            { nombre: "Chelsea FC", archivo: "che.png" }, { nombre: "Crystal Palace", archivo: "cri.png" },
            { nombre: "Everton FC", archivo: "eve.png" }, { nombre: "Fulham FC", archivo: "ful.png" },
            { nombre: "Leeds United", archivo: "lee.png" }, { nombre: "Liverpool FC", archivo: "liv.png" },
            { nombre: "Manchester City", archivo: "manc.png" }, { nombre: "Manchester United", archivo: "manu.png" },
            { nombre: "Newcastle Utd", archivo: "new.png" }, { nombre: "Nottingham Forest", archivo: "not.png" },
            { nombre: "Sunderland AFC", archivo: "sun.png" }, { nombre: "Tottenham", archivo: "tot.png" },
            { nombre: "West Ham", archivo: "whu.png" }, { nombre: "Wolves", archivo: "wol.png" }
        ]
    };

    function activarSeleccion(num) {
        equipoSeleccionando = num;
        document.getElementById(`slot${num}`).style.borderColor = '#00ff88';
        document.getElementById(`slot${num === 1 ? 2 : 1}`).style.borderColor = '#555';
    }

    function mostrarEquipos(liga) {
        document.getElementById('seccionLigas').classList.add('hidden');
        document.getElementById('seccionEquipos').classList.remove('hidden');
        const contenedor = document.getElementById('contenedorEquipos');
        document.getElementById('tituloLiga').innerText = liga.toUpperCase();
        contenedor.innerHTML = '';

        datosEquipos[liga].forEach(equipo => {
            const ruta = `assets/equipos/${liga}/${equipo.archivo}`;
            const div = document.createElement('div');
            div.className = 'card-equipo';
            div.onclick = () => asignarEquipo(equipo.nombre, ruta);
            div.innerHTML = `
                <img src="${ruta}" class="img-equipo" onerror="this.src='assets/equipos/placeholder.png'">
                <div>${equipo.nombre}</div>
            `;
            contenedor.appendChild(div);
        });
    }

    function asignarEquipo(nombre, ruta) {
        const slot = document.getElementById(`slot${equipoSeleccionando}`);
        slot.innerHTML = `
            <img src="${ruta}" style="height:40px; margin-bottom:5px;">
            <div class="fw-bold" style="font-size:0.9rem">${nombre}</div>
        `;
        if (equipoSeleccionando === 1) {
            datosPartido.local = { nombre, ruta };
            activarSeleccion(2); // Salta automáticamente al visitante
        } else {
            datosPartido.visitante = { nombre, ruta };
        }
    }

    function volverALigas() {
        document.getElementById('seccionLigas').classList.remove('hidden');
        document.getElementById('seccionEquipos').classList.add('hidden');
    }

    function guardarProgramacion() {
        if (!datosPartido.local || !datosPartido.visitante) {
            alert("Por favor, selecciona ambos equipos.");
            return;
        }
        const hora = document.getElementById('horaPartido').value;
        const resumen = `PARTIDO PROGRAMADO:\n${datosPartido.local.nombre} vs ${datosPartido.visitante.nombre}\nHora: ${hora}`;
        alert(resumen);
        console.log("Datos para tu base de datos:", { ...datosPartido, hora });
    }
</script>

</body>
</html>
