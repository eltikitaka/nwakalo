<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GENERADOR MAESTRO NWAKALO</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 1200px; margin: auto; }
        .seccion { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; max-height: 350px; overflow-y: auto; padding: 10px; background: #111; border-radius: 8px; }
        
        button { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .btn-liga { padding: 10px; font-weight: bold; border-color: #00ff88; flex: 1; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 120px; }
        .btn-liga img { height: 30px; }
        
        button.local { background: #007bff !important; border-color: #fff; box-shadow: 0 0 10px #007bff; }
        button.visita { background: #dc3545 !important; border-color: #fff; box-shadow: 0 0 10px #dc3545; }
        button.canal-sel, .btn-liga.active { background: #00ff88 !important; color: #000; font-weight: bold; border-color: #fff; }
        
        .preview { background: #000; color: #00ff88; padding: 15px; border-radius: 5px; font-family: 'Courier New', monospace; white-space: pre-wrap; font-size: 11px; max-height: 300px; overflow-y: auto; border: 1px solid #444; }
        
        /* Estilo para los inputs de Fecha y Hora */
        .controles-tiempo { display: flex; gap: 15px; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-top: 10px; }
        input { background: #1e1e1e; color: #00ff88; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 14px; font-weight: bold; }
        
        #listaEquipos img { height: 35px; margin-bottom: 5px; }
        .cola-item { background: #252525; padding: 10px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00ff88; font-size: 13px; }
        .fecha-badge { background: #00ff88; color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; margin-right: 10px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#00ff88;">CONSTRUCTOR NWAKALO - FECHA Y HORA</h2>

    <div style="display: flex; gap: 20px;">
        <div style="flex: 2.2;">
            <div class="seccion">
                <h3>1. Competición y Equipos</h3>
                <div id="listaLigas" style="display: flex; gap: 10px; flex-wrap: wrap;">Cargando base de datos...</div>
                <div id="listaEquipos" class="grid" style="margin-top:15px;"></div>
            </div>

            <div class="seccion">
                <h3>2. Canal y Programación</h3>
                <div style="display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap;">
                    <div style="flex: 1;">
                        <p style="font-size: 11px; color: #888; margin-bottom: 5px;">Selecciona Canal:</p>
                        <div id="listaCanales" style="display: flex; gap: 6px; flex-wrap: wrap;"></div>
                    </div>
                    <div class="controles-tiempo">
                        <div>
                            <label style="display:block; font-size:10px; color:#888;">FECHA:</label>
                            <input type="date" id="fecha">
                        </div>
                        <div>
                            <label style="display:block; font-size:10px; color:#888;">HORA:</label>
                            <input type="time" id="hora" value="21:00">
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="añadirEvento()" style="width:100%; background:#00ff88; color:#000; font-weight:bold; padding:20px; border:none; border-radius:10px; cursor:pointer; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,255,136,0.2);">+ AÑADIR A LA LISTA FINAL</button>
        </div>

        <div style="flex: 1.5;">
            <div class="seccion">
                <h3>Eventos del JSON (Ordenados por tiempo)</h3>
                <div id="colaPartidos" style="max-height: 250px; overflow-y: auto;"></div>
                <button onclick="limpiarLista()" style="background:#444; width:100%; font-size:10px; border:none; padding:5px; margin-top:5px; color:#ccc;">Limpiar Todo</button>
            </div>
            <div class="seccion">
                <h3>Código para eventos.json</h3>
                <div id="codigoPreview" class="preview">[]</div>
                <button onclick="copiar()" style="width:100%; margin-top:10px; background:#fff; color:#000; font-weight:bold; padding:12px; border:none; border-radius:8px; cursor:pointer;">COPIAR TODO EL JSON</button>
            </div>
        </div>
    </div>

<script>
    let BD = {};
    let pTemp = { e1: "", l1: "", e2: "", l2: "", c: "", links: [], ligaId: "" };
    let listaFinal = [];

    // Establecer fecha de hoy por defecto
    document.getElementById('fecha').valueAsDate = new Date();

    // CARGAR DATOS
    fetch('base_datos.json')
        .then(res => res.json())
        .then(data => {
            BD = data;
            init();
        })
        .catch(err => {
            document.getElementById('listaLigas').innerHTML = "<span style='color:red;'>Error al cargar base_datos.json. Súbelo a GitHub primero.</span>";
        });

    function init() {
        renderLigas();
        renderCanales();
    }

    function renderLigas() {
        const div = document.getElementById('listaLigas');
        div.innerHTML = '';
        Object.keys(BD.ligas).forEach(nombre => {
            const btn = document.createElement('button');
            btn.className = 'btn-liga';
            btn.innerHTML = `<img src="assets/deporte/${BD.ligas[nombre].logo}"><span>${nombre}</span>`;
            btn.onclick = () => {
                document.querySelectorAll('.btn-liga').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                cargarEquipos(nombre);
            };
            div.appendChild(btn);
        });
    }

    function cargarEquipos(nombre) {
        pTemp.ligaId = BD.ligas[nombre].id;
        const grid = document.getElementById('listaEquipos');
        grid.innerHTML = '';
        BD.ligas[nombre].equipos.forEach(eq => {
            const btn = document.createElement('button');
            btn.innerHTML = `<img src="assets/equipos/${pTemp.ligaId}/${eq.a}"><br>${eq.n}`;
            btn.onclick = () => {
                if (!pTemp.e1 || (pTemp.e1 && pTemp.e2)) {
                    pTemp.e1 = eq.n; pTemp.l1 = eq.a; pTemp.e2 = "";
                    document.querySelectorAll('#listaEquipos button').forEach(b => b.className = '');
                    btn.className = 'local';
                } else {
                    pTemp.e2 = eq.n; pTemp.l2 = eq.a;
                    btn.className = 'visita';
                }
            };
            grid.appendChild(btn);
        });
    }

    function renderCanales() {
        const div = document.getElementById('listaCanales');
        Object.keys(BD.canales).forEach(id => {
            const btn = document.createElement('button');
            btn.innerText = BD.canales[id].nombre;
            btn.onclick = () => {
                pTemp.c = BD.canales[id].nombre;
                pTemp.links = BD.canales[id].opciones;
                document.querySelectorAll('#listaCanales button').forEach(b => b.classList.remove('canal-sel'));
                btn.className = 'canal-sel';
            };
            div.appendChild(btn);
        });
    }

    function añadirEvento() {
        const fechaVal = document.getElementById('fecha').value;
        const horaVal = document.getElementById('hora').value;
        
        if(!pTemp.e1 || !pTemp.c || !fechaVal) return alert("Faltan datos (Equipos, Canal o Fecha)");

        listaFinal.push({
            fecha: fechaVal,
            hora: horaVal,
            e1: pTemp.e1, logo1: pTemp.l1,
            e2: pTemp.e2 || "Evento", logo2: pTemp.l2 || pTemp.l1,
            canal: pTemp.c, links: pTemp.links, liga: pTemp.ligaId
        });

        // Ordenación cronológica total
        listaFinal.sort((a,b) => (a.fecha + a.hora).localeCompare(b.fecha + b.hora));
        
        // Reset selección equipos
        pTemp.e1 = ""; pTemp.e2 = "";
        document.querySelectorAll('#listaEquipos button').forEach(b => b.className = '');
        actualizar();
    }

    function actualizar() {
        const cola = document.getElementById('colaPartidos');
        cola.innerHTML = '';
        listaFinal.forEach((ev, i) => {
            const f = ev.fecha.split('-').reverse().join('/'); // Formato DD/MM/AAAA
            cola.innerHTML += `<div class="cola-item">
                <div><span class="fecha-badge">${f}</span> <b>${ev.hora}</b> | ${ev.e1} vs ${ev.e2}</div>
                <button onclick="eliminar(${i})" style="color:#ff4444; background:none; border:none; font-weight:bold; font-size:16px;">✖</button>
            </div>`;
        });
        document.getElementById('codigoPreview').innerText = JSON.stringify(listaFinal, null, 2);
    }

    function eliminar(i) { listaFinal.splice(i,1); actualizar(); }
    function limpiarLista() { if(confirm("¿Seguro que quieres borrar todo el listado actual?")) { listaFinal = []; actualizar(); } }
    
    function copiar() {
        const txt = document.getElementById('codigoPreview').innerText;
        navigator.clipboard.writeText(txt).then(() => alert("✅ JSON Copiado. Pégalo ahora en tu archivo eventos.json"));
    }
</script>
</body>
</html>
