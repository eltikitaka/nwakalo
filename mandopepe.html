<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mando Pepe - Control de Escudos</title>
    <!-- Bootstrap 5 para el diseño -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .card-equipo { 
            cursor: pointer; 
            transition: transform 0.2s; 
            text-align: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
        }
        .card-equipo:hover { transform: scale(1.05); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .logo-img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; }
        .grid-equipos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">Mando de Control - NWAKALO</h2>
    
    <!-- Selector de Liga -->
    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <label for="selectorLiga" class="form-label fw-bold">Seleccionar Competición:</label>
            <select id="selectorLiga" class="form-select form-select-lg" onchange="cargarEquipos()">
                <option value="laligaespana">La Liga España</option>
                <option value="premierleague">Premier League</option>
            </select>
        </div>
    </div>

    <!-- Contenedor donde se cargarán los equipos -->
    <div id="contenedorEquipos" class="grid-equipos">
        <!-- Los equipos aparecerán aquí dinámicamente -->
    </div>
</div>

<script>
    // Datos de los equipos con sus nuevas rutas
    const datosEquipos = {
        laligaespana: [
            { nombre: "Alavés", archivo: "ala.png" },
            { nombre: "Athletic", archivo: "ath.png" },
            { nombre: "Atlético", archivo: "atm.png" },
            { nombre: "Barcelona", archivo: "bar.png" },
            { nombre: "Betis", archivo: "bet.png" },
            { nombre: "Celta", archivo: "cel.png" },
            { nombre: "Espanyol", archivo: "esp.png" },
            { nombre: "Getafe", archivo: "get.png" },
            { nombre: "Girona", archivo: "gir.png" },
            { nombre: "Las Palmas", archivo: "lpa.png" },
            { nombre: "Leganés", archivo: "leg.png" },
            { nombre: "Mallorca", archivo: "mal.png" },
            { nombre: "Osasuna", archivo: "osa.png" },
            { nombre: "Rayo Vallecano", archivo: "ray.png" },
            { nombre: "Real Madrid", archivo: "rma.png" },
            { nombre: "Real Sociedad", archivo: "rso.png" },
            { nombre: "Sevilla", archivo: "sev.png" },
            { nombre: "Valencia", archivo: "val.png" },
            { nombre: "Valladolid", archivo: "vld.png" },
            { nombre: "Villarreal", archivo: "vil.png" }
        ],
        premierleague: [
            { nombre: "AFC Bournemouth", archivo: "bou.png" },
            { nombre: "Arsenal FC", archivo: "ars.png" },
            { nombre: "Aston Villa", archivo: "av.png" },
            { nombre: "Brentford FC", archivo: "bre.png" },
            { nombre: "Brighton", archivo: "bri.png" },
            { nombre: "Burnley FC", archivo: "bur.png" },
            { nombre: "Chelsea FC", archivo: "che.png" },
            { nombre: "Crystal Palace", archivo: "cri.png" },
            { nombre: "Everton FC", archivo: "eve.png" },
            { nombre: "Fulham FC", archivo: "ful.png" },
            { nombre: "Leeds United", archivo: "lee.png" },
            { nombre: "Liverpool FC", archivo: "liv.png" },
            { nombre: "Manchester City", archivo: "manc.png" },
            { nombre: "Manchester United", archivo: "manu.png" },
            { nombre: "Newcastle Utd", archivo: "new.png" },
            { nombre: "Nottingham Forest", archivo: "not.png" },
            { nombre: "Sunderland AFC", archivo: "sun.png" },
            { nombre: "Tottenham", archivo: "tot.png" },
            { nombre: "West Ham", archivo: "whu.png" },
            { nombre: "Wolves", archivo: "wol.png" }
        ]
    };

    function cargarEquipos() {
        const ligaSeleccionada = document.getElementById('selectorLiga').value;
        const contenedor = document.getElementById('contenedorEquipos');
        const equipos = datosEquipos[ligaSeleccionada];
        
        // Limpiar contenedor
        contenedor.innerHTML = '';

        // Crear tarjetas para cada equipo
        equipos.forEach(equipo => {
            const rutaImagen = `assets/equipos/${ligaSeleccionada}/${equipo.archivo}`;
            
            const div = document.createElement('div');
            div.className = 'card-equipo';
            div.onclick = () => enviarAccion(equipo.nombre, rutaImagen);
            
            div.innerHTML = `
                <img src="${rutaImagen}" alt="${equipo.nombre}" class="logo-img" onerror="this.src='assets/equipos/placeholder.png'">
                <div class="small fw-bold">${equipo.nombre}</div>
            `;
            
            contenedor.appendChild(div);
        });
    }

    // Función para manejar el clic (aquí puedes poner tu lógica de Fetch o Socket)
    function enviarAccion(nombre, ruta) {
        console.log("Seleccionado:", nombre, "Ruta:", ruta);
        alert("Has seleccionado: " + nombre + "\nEnviando ruta: " + ruta);
        
        /* 
        // Ejemplo de envío a tu sistema:
        fetch('TU_URL_DE_API', {
            method: 'POST',
            body: JSON.stringify({ equipo: nombre, logo: ruta })
        });
        */
    }

    // Carga inicial
    document.addEventListener('DOMContentLoaded', cargarEquipos);
</script>

</body>
</html>
