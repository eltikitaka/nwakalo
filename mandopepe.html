<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANDO BÚNKER</title>
    <style>
        :root { --main: #00ff88; --bg: #0a0a0a; --panel: #161616; --especial: #ff9f43; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #mando-root { display: none; max-width: 1200px; margin: auto; }
        
        .layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .seccion { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }

        /* CATEGORÍAS Y EQUIPOS CON CÍRCULO BLANCO */
        .contenedor-cats { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .btn-cat { 
            background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 110px; 
        }
        .img-holder, .img-wrap { 
            background: white; width: 50px; height: 50px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px; overflow: hidden;
        }
        .btn-cat img, .btn-eq img { width: 35px; height: 35px; object-fit: contain; }
        .btn-cat.active { background: var(--main); color: #000; border-color: #fff; font-weight: bold; }

        .grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; 
            max-height: 380px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; 
        }
        .btn-eq { 
            background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 10px; border-radius: 10px; 
            cursor: pointer; font-size: 10px; display: flex; flex-direction: column; align-items: center; 
        }
        .btn-eq.sel { border-color: var(--main); background: rgba(0, 255, 136, 0.1); }
        .btn-eq.sel .img-wrap { border: 2px solid var(--main); }

        /* PANEL ESPECIAL */
        .panel-especial { border: 2px dashed var(--especial); padding: 15px; border-radius: 12px; background: rgba(255,159,67,0.05); margin-bottom: 20px; }
        input { background: #000; color: var(--main); border: 1px solid #333; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-top: 5px; font-weight: bold; }
        .btn-main { width: 100%; background: var(--main); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        .item-cola { background: #000; padding: 10px; border-radius: 5px; margin-bottom: 5px; font-size: 11px; border-left: 4px solid var(--main); position: relative; }
        .del-btn { position: absolute; right: 10px; top: 10px; color: #ff4444; cursor: pointer; font-weight: bold; }
        textarea { height: 80px; font-size: 9px; background: #000; color: #00ff88; border: 1px solid #333; width: 100%; padding: 10px; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="pin-card" style="text-align:center;">
        <h1 style="color:var(--main);">MANDO BÚNKER</h1>
        <input type="password" id="pin_input" placeholder="PIN..." style="text-align:center; width:150px;">
        <br><br>
        <button onclick="acceso()" class="btn-main" style="width:150px;">ENTRAR</button>
    </div>
</div>

<div id="mando-root">
    <div class="layout">
        <div>
            <div class="panel-especial">
                <h3 style="color:var(--especial); margin-top:0;">✨ EVENTO ESPECIAL LIBRE</h3>
                <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:10px;">
                    <input type="text" id="esp_tipo" placeholder="Deporte (Ciclismo, Basket...)">
                    <input type="text" id="esp_evento" placeholder="Evento (4ª etapa Volta Catalunya)">
                </div>
                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:10px; margin-top:10px;">
                    <input type="text" id="esp_logo" placeholder="Logo (ej: ciclismo.png)">
                    <button onclick="fijarEspecial()" class="btn-main" style="background:var(--especial); padding:8px; font-size:11px; margin:0;">FIJAR ESPECIAL</button>
                </div>
            </div>

            <div class="seccion">
                <h3>Ligas y Categorías</h3>
                <div id="categorias" class="contenedor-cats"></div>
                <h3>Equipos / Sesiones</h3>
                <div id="equipos" class="grid">Elige categoría arriba...</div>
            </div>

            <div class="seccion">
                <h3>Emisión y Links AceStream</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <input type="date" id="f_in">
                    <input type="time" id="h_in" value="21:00">
                    <input type="text" id="c_in" placeholder="Canal">
                </div>
                <input type="text" id="l_in" placeholder="Pegar ID y pulsar ENTER..." onkeydown="if(event.key==='Enter') addLink()">
                <div id="v_links" style="margin-top:10px; font-size:12px; color:var(--main); font-weight: bold;">Links: 0</div>
            </div>
            
            <button onclick="guardar()" class="btn-main">AÑADIR A LA AGENDA</button>
        </div>

        <div>
            <div class="seccion">
                <h3>Agenda Próxima</h3>
                <div id="cola_eventos"></div>
            </div>
            <div class="seccion">
                <h3>Cifrado GitHub</h3>
                <textarea id="output" readonly></textarea>
                <button onclick="copy()" class="btn-main" style="background:#fff;">COPIAR CÓDIGO</button>
            </div>
        </div>
    </div>
</div>

<script>
    let BD = {};
    let agenda = JSON.parse(localStorage.getItem('pepe_agenda') || "[]");
    let cur = { e1:"", l1:"", e2:"", l2:"", modo:"duelo" };
    let links = [];

    function acceso() {
        if(window.btoa(document.getElementById('pin_input').value) === "THVzaWxlY3RyYV8wMUA=") {
            document.getElementById('bloqueo').style.display='none';
            document.getElementById('mando-root').style.display='block';
            update();
        }
    }

    fetch('base_datos.json').then(r => r.json()).then(data => {
        BD = data;
        const div = document.getElementById('categorias');
        Object.keys(BD.ligas).forEach(l => {
            const b = document.createElement('button');
            b.className = 'btn-cat';
            b.innerHTML = `<div class="img-holder"><img src="assets/equipos/${BD.ligas[l].logo}"></div><span>${l}</span>`;
            b.onclick = () => verEq(l, b);
            div.appendChild(b);
        });
    });

    function verEq(name, btn) {
        document.querySelectorAll('.btn-cat').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        const liga = BD.ligas[name];

        cur.e1 = ""; cur.e2 = "";
        const grid = document.getElementById('equipos'); grid.innerHTML = "";
        
        liga.equipos.forEach(eq => {
            const b = document.createElement('button');
            b.className = 'btn-eq';
            const ruta = (cur.modo === "unico") ? `assets/deporte/${eq.a}` : `assets/equipos/${liga.id}/${eq.a}`;
            b.innerHTML = `<div class="img-wrap"><img src="${ruta}" onerror="this.src='assets/default.png'"></div><br>${eq.n}`;
            b.onclick = () => {
                if(cur.modo === "unico") {
                    cur.e1 = `${name}: ${eq.n}`; cur.l1 = `../deporte/${eq.a}`; cur.e2 = ""; cur.l2 = "";
                    document.querySelectorAll('.btn-eq').forEach(v => v.classList.remove('sel')); b.classList.add('sel');
                } else {
                    if(!cur.e1 || (cur.e1 && cur.e2)) {
                        cur.e1 = eq.n; cur.l1 = `${liga.id}/${eq.a}`; cur.e2 = "";
                        document.querySelectorAll('.btn-eq').forEach(v => v.classList.remove('sel')); b.classList.add('sel');
                    } else {
                        cur.e2 = eq.n; cur.l2 = `${liga.id}/${eq.a}`; b.classList.add('sel');
                    }
                }
            };
            grid.appendChild(b);
        });
    }

        const n = document.getElementById('esp_evento').value;
