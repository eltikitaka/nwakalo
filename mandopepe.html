<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Mando NWAKALO</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #121212; color: white; text-align: center; margin: 0; }
        .box { max-width: 600px; margin: auto; background: #1e1e1e; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 5px; max-height: 200px; overflow-y: auto; background: #252525; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .logo-item { cursor: pointer; border: 2px solid transparent; padding: 5px; border-radius: 8px; font-size: 10px; }
        .logo-item img { width: 35px; height: 35px; object-fit: contain; pointer-events: none; }
        .selected-e1 { border-color: #00e676; background: #1b3d2e; }
        .selected-e2 { border-color: #ff5252; background: #3d1b1b; }
        .canal-btn { padding: 10px; margin: 4px; border: 1px solid #444; background: #333; color: white; cursor: pointer; border-radius: 8px; width: 45%; font-size: 12px; }
        .canal-btn.active { background: #00e676; color: black; }
        
        /* LISTA DE PARTIDOS AGREGADOS */
        .lista-acumulada { background: #000; padding: 10px; border-radius: 10px; margin: 15px 0; text-align: left; font-size: 12px; border: 1px solid #00e676; }
        .partido-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #222; }
        
        .btn-add { background: #ff9800; color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .btn-send { background: #00e676; color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; }
        
        textarea { width: 100%; height: 120px; margin-top: 15px; background: #000; color: #00e676; border: 1px solid #333; padding: 10px; box-sizing: border-box; display: none; }
        .btn-github { background: #ffffff; color: black; padding: 15px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-decoration: none; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#00e676; margin: 0 0 10px 0;">🚀 MULTI-PANEL NWAKALO</h2>
    
    <div id="listaEquipos" class="grid"></div>
    <div id="listaCanales">Cargando...</div>
    
    <input type="time" id="hora" style="padding:10px; width:80%; margin:10px 0; border-radius:5px; background:#333; color:white; border:1px solid #444;">

    <button class="btn-add" onclick="agregarALista()">➕ AÑADIR A LA PARRILLA</button>

    <div class="lista-acumulada" id="visualizador">
        <strong>Partidos en cola: 0</strong>
        <div id="itemsCola"></div>
    </div>

    <button class="btn-send" onclick="generarTodo()">2. GENERAR TODO EL JSON</button>
    <button onclick="limpiarTodo()" style="background:none; color:red; border:none; margin-top:10px; cursor:pointer;">Borrar lista</button>
    
    <textarea id="resultado" readonly></textarea>
    <a id="linkGithub" class="btn-github" target="_blank" href="https://github.com">3. PEGAR EN GITHUB</a>
</div>

<script>
    let e1 = null, e2 = null, can = null;
    let listaPartidos = [];

    const EQUIPOS = [{n:"Real Madrid CF",f:"rmadrid.png"},{n:"FC Barcelona",f:"fcb.png"},{n:"Atlético de Madrid",f:"atm.png"},{n:"Athletic Club",f:"ath.png"},{n:"Villarreal CF",f:"vil.png"},{n:"Real Sociedad",f:"rsoc.png"},{n:"Real Betis",f:"bet.png"},{n:"Valencia CF",f:"vcf.png"},{n:"Girona FC",f:"gir.png"},{n:"RC Celta",f:"cel.png"},{n:"Sevilla FC",f:"sev.png"},{n:"RCD Espanyol",f:"esp.png"},{n:"Rayo Vallecano",f:"ray.png"},{n:"CA Osasuna",f:"osa.png"},{n:"Elche CF",f:"elc.png"},{n:"Levante UD",f:"lev.png"},{n:"RCD Mallorca",f:"mal.png"},{n:"Getafe CF",f:"get.png"},{n:"Real Oviedo",f:"ovi.png"},{n:"Alaves",f:"ala.png"}];

    // Cargar equipos
    const contEq = document.getElementById('listaEquipos');
    EQUIPOS.forEach(eq => {
        const div = document.createElement('div');
        div.className = 'logo-item';
        div.innerHTML = `<img src="assets/equipos/${eq.f}"><br>${eq.n.substring(0,6)}`;
        div.onclick = () => { document.querySelectorAll('.logo-item').forEach(i=>i.classList.remove('selected-e1')); div.classList.add('selected-e1'); e1=eq; };
        div.oncontextmenu = (e) => { e.preventDefault(); document.querySelectorAll('.logo-item').forEach(i=>i.classList.remove('selected-e2')); div.classList.add('selected-e2'); e2=eq; };
        contEq.appendChild(div);
    });

    // Cargar canales
    fetch('canales.json?t='+Date.now()).then(r => r.json()).then(data => {
        const divCan = document.getElementById('listaCanales');
        divCan.innerHTML = "";
        Object.keys(data).forEach(k => {
            const b = document.createElement('button'); b.className='canal-btn'; b.innerText=data[k].nombre;
            b.onclick = () => { document.querySelectorAll('.canal-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); can=data[k]; };
            divCan.appendChild(b);
        });
    });

    function agregarALista() {
        if(!e1 || !e2 || !can) return alert("Faltan datos");
        
        const p = {
            hora: document.getElementById('hora').value || "00:00",
            e1: e1.n, logo1: e1.f, 
            e2: e2.n, logo2: e2.f,
            canal: can.nombre, links: can.opciones
        };

        listaPartidos.push(p);
        actualizarVisualizador();
        
        // Limpiar selección para el siguiente
        e1 = null; e2 = null;
        document.querySelectorAll('.logo-item').forEach(i=>i.classList.remove('selected-e1', 'selected-e2'));
    }

    function actualizarVisualizador() {
        const cont = document.getElementById('itemsCola');
        const header = document.querySelector('#visualizador strong');
        header.innerText = `Partidos en cola: ${listaPartidos.length}`;
        cont.innerHTML = "";
        listaPartidos.forEach((p, idx) => {
            cont.innerHTML += `<div class="partido-item"><span>${p.hora} - ${p.e1} vs ${p.e2}</span> <small style="color:#00e676">${p.canal}</small></div>`;
        });
    }

    function generarTodo() {
        if(listaPartidos.length === 0) return alert("Añade al menos un partido");
        
        const txt = document.getElementById('resultado');
        txt.value = JSON.stringify(listaPartidos, null, 2);
        txt.style.display = "block";
        document.getElementById('linkGithub').style.display = "block";
        
        txt.select();
        document.execCommand('copy');
        alert("¡CÓDIGO DE TODOS LOS PARTIDOS COPIADO!");
    }

    function limpiarTodo() {
        listaPartidos = [];
        actualizarVisualizador();
        document.getElementById('resultado').style.display = "none";
        document.getElementById('linkGithub').style.display = "none";
    }
</script>
</body>
</html>
