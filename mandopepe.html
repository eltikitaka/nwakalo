<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANDO PEPE 7.0 - THE MASTER</title>
    <style>
        :root { --main: #00ff88; --bg: #050505; --panel: #121212; --fútbol: #00ff88; --motor: #ff4757; --especial: #ffa502; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .pin-card { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #333; text-align: center; }
        #mando-root { display: none; max-width: 1200px; margin: auto; }
        
        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: #222; color: #666; transition: 0.3s; }
        .tab-btn.active[data-tipo="futbol"] { background: var(--fútbol); color: #000; }
        .tab-btn.active[data-tipo="motor"] { background: var(--motor); color: #fff; }
        .tab-btn.active[data-tipo="especial"] { background: var(--especial); color: #000; }

        .layout { display: grid; grid-template-columns: 1.8fr 1fr; gap: 25px; }
        .seccion { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        
        /* GRID EQUIPOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; max-height: 250px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; }
        .btn-eq { background: #161616; border: 1px solid #333; color: #eee; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .btn-eq img { width: 30px; height: 30px; margin-bottom: 5px; }
        .btn-eq.sel { border-color: var(--main); background: #00331a; }

        input, select { background: #000; color: var(--main); border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-top: 5px; font-weight: bold; }
        .btn-main { width: 100%; background: var(--main); color: #000; padding: 18px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        
        .item-cola { background: #000; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #444; position: relative; }
        .tag-links { background: #1a1a1a; border: 1px solid var(--main); color: var(--main); padding: 4px 8px; border-radius: 12px; font-size: 10px; margin-right: 5px; margin-top: 5px; display: inline-block; }
        textarea { height: 100px; font-size: 10px; background: #000; color: #00ff88; border: 1px solid #333; width: 100%; padding: 10px; word-break: break-all; border-radius: 8px; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="pin-card">
        <h1>MANDO PEPE 7.0</h1>
        <input type="password" id="pin_input" placeholder="Introduce el PIN..." style="text-align:center;">
        <button onclick="acceso()" class="btn-main">ENTRAR</button>
    </div>
</div>

<div id="mando-root">
    <div class="tabs">
        <button class="tab-btn active" data-tipo="futbol" onclick="setTab('futbol')">⚽ LIGAS (Fútbol)</button>
        <button class="tab-btn" data-tipo="motor" onclick="setTab('motor')">🏁 MOTOR (F1 / Moto)</button>
        <button class="tab-btn" data-tipo="especial" onclick="setTab('especial')">✨ ESPECIALES (Tenis/Libre)</button>
    </div>

    <div class="layout">
        <div>
            <div class="seccion" id="panel-seleccion">
                </div>

            <div class="seccion">
                <h3>Datos y Enlaces</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <input type="date" id="f_in">
                    <input type="time" id="h_in" value="21:00">
                    <input type="text" id="c_in" placeholder="Canal">
                </div>
                <input type="text" id="l_in" placeholder="Pega el ID AceStream y ENTER..." onkeydown="if(event.key==='Enter') addLink()">
                <div id="v_links"></div>
            </div>
            
            <button onclick="guardarEvento()" class="btn-main">AÑADIR A LA AGENDA</button>
        </div>

        <div>
            <div class="seccion"><h3>Agenda</h3><div id="cola_eventos"></div></div>
            <div class="seccion"><h3>Búnker GitHub</h3><textarea id="output" readonly></textarea><button onclick="copyCode()" class="btn-main" style="background:#fff; color:#000;">COPIAR CIFRADO</button></div>
        </div>
    </div>
</div>

<script>
    let BD = {};
    let agenda = JSON.parse(localStorage.getItem('pepe_agenda') || "[]");
    let current = { e1:"", l1:"", e2:"", l2:"", tipo:"futbol" };
    let links = [];

    function acceso() {
        if(window.btoa(document.getElementById('pin_input').value) === "THVzaWxlY3RyYV8wMUA=") {
            document.getElementById('bloqueo').style.display='none';
            document.getElementById('mando-root').style.display='block';
            setTab('futbol');
        }
    }

    fetch('base_datos.json').then(r => r.json()).then(data => { BD = data; });

    function setTab(t) {
        current.tipo = t;
        current.e1 = ""; current.e2 = ""; 
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tipo === t));
        const p = document.getElementById('panel-seleccion');
        
        if(t === 'futbol') {
            p.innerHTML = `<h3>Selecciona Equipos</h3><div id="l_list"></div><div id="e_grid" class="grid"></div>`;
            Object.keys(BD.ligas).forEach(l => {
                document.getElementById('l_list').innerHTML += `<button class="btn-liga" onclick="verEq('${l}')">${l}</button>`;
            });
        } else if (t === 'motor') {
            p.innerHTML = `<h3>Evento de Motor</h3>
                <select id="m_cat" onchange="current.e1=this.value; current.l1='../deporte/'+this.value.toLowerCase()+'.png'"><option value="">Selecciona Categoría...</option><option value="F1">Fórmula 1</option><option value="MotoGP">MotoGP</option></select>
                <input type="text" id="m_desc" placeholder="Nombre del GP (Ej: GP de Mónaco)">`;
        } else {
            p.innerHTML = `<h3>Evento Especial Libre</h3>
                <input type="text" id="s_tipo" placeholder="Tipo (Ej: Tenis, UFC, Ciclismo...)">
                <input type="text" id="s_logo" placeholder="Nombre logo (Ej: tenis.png)">
                <input type="text" id="s_desc" placeholder="Evento (Ej: Alcaraz vs Sinner)">`;
        }
    }

    function verEq(l) {
        const grid = document.getElementById('e_grid'); grid.innerHTML = "";
        const liga = BD.ligas[l];
        liga.equipos.forEach(eq => {
            const b = document.createElement('button');
            b.className = 'btn-eq';
            b.innerHTML = `<img src="assets/equipos/${liga.id}/${eq.a}"><br>${eq.n}`;
            b.onclick = () => {
                if(!current.e1 || (current.e1 && current.e2)) {
                    current.e1 = eq.n; current.l1 = `${liga.id}/${eq.a}`; current.e2=""; 
                    document.querySelectorAll('.btn-eq').forEach(x => x.classList.remove('sel')); b.classList.add('sel');
                } else {
                    current.e2 = eq.n; current.l2 = `${liga.id}/${eq.a}`; b.classList.add('sel');
                }
            };
            grid.appendChild(b);
        });
    }

    function addLink() {
        const val = document.getElementById('l_in').value.trim();
        if(val) { links.push(val); document.getElementById('l_in').value=""; renderLinks(); }
    }

    function renderLinks() {
        document.getElementById('v_links').innerHTML = links.map((l, i) => `<span class="tag-links">Link ${i+1} <b onclick="links.splice(${i},1);renderLinks()" style="color:red;cursor:pointer">×</b></span>`).join('');
    }

    function guardarEvento() {
        let ev = { fecha: document.getElementById('f_in').value, hora: document.getElementById('h_in').value, canal: document.getElementById('c_in').value || "TV", links: [...links] };
        
        if(current.tipo === 'futbol') {
            if(!current.e2) return alert("Faltan equipos");
            ev.e1 = current.e1; ev.logo1 = current.l1; ev.e2 = current.e2; ev.logo2 = current.l2;
        } else if(current.tipo === 'motor') {
            const desc = document.getElementById('m_desc').value;
            if(!current.e1 || !desc) return alert("Falta categoría o nombre del GP");
            ev.e1 = `${current.e1}: ${desc}`; ev.logo1 = current.l1; ev.e2 = ""; ev.logo2 = "";
        } else {
            const tipo = document.getElementById('s_tipo').value;
            const desc = document.getElementById('s_desc').value;
            const logo = document.getElementById('s_logo').value;
            if(!tipo || !desc) return alert("Rellena los datos");
            ev.e1 = `${tipo}: ${desc}`; ev.logo1 = `../deporte/${logo}`; ev.e2 = ""; ev.logo2 = "";
        }

        if(links.length === 0) return alert("Faltan links");
        agenda.push(ev);
        update();
        links = []; document.getElementById('v_links').innerHTML = "";
        alert("Añadido.");
    }

    function update() {
        localStorage.setItem('pepe_agenda', JSON.stringify(agenda));
        document.getElementById('output').value = window.btoa(unescape(encodeURIComponent(JSON.stringify(agenda))));
        document.getElementById('cola_eventos').innerHTML = agenda.map((e, i) => `<div class="item-cola"><b>${e.hora}</b> | ${e.e1} ${e.e2?'vs '+e.e2:''}<span class="del-btn" onclick="agenda.splice(${i},1);update()">×</span></div>`).join('');
    }

    function copyCode() { document.getElementById('output').select(); document.execCommand('copy'); alert("Copiado"); }
    document.getElementById('f_in').valueAsDate = new Date();
</script>
</body>
</html>
