<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador Masivo NWAKALO</title>
    <style>
        body { background: #121212; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 1200px; margin: auto; }
        .seccion { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; max-height: 400px; overflow-y: auto; padding: 10px; background: #111; border-radius: 8px; }
        
        button { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 11px; transition: 0.2s; }
        .btn-liga { padding: 15px; font-weight: bold; border-color: #00ff88; flex: 1; font-size: 14px; }
        
        /* Colores de Selección */
        button.local { background: #007bff !important; border-color: #fff; box-shadow: 0 0 10px #007bff; transform: scale(1.05); } /* AZUL */
        button.visita { background: #dc3545 !important; border-color: #fff; box-shadow: 0 0 10px #dc3545; transform: scale(1.05); } /* ROJO */
        button.canal-sel { background: #00ff88 !important; color: #000; font-weight: bold; border-color: #fff; }

        .preview { background: #000; color: #00ff88; padding: 15px; border-radius: 5px; font-family: 'Courier New', monospace; white-space: pre-wrap; border: 1px solid #444; font-size: 12px; max-height: 400px; overflow-y: auto; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; width: 100px; text-align: center; font-size: 16px; color: #00ff88; }
        img { height: 35px; display: block; margin: 0 auto 5px; object-fit: contain; }
        h3 { color: #00ff88; margin: 0 0 10px 0; font-size: 1rem; text-transform: uppercase; }
        
        .cola-item { background: #252525; padding: 10px; margin-bottom: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00ff88; }
        .btn-borrar { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 3px; font-size: 10px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#00ff88; letter-spacing: 2px;">CONSTRUCTOR DE EVENTOS.JSON</h2>

    <div style="display: flex; gap: 20px;">
        <!-- PANEL IZQUIERDO: SELECCIÓN -->
        <div style="flex: 2;">
            <div class="seccion">
                <h3>1. Elegir Deporte / Liga</h3>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-liga" onclick="cargarLiga('laligaespana')">LIGA ESPAÑOLA</button>
                    <button class="btn-liga" onclick="cargarLiga('premierleague')">PREMIER LEAGUE</button>
                </div>
                <div id="listaEquipos" class="grid" style="margin-top:15px;"></div>
            </div>

            <div class="seccion" style="display: flex; gap: 20px; align-items: center;">
                <div style="flex: 1;">
                    <h3>2. Canal Acestream</h3>
                    <div id="listaCanales" style="display: flex; gap: 10px;">
                        <button onclick="setCanal('Movistar la Liga', 'm-laliga', this)">Movistar la Liga</button>
                        <button onclick="setCanal('Dazn la Liga', 'd-laliga', this)">Dazn la Liga</button>
                    </div>
                </div>
                <div>
                    <h3>3. Hora</h3>
                    <input type="text" id="hora" value="21:00">
                </div>
            </div>

            <button onclick="añadirPartidoALista()" style="width:100%; background:#00ff88; color:#000; font-weight:bold; padding:20px; border:none; border-radius:10px; cursor:pointer; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,255,136,0.3);">+ AÑADIR PARTIDO AL LISTADO</button>
        </div>

        <!-- PANEL DERECHO: VISTA PREVIA Y JSON -->
        <div style="flex: 1.5;">
            <div class="seccion">
                <h3>Partidos en esta sesión</h3>
                <div id="colaPartidos" style="max-height: 250px; overflow-y: auto; margin-bottom: 10px;">
                    <p style="color:#666; font-style:italic;">No hay partidos añadidos aún...</p>
                </div>
                <button onclick="limpiarLista()" style="background:#444; width:100%; font-size:10px; color:#ccc; border:none; padding:5px;">Limpiar Todo</button>
            </div>

            <div class="seccion">
                <h3>Código Final para eventos.json</h3>
                <div id="codigoPreview" class="preview">[]</div>
                <button onclick="copiarAlPortapapeles()" style="width:100%; margin-top:15px; background:#fff; color:#000; font-weight:bold; padding:15px; border:none; border-radius:8px; cursor:pointer; font-size: 1rem;">COPIAR TODO EL JSON</button>
            </div>
        </div>
    </div>

<script>
    // Canales con sus hashes oficiales de Acestream
    const canalesHashes = {
        'm-laliga': ["31c19ffb3472c289c5bbbbc174449c8ed0d19e38", "b3bdd6ef7f795c4f321a3ce5cf4907338f462929", "af468a318ad209b29a042a9080b519c6b40cec79"],
        'd-laliga': ["dda5d2cace9bc4cb0918e62bc50d657d4a10496a", "e2b8a4aba2f4ea3dd68992fcdb65c9e62d910b05", "71cb5e2567a8b39f5bdc4fa791992781b052f0bc"]
    };

    // Equipos sincronizados con tus carpetas y nombres de archivo
    const equiposDB = {
        laligaespana: [
            {n:"Alavés", a:"ala.png"}, {n:"Athletic Club", a:"ath.png"}, {n:"Atlético Madrid", a:"atm.png"}, {n:"FC Barcelona", a:"fcb.png"}, {n:"Real Betis", a:"bet.png"}, {n:"Celta de Vigo", a:"cel.png"}, {n:"Elche CF", a:"elc.png"}, {n:"RCD Espanyol", a:"esp.png"}, {n:"Getafe CF", a:"get.png"}, {n:"Girona FC", a:"gir.png"}, {n:"Levante UD", a:"lev.png"}, {n:"RCD Mallorca", a:"mal.png"}, {n:"CA Osasuna", a:"osa.png"}, {n:"Rayo Vallecano", a:"ray.png"}, {n:"Real Madrid", a:"rmadrid.png"}, {n:"Real Sociedad", a:"rsoc.png"}, {n:"Sevilla FC", a:"sev.png"}, {n:"Valencia CF", a:"val.png"}, {n:"Real Valladolid", a:"vld.png"}, {n:"Villarreal CF", a:"vil.png"}
        ],
        premierleague: [
            {n:"Arsenal FC", a:"ars.png"}, {n:"Aston Villa", a:"av.png"}, {n:"Bournemouth", a:"bou.png"}, {n:"Brentford FC", a:"bre.png"}, {n:"Brighton", a:"bri.png"}, {n:"Burnley FC", a:"bur.png"}, {n:"Chelsea FC", a:"che.png"}, {n:"Crystal Palace", a:"cri.png"}, {n:"Everton FC", a:"eve.png"}, {n:"Fulham FC", a:"ful.png"}, {n:"Leeds United", a:"lee.png"}, {n:"Liverpool FC", a:"liv.png"}, {n:"Man City", a:"manc.png"}, {n:"Man Utd", a:"manu.png"}, {n:"Newcastle Utd", a:"new.png"}, {n:"Nottingham", a:"not.png"}, {n:"Sunderland", a:"sun.png"}, {n:"Tottenham", a:"tot.png"}, {n:"West Ham", a:"whu.png"}, {n:"Wolverhampton", a:"wol.png"}
        ]
    };

    let pTemp = { e1: "", l1: "", e2: "", l2: "", c: "", links: [] };
    let listaEventos = [];

    function cargarLiga(liga) {
        const lista = document.getElementById('listaEquipos');
        lista.innerHTML = '';
        equiposDB[liga].forEach(equipo => {
            const btn = document.createElement('button');
            btn.innerHTML = `<img src="assets/equipos/${liga}/${equipo.a}">${equipo.n}`;
            btn.onclick = () => seleccionar(equipo.n, equipo.a, btn);
            lista.appendChild(btn);
        });
    }

    function seleccionar(nombre, archivo, elemento) {
        if (!pTemp.e1 || (pTemp.e1 && pTemp.e2)) {
            // Primer click: Local (Azul)
            pTemp.e1 = nombre; pTemp.l1 = archivo; pTemp.e2 = ""; 
            document.querySelectorAll('#listaEquipos button').forEach(b => b.className = '');
            elemento.className = 'local';
        } else {
            // Segundo click: Visitante (Rojo)
            pTemp.e2 = nombre; pTemp.l2 = archivo;
            elemento.className = 'visita';
        }
    }

    function setCanal(nombre, key, elemento) {
        pTemp.c = nombre; pTemp.links = canalesHashes[key];
        document.querySelectorAll('#listaCanales button').forEach(b => b.classList.remove('canal-sel'));
        elemento.className = 'canal-sel';
    }

    function añadirPartidoALista() {
        if (!pTemp.e1 || !pTemp.e2 || !pTemp.c) return alert("Error: Selecciona Local, Visitante y Canal.");
        const h = document.getElementById('hora').value;
        
        listaEventos.push({
            hora: h,
            e1: pTemp.e1, logo1: pTemp.l1,
            e2: pTemp.e2, logo2: pTemp.l2,
            canal: pTemp.c, links: pTemp.links
        });

        // Limpiar selección de equipos para el siguiente partido
        pTemp.e1 = ""; pTemp.e2 = "";
        document.querySelectorAll('#listaEquipos button').forEach(b => b.className = '');
        actualizarInterfaz();
    }

    function actualizarInterfaz() {
        const cola = document.getElementById('colaPartidos');
        const preview = document.getElementById('codigoPreview');
        
        if (listaEventos.length === 0) {
            cola.innerHTML = '<p style="color:#666; font-style:italic;">No hay partidos añadidos aún...</p>';
            preview.innerText = "[]";
            return;
        }

        cola.innerHTML = listaEventos.map((partido, index) => `
            <div class="cola-item">
                <span><b>${partido.hora}</b> | ${partido.e1} vs ${partido.e2}</span>
                <button class="btn-borrar" onclick="eliminarUno(${index})">BORRAR</button>
            </div>
        `).join('');

        preview.innerText = JSON.stringify(listaEventos, null, 2);
    }

    function eliminarUno(index) {
        listaEventos.splice(index, 1);
        actualizarInterfaz();
    }

    function limpiarLista() {
        if(confirm("¿Borrar todos los partidos?")) {
            listaEventos = [];
            actualizarInterfaz();
        }
    }

    function copiarAlPortapapeles() {
        const cod = document.getElementById('codigoPreview').innerText;
        navigator.clipboard.writeText(cod).then(() => {
            alert("¡JSON Completo copiado! Pégalo en tu archivo eventos.json");
        });
    }
</script>
</body>
</html>
