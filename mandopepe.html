<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mando NWAKALO</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; text-align: center; }
        .box { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; max-height: 250px; overflow-y: auto; background: #252525; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        .logo-item { cursor: pointer; border: 2px solid transparent; padding: 5px; border-radius: 8px; }
        .logo-item img { width: 40px; height: 40px; object-fit: contain; }
        .selected-e1 { border-color: #00e676; background: #1b3d2e; }
        .selected-e2 { border-color: #ff5252; background: #3d1b1b; }
        .canal-btn { padding: 12px; margin: 4px; border: 1px solid #444; background: #333; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; width: 45%; }
        .canal-btn.active { background: #00e676; color: black; }
        input[type="time"] { padding: 15px; width: 90%; border-radius: 10px; border: 1px solid #444; background: #333; color: white; font-size: 18px; margin: 15px 0; text-align: center; }
        .btn-send { background: #00e676; color: black; padding: 20px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 18px; }
        #log { margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#00e676;">🚀 PANEL DE CONTROL</h2>
    <div id="listaEquipos" class="grid"></div>
    <div id="listaCanales">Cargando...</div>
    <input type="time" id="hora">
    <button class="btn-send" id="btnMain" onclick="enviarAlServer()">PUBLICAR EN LA TELE</button>
    <div id="log">Sistema listo</div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    // Divide tu NUEVO token ghp_... en 3 partes
    const p1 = "ghp_0DvMWnM6E"; 
    const p2 = "cheVTSZpYKsX7";
    const p3 = "mRx1oOTc27YGWA";
    
    const USER = "eltikitaka";
    const REPO = "nwakalo";
    const FILE = "eventos.json";
    // --------------------

    let e1 = null, e2 = null, can = null;
    const EQUIPOS = [{n:"Real Madrid CF",f:"rmadrid.png"},{n:"FC Barcelona",f:"fcb.png"},{n:"Atlético de Madrid",f:"atm.png"},{n:"Athletic Club",f:"ath.png"},{n:"Villarreal CF",f:"vil.png"},{n:"Real Sociedad",f:"rsoc.png"},{n:"Real Betis",f:"bet.png"},{n:"Valencia CF",f:"vcf.png"},{n:"Girona FC",f:"gir.png"},{n:"RC Celta",f:"cel.png"},{n:"Sevilla FC",f:"sev.png"},{n:"RCD Espanyol",f:"esp.png"},{n:"Rayo Vallecano",f:"ray.png"},{n:"CA Osasuna",f:"osa.png"},{n:"Elche CF",f:"elc.png"},{n:"Levante UD",f:"lev.png"},{n:"RCD Mallorca",f:"mal.png"},{n:"Getafe CF",f:"get.png"},{n:"Real Oviedo",f:"ovi.png"},{n:"Alaves",f:"ala.png"}];

    const contEq = document.getElementById('listaEquipos');
    EQUIPOS.forEach(eq => {
        const div = document.createElement('div');
        div.className = 'logo-item';
        div.innerHTML = `<img src="assets/equipos/${eq.f}"><br><small style="font-size:8px">${eq.n.substring(0,6)}</small>`;
        div.onclick = () => { document.querySelectorAll('.logo-item').forEach(i=>i.classList.remove('selected-e1')); div.classList.add('selected-e1'); e1=eq; };
        div.oncontextmenu = (e) => { e.preventDefault(); document.querySelectorAll('.logo-item').forEach(i=>i.classList.remove('selected-e2')); div.classList.add('selected-e2'); e2=eq; };
        contEq.appendChild(div);
    });

    fetch('canales.json?t='+Date.now()).then(r => r.json()).then(data => {
        const divCan = document.getElementById('listaCanales');
        divCan.innerHTML = "";
        Object.keys(data).forEach(k => {
            const b = document.createElement('button'); b.className='canal-btn'; b.innerText=data[k].nombre;
            b.onclick = () => { document.querySelectorAll('.canal-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); can=data[k]; };
            divCan.appendChild(b);
        });
    });

    async function enviarAlServer() {
        if(!e1 || !e2 || !can) return alert("Selecciona equipos y canal");
        const log = document.getElementById('log');
        const btn = document.getElementById('btnMain');
        const tokenFinal = (p1 + p2 + p3).trim();

        log.style.color = "orange";
        log.innerText = "🛰️ Enviando...";
        btn.disabled = true;

        try {
            // 1. Obtener SHA del archivo
            const url = `https://github.com{USER}/${REPO}/contents/${FILE}`;
            const res = await fetch(url, {
                headers: { "Authorization": `Bearer ${tokenFinal}` }
            });

            if (res.status === 401) throw new Error("TOKEN NO VÁLIDO (401)");
            if (res.status === 404) throw new Error("ARCHIVO NO ENCONTRADO (404)");

            const data = await res.json();
            const sha = data.sha;
            
            // 2. Preparar el nuevo contenido
            let listaActual = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            listaActual.push({
                hora: document.getElementById('hora').value || "00:00",
                e1: e1.n, logo1: e1.f, e2: e2.n, logo2: e2.f,
                canal: can.nombre, links: can.opciones
            });

            // 3. Subir cambios
            const resPut = await fetch(url, {
                method: "PUT",
                headers: { 
                    "Authorization": `Bearer ${tokenFinal}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `Añadido: ${e1.n} vs ${e2.n}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(listaActual, null, 2)))),
                    sha: sha
                })
            });

            if (resPut.ok) {
                log.style.color = "#00e676";
                log.innerText = "✅ PUBLICADO CON ÉXITO";
                setTimeout(() => location.reload(), 1500);
            } else {
                const errData = await resPut.json();
                throw new Error(errData.message);
            }

        } catch (e) {
            log.style.color = "#ff5252";
            log.innerText = "❌ ERROR: " + e.message;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
