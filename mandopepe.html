<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MANDO PEPE 8.0 - CATEGORÍAS</title>
    <style>
        :root { --main: #00ff88; --bg: #0a0a0a; --panel: #161616; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .pin-card { background: #111; padding: 40px; border-radius: 20px; border: 2px solid #333; text-align: center; }
        #mando-root { display: none; max-width: 1100px; margin: auto; }
        .layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .seccion { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        
        /* BOTONES CATEGORÍAS */
        .btn-cat { background: #222; color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid #444; margin-right: 5px; margin-bottom: 10px; font-weight: bold; }
        .btn-cat.active { background: var(--main); color: #000; border-color: #fff; }

        /* GRID EQUIPOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; max-height: 250px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .btn-eq { background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 10px; text-align: center; }
        .btn-eq img { width: 30px; height: 30px; margin-bottom: 5px; }
        .btn-eq.sel { border-color: var(--main); background: #004422; }

        input { background: #000; color: var(--main); border: 1px solid #333; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-top: 5px; font-weight: bold; }
        .btn-main { width: 100%; background: var(--main); color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        .item-cola { background: #000; padding: 10px; border-radius: 5px; margin-bottom: 5px; font-size: 11px; border-left: 3px solid var(--main); position: relative; }
        .del-btn { position: absolute; right: 10px; top: 10px; color: red; cursor: pointer; font-weight: bold; }
        textarea { height: 80px; font-size: 9px; background: #000; color: #00ff88; border: 1px solid #333; width: 100%; padding: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="pin-card">
        <h2>NWAKALO BÚNKER 8.0</h2>
        <input type="password" id="pin_input" placeholder="PIN..." style="text-align:center;">
        <button onclick="acceso()" class="btn-main">ENTRAR</button>
    </div>
</div>

<div id="mando-root">
    <div class="layout">
        <div>
            <div class="seccion">
                <h3>1. Elige Categoría</h3>
                <div id="categorias"></div>
                
                <div id="zona-equipos" style="margin-top:15px;">
                    <div id="equipos" class="grid">Selecciona una categoría...</div>
                </div>

                <div id="zona-manual" style="display:none; margin-top:15px; border: 1px dashed #444; padding: 15px; border-radius: 10px;">
                    <label style="font-size: 11px; color:#888;">NOMBRE DEL EVENTO / DUELO</label>
                    <input type="text" id="m_nombre" placeholder="Ej: Alcaraz vs Sinner">
                </div>
            </div>

            <div class="seccion">
                <h3>2. Datos y Links</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <input type="date" id="f_in">
                    <input type="time" id="h_in" value="21:00">
                    <input type="text" id="c_in" placeholder="Canal">
                </div>
                <input type="text" id="l_in" placeholder="Pegar ID y pulsar ENTER..." onkeydown="if(event.key==='Enter') addLink()">
                <div id="v_links" style="font-size:11px; color:var(--main); margin-top:10px;">Links: 0</div>
            </div>
            
            <button onclick="guardar()" class="btn-main">GUARDAR EN AGENDA</button>
        </div>

        <div>
            <div class="seccion"><h3>Agenda</h3><div id="cola_eventos"></div></div>
            <div class="seccion"><h3>Cifrado GitHub</h3><textarea id="output" readonly></textarea><button onclick="copy()" class="btn-main" style="background:#fff;">COPIAR</button></div>
        </div>
    </div>
</div>

<script>
    let BD = {};
    let agenda = JSON.parse(localStorage.getItem('pepe_agenda') || "[]");
    let cur = { cat:"", e1:"", l1:"", e2:"", l2:"", modo:"" }; 
    let links = [];

    function acceso() {
        if(window.btoa(document.getElementById('pin_input').value) === "THVzaWxlY3RyYV8wMUA=") {
            document.getElementById('bloqueo').style.display='none';
            document.getElementById('mando-root').style.display='block';
            update();
        }
    }

    // Cargar Categorías desde tu JSON
    fetch('base_datos.json').then(r => r.json()).then(data => {
        BD = data;
        const div = document.getElementById('categorias');
        Object.keys(BD.ligas).forEach(l => {
            div.innerHTML += `<button class="btn-cat" onclick="setCat('${l}', this)">${l}</button>`;
        });
    });

    function setCat(name, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const liga = BD.ligas[name];
        cur.cat = name;
        cur.modo = liga.modo; // "duelo" (fútbol/tenis) o "unico" (F1/MotoGP)
        cur.e1 = ""; cur.e2 = "";

        const grid = document.getElementById('equipos');
        const zManual = document.getElementById('zona-manual');
        
        if(name === "Eventos Especiales") {
            grid.parentElement.style.display = "none";
            zManual.style.display = "block";
        } else {
            grid.parentElement.style.display = "block";
            zManual.style.display = "none";
            grid.innerHTML = "";
            liga.equipos.forEach(eq => {
                const b = document.createElement('button');
                b.className = 'btn-eq';
                b.innerHTML = `<img src="assets/equipos/${liga.id}/${eq.a}"><br>${eq.n}`;
                b.onclick = () => selectEq(eq.n, `${liga.id}/${eq.a}`, b);
                grid.appendChild(b);
            });
        }
    }

    function selectEq(n, img, btn) {
        if(cur.modo === "unico") {
            cur.e1 = n; cur.l1 = img; cur.e2 = ""; cur.l2 = "";
            document.querySelectorAll('.btn-eq').forEach(x => x.classList.remove('sel'));
            btn.classList.add('sel');
        } else {
            if(!cur.e1 || (cur.e1 && cur.e2)) {
                cur.e1 = n; cur.l1 = img; cur.e2 = "";
                document.querySelectorAll('.btn-eq').forEach(x => x.classList.remove('sel'));
                btn.classList.add('sel');
            } else {
                cur.e2 = n; cur.l2 = img;
                btn.classList.add('sel');
            }
        }
    }

    function addLink() {
        const v = document.getElementById('l_in').value.trim();
        if(v) { links.push(v); document.getElementById('l_in').value=""; renderLinks(); }
    }
    function renderLinks() { document.getElementById('v_links').innerText = "Links: " + links.length; }

    function guardar() {
        // Validación inteligente
        if(cur.cat === "Eventos Especiales") {
            cur.e1 = document.getElementById('m_nombre').value;
            cur.l1 = "../deporte/generico.png"; // O el que quieras por defecto
            if(!cur.e1) return alert("Escribe el nombre del evento");
        } else {
            if(!cur.e1) return alert("Selecciona al menos un equipo/piloto");
            if(cur.modo === "duelo" && !cur.e2) return alert("Esta categoría requiere 2 equipos (Duelo)");
        }
        if(links.length === 0) return alert("Faltan links");

        const ev = {
            fecha: document.getElementById('f_in').value,
            hora: document.getElementById('h_in').value,
            e1: cur.e1, logo1: cur.l1,
            e2: cur.e2, logo2: cur.l2,
            canal: document.getElementById('c_in').value || cur.cat,
            links: [...links]
        };

        agenda.push(ev);
        update();
        links = []; cur.e1=""; cur.e2=""; document.getElementById('m_nombre').value="";
        document.querySelectorAll('.btn-eq').forEach(x => x.classList.remove('sel'));
        renderLinks();
        alert("Añadido.");
    }

    function update() {
        localStorage.setItem('pepe_agenda', JSON.stringify(agenda));
        document.getElementById('output').value = window.btoa(unescape(encodeURIComponent(JSON.stringify(agenda))));
        document.getElementById('cola_eventos').innerHTML = agenda.map((e, i) => `
            <div class="item-cola">
                <b>${e.hora}</b> | ${e.e1} ${e.e2 ? 'vs '+e.e2 : ''}
                <span class="del-btn" onclick="agenda.splice(${i},1);update()">×</span>
            </div>
        `).join('');
    }

    function copy() { document.getElementById('output').select(); document.execCommand('copy'); alert("Copiado"); }
    document.getElementById('f_in').valueAsDate = new Date();
</script>
</body>
</html>
