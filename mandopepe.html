<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO CONTROL - SINGLE LINE</title>
    <style>
        :root { --main: #00ff88; --bg: #0a0a0a; --panel: #161616; --especial: #ff9f43; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; user-select: none; }
        
        #bloqueo { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; text-align: center; }
        .tv-card { background: #111; padding: 50px; border-radius: 30px; border: 2px solid #333; max-width: 400px; }
        .codigo-tv { font-size: 32px; font-weight: 900; color: var(--main); letter-spacing: 5px; background: #000; padding: 15px; border-radius: 10px; margin: 20px 0; border: 1px dashed var(--main); }
        
        #mando-root { display: none; max-width: 1200px; margin: auto; }
        .layout { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; }
        .seccion { background: var(--panel); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }

        .contenedor-cats { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .btn-cat { background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; width: 110px; font-size: 11px; }
        .img-holder, .img-wrap { background: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; overflow: hidden; border: 2px solid #333; }
        .btn-cat img, .btn-eq img { width: 80%; height: 80%; object-fit: contain; }
        .btn-cat.active { background: var(--main); color: #000; border-color: #fff; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; max-height: 400px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .btn-eq { background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .btn-eq.sel { border-color: var(--main); background: rgba(0, 255, 136, 0.1); }
        .btn-eq.sel .img-wrap { border: 2px solid var(--main); }

        input { background: #000; color: var(--main); border: 1px solid #333; padding: 12px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-top: 5px; font-weight: bold; color-scheme: dark; }
        .btn-main { width: 100%; background: var(--main); color: #000; padding: 15px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        
        .item-cola { background: #000; padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; border-left: 4px solid var(--main); display: flex; align-items: center; gap: 10px; position: relative; }
        .del-btn { position: absolute; right: 10px; top: 12px; color: #ff4444; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        textarea { height: 120px; font-size: 10px; background: #000; color: #00ff88; border: 1px solid #333; width: 100%; padding: 10px; box-sizing: border-box; font-family: monospace; word-break: break-all; }
        .panel-especial { border: 2px dashed var(--especial); padding: 15px; border-radius: 12px; background: rgba(255,159,67,0.05); margin-bottom: 20px; display: none; }
        .badge-links { background: var(--main); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 10px; float: right; }
        .ids-pill { background: #222; color: #00ff88; padding: 2px 5px; border-radius: 4px; font-size: 9px; margin-right: 4px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="tv-card">
        <h2 style="margin:0;">NWAKALO CONTROL</h2>
        <div class="codigo-tv" id="mi_id">----</div>
        <p style="font-size:11px; color:#555;">ID REQUERIDO: BUNKER-QMPBJ</p>
    </div>
</div>

<div id="mando-root">
    <div class="layout">
        <div>
            <div class="panel-especial" id="especial-wrapper">
                <h3 style="color:var(--especial); margin-top:0;">✨ EVENTO LOGO ÚNICO</h3>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" id="esp_tipo" placeholder="Título (F1, BOXEO...)">
                    <input type="text" id="esp_evento" placeholder="Evento (Nombre)">
                </div>
                <input type="text" id="esp_logo" placeholder="Logo (ej: ufc.png)" style="margin-top:10px;">
                <button onclick="fijarEspecial()" class="btn-main" style="background:var(--especial); font-size:12px;">FIJAR DATOS ESPECIALES</button>
            </div>

            <div class="seccion">
                <h3>1. Categorías</h3>
                <div id="categorias" class="contenedor-cats"></div>
                <div id="box-equipos">
                    <h3 style="border-top: 1px solid #333; padding-top: 15px;">2. Seleccionar</h3>
                    <div id="equipos" class="grid"></div>
                </div>
            </div>

            <div class="seccion">
                <h3>3. Configuración y IDs</h3>
                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:10px;">
                    <input type="date" id="f_in">
                    <input type="time" id="h_in" value="21:00">
                </div>
                <input type="text" id="c_in" placeholder="Nombre Canal (Ej: DAZN 1 / M+...)">
                
                <div style="margin-top:15px; background:#000; padding:15px; border-radius:10px; border:2px solid var(--main);">
                    <input type="text" id="l_in" placeholder="Pega el ID AceStream aquí...">
                    <button onclick="crearOActualizarEvento()" class="btn-main">+ AÑADIR ID A ESTE EVENTO</button>
                    <p style="font-size:10px; color:#666; margin-top:8px; text-align:center;">Si el evento ya existe, se le sumará la ID sin crear otra fila.</p>
                </div>
            </div>
        </div>

        <div>
            <div class="seccion">
                <h3>Agenda Nwakalo <span id="count-agenda" class="badge-links">0</span></h3>
                <div id="cola_eventos" style="max-height: 550px; overflow-y: auto;"></div>
                <button onclick="if(confirm('¿Borrar todo?')){agenda=[];updateAgenda();}" style="background:none; border:none; color:#555; font-size:10px; cursor:pointer; margin-top:10px;">Vaciar lista completa</button>
            </div>

            <div class="seccion">
                <h3>Código GitHub</h3>
                <textarea id="output" readonly onclick="this.select()"></textarea>
                <button onclick="copyToClipboard()" class="btn-main">COPIAR CÓDIGO</button>
            </div>
        </div>
    </div>
</div>

<script>
    const AUTORIZADOS = ["BUNKER-QMPBJ"]; 
    let BD = {};
    let agenda = JSON.parse(localStorage.getItem('nw_agenda_v9') || "[]");
    let cur = { cat:"", e1:"", l1:"", e2:"", l2:"", modo:"duelo" };

    function chequearAcceso() {
        let id = localStorage.getItem('bunker_id') || "BUNKER-" + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('bunker_id', id);
        document.getElementById('mi_id').innerText = id;
        if(AUTORIZADOS.includes(id)) {
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('mando-root').style.display = 'block';
            iniciarApp();
        }
    }

    async function iniciarApp() {
        const r = await fetch('base_datos.json?v=' + Date.now());
        BD = await r.json();
        
        // Poner fecha de hoy por defecto en el calendario
        document.getElementById('f_in').valueAsDate = new Date();

        const menu = document.getElementById('categorias');
        menu.innerHTML = "";
        Object.keys(BD.ligas).forEach(l => {
            const btn = document.createElement('button');
            btn.className = 'btn-cat';
            btn.innerHTML = `<div class="img-holder"><img src="assets/equipos/${BD.ligas[l].logo}" onerror="this.src='assets/deporte/${BD.ligas[l].logo}';"></div><span>${l}</span>`;
            btn.onclick = () => cargarEquipos(l, btn);
            menu.appendChild(btn);
        });
        updateAgenda();
    }

    function cargarEquipos(ligaNom, btn) {
        document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const grid = document.getElementById('equipos');
        const espBox = document.getElementById('especial-wrapper');
        cur.cat = ligaNom; grid.innerHTML = "";
        
        const config = BD.ligas[ligaNom];
        espBox.style.display = (ligaNom === "EVENTOS ESPECIALES") ? 'block' : 'none';
        cur.modo = config.modo || "duelo";
        cur.e1 = ""; cur.e2 = "";

        config.equipos.forEach(eq => {
            const b = document.createElement('button');
            b.className = 'btn-eq';
            let imgPath = (cur.modo === "unico") ? `assets/deporte/${eq.a}` : `assets/equipos/${config.id}/${eq.a}`;
            b.innerHTML = `<div class="img-wrap"><img src="${imgPath}" onerror="this.src='assets/default.png'"></div><span>${eq.n}</span>`;
            b.onclick = () => {
                if(cur.modo === "unico") {
                    cur.e1 = eq.n; cur.l1 = eq.a; cur.e2 = ""; cur.l2 = "";
                    document.querySelectorAll('.btn-eq').forEach(v => v.classList.remove('sel')); b.classList.add('sel');
                } else {
                    if(!cur.e1 || (cur.e1 && cur.e2)) {
                        cur.e1 = eq.n; cur.l1 = `${config.id}/${eq.a}`; cur.e2 = "";
                        document.querySelectorAll('.btn-eq').forEach(v => v.classList.remove('sel')); b.classList.add('sel');
                    } else {
                        cur.e2 = eq.n; cur.l2 = `${config.id}/${eq.a}`; b.classList.add('sel');
                    }
                }
            };
            grid.appendChild(b);
        });
    }

    function fijarEspecial() {
        cur.e1 = document.getElementById('esp_tipo').value + ": " + document.getElementById('esp_evento').value;
        cur.l1 = document.getElementById('esp_logo').value || 'default.png';
        cur.e2 = ""; cur.l2 = ""; alert("Datos especiales fijados.");
    }

    // LOGICA DE UNA FILA POR EVENTO
    function crearOActualizarEvento() {
        const linkIn = document.getElementById('l_in');
        const link = linkIn.value.trim();
        const fecha = document.getElementById('f_in').value;
        const hora = document.getElementById('h_in').value;
        const canal = document.getElementById('c_in').value || "Multicanal";

        if(!cur.e1 || !link) return alert("Faltan datos (Equipos o ID)");

        // Buscamos si ya existe este evento en la agenda (mismos equipos, misma hora)
        let index = agenda.findIndex(ev => ev.e1 === cur.e1 && ev.e2 === cur.e2 && ev.hora === hora);

        if(index !== -1) {
            // SI EXISTE: Añadimos la ID a la lista de ese evento (separadas por coma)
            if(!agenda[index].link.includes(link)) {
                agenda[index].link += ", " + link;
                // También podemos añadir el canal si es distinto
                if(!agenda[index].canal.includes(canal)) {
                    agenda[index].canal += " / " + canal;
                }
            }
        } else {
            // SI NO EXISTE: Creamos la fila nueva
            agenda.push({
                visible: true,
                fecha: fecha,
                hora: hora,
                canal: canal,
                e1: cur.e1, logo1: cur.l1,
                e2: cur.e2, logo2: cur.l2,
                link: link
            });
        }

        linkIn.value = "";
        linkIn.focus();
        updateAgenda();
    }

    function updateAgenda() {
        localStorage.setItem('nw_agenda_v9', JSON.stringify(agenda));
        document.getElementById('count-agenda').innerText = agenda.length;
        
        const filtrados = agenda.filter(e => e.visible).map(({...r}) => r);
        document.getElementById('output').value = btoa(unescape(encodeURIComponent(JSON.stringify(filtrados))));
        
        document.getElementById('cola_eventos').innerHTML = agenda.map((e, i) => {
            const numIds = e.link.split(',').length;
            return `
            <div class="item-cola">
                <input type="checkbox" ${e.visible ? 'checked' : ''} onchange="agenda[${i}].visible=!agenda[${i}].visible; updateAgenda();">
                <div style="flex:1">
                    <b style="color:var(--main)">${e.hora}</b> | ${e.e1} ${e.e2?'vs '+e.e2:''}<br>
                    <span style="font-size:10px; color:#aaa">${e.canal}</span><br>
                    <span class="ids-pill">${numIds} ID(s) activas</span>
                </div>
                <span class="del-btn" onclick="agenda.splice(${i},1);updateAgenda();">×</span>
            </div>
        `}).reverse().join('');
    }

    function copyToClipboard() {
        document.getElementById('output').select();
        document.execCommand('copy');
        alert("Copiado. Pégalo en GitHub.");
    }

    chequearAcceso();
</script>
</body>
</html>
