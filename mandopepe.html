<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Eventos NWAKALO</title>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .seccion { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        .grid-logos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-equipos { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 5px; }
        
        button { background: #333; color: #fff; border: 1px solid #555; padding: 10px; cursor: pointer; border-radius: 5px; font-size: 12px; }
        button:hover { background: #00ff88; color: #000; }
        button.selected { background: #00ff88; color: #000; border-color: #fff; }

        .preview { background: #000; color: #00ff88; padding: 15px; border-radius: 5px; font-family: monospace; word-break: break-all; border: 1px dashed #00ff88; }
        input { background: #000; color: #fff; border: 1px solid #00ff88; padding: 10px; width: 90%; border-radius: 5px; }
        img { height: 25px; vertical-align: middle; margin-right: 5px; }
        .hidden { display: none; }
        h3 { color: #00ff88; margin-top: 0; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#00ff88;">MANDO PROGRAMACIÓN</h2>

    <!-- 1. SELECCIONAR LIGA -->
    <div class="seccion">
        <h3>1. Selecciona Competición</h3>
        <div class="grid-logos">
            <button onclick="cargarLiga('laligaespana')"><img src="assets/deporte/1.png"> LA LIGA</button>
            <button onclick="cargarLiga('premierleague')"><img src="assets/deporte/2.png"> PREMIER</button>
        </div>
    </div>

    <!-- 2. SELECCIONAR EQUIPOS -->
    <div id="zonaEquipos" class="seccion hidden">
        <h3 id="tituloLiga">Equipos</h3>
        <p style="font-size: 12px; color: #aaa;">Selecciona Local y luego Visitante:</p>
        <div id="listaEquipos" class="grid-equipos"></div>
    </div>

    <!-- 3. CANAL Y GENERACIÓN -->
    <div class="seccion">
        <h3>2. Detalles y Resultado</h3>
        <input type="text" id="canal" placeholder="Nombre del Canal (Ej: DAZN LALIGA)" oninput="generar()">
        <div style="margin-top:15px;">
            <strong>Resultado para pegar en Evento:</strong>
            <div id="codigoFinal" class="preview">Esperando datos...</div>
        </div>
        <button onclick="copiarCodigo()" style="width:100%; margin-top:10px; background:#00ff88; color:#000;">COPIAR CÓDIGO</button>
    </div>

<script>
    const db = {
        laligaespana: [
            {n:"Alavés", a:"ala.png"}, {n:"Athletic", a:"ath.png"}, {n:"Atlético", a:"atm.png"}, {n:"Barcelona", a:"bar.png"}, {n:"Betis", a:"bet.png"}, {n:"Celta", a:"cel.png"}, {n:"Espanyol", a:"esp.png"}, {n:"Getafe", a:"get.png"}, {n:"Girona", a:"gir.png"}, {n:"Las Palmas", a:"lpa.png"}, {n:"Leganés", a:"leg.png"}, {n:"Mallorca", a:"mal.png"}, {n:"Osasuna", a:"osa.png"}, {n:"Rayo", a:"ray.png"}, {n:"Real Madrid", a:"rma.png"}, {n:"Real Sociedad", a:"rso.png"}, {n:"Sevilla", a:"sev.png"}, {n:"Valencia", a:"val.png"}, {n:"Valladolid", a:"vld.png"}, {n:"Villarreal", a:"vil.png"}
        ],
        premierleague: [
            {n:"Bournemouth", a:"bou.png"}, {n:"Arsenal", a:"ars.png"}, {n:"Aston Villa", a:"av.png"}, {n:"Brentford", a:"bre.png"}, {n:"Brighton", a:"bri.png"}, {n:"Burnley", a:"bur.png"}, {n:"Chelsea", a:"che.png"}, {n:"Crystal Palace", a:"cri.png"}, {n:"Everton", a:"eve.png"}, {n:"Fulham", a:"ful.png"}, {n:"Leeds", a:"lee.png"}, {n:"Liverpool", a:"liv.png"}, {n:"Man City", a:"manc.png"}, {n:"Man Utd", a:"manu.png"}, {n:"Newcastle", a:"new.png"}, {n:"Nottingham", a:"not.png"}, {n:"Sunderland", a:"sun.png"}, {n:"Tottenham", a:"tot.png"}, {n:"West Ham", a:"whu.png"}, {n:"Wolves", a:"wol.png"}
        ]
    };

    let partido = { local: "", visita: "", imgL: "", imgV: "", ligaActual: "" };

    function cargarLiga(liga) {
        partido.ligaActual = liga;
        document.getElementById('zonaEquipos').classList.remove('hidden');
        document.getElementById('tituloLiga').innerText = liga.toUpperCase();
        const lista = document.getElementById('listaEquipos');
        lista.innerHTML = '';
        
        db[liga].forEach(e => {
            const btn = document.createElement('button');
            const ruta = `assets/equipos/${liga}/${e.a}`;
            btn.innerHTML = `<img src="${ruta}" onerror="this.src='assets/equipos/placeholder.png'"><br>${e.n}`;
            btn.onclick = () => seleccionar(e.n, ruta, btn);
            lista.appendChild(btn);
        });
    }

    function seleccionar(nombre, img, el) {
        if (!partido.local || (partido.local && partido.visita)) {
            partido.local = nombre; partido.imgL = img; partido.visita = "";
            document.querySelectorAll('.grid-equipos button').forEach(b => b.classList.remove('selected'));
        } else {
            partido.visita = nombre; partido.imgV = img;
        }
        el.classList.add('selected');
        generar();
    }

    function generar() {
        const canal = document.getElementById('canal').value || "CANAL NO DEFINIDO";
        const code = `{"evento": "${partido.local} vs ${partido.visita}", "canal": "${canal}", "logoL": "${partido.imgL}", "logoV": "${partido.imgV}"}`;
        document.getElementById('codigoFinal').innerText = (partido.local && partido.visita) ? code : "Selecciona ambos equipos...";
    }

    function copiarCodigo() {
        const text = document.getElementById('codigoFinal').innerText;
        navigator.clipboard.writeText(text);
        alert("¡Código copiado!");
    }
</script>
</body>
</html>
