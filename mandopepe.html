<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mando Nwakalo - Generador de Eventos</title>
    <style>
        body { background: #111; color: #eee; font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        .seccion { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h3 { color: #00ff88; margin-top: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Grillas */
        .grid-logos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; max-height: 300px; overflow-y: auto; padding: 10px; background: #111; border-radius: 8px; }
        
        button { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; font-size: 0.85rem; }
        button:hover { border-color: #00ff88; background: #333; }
        button.selected { background: #00ff88; color: #000; border-color: #fff; font-weight: bold; }

        /* Imágenes */
        img { height: 30px; vertical-align: middle; margin-bottom: 5px; object-fit: contain; }
        .img-canal { height: 25px; margin-right: 10px; }

        /* Resultado */
        .preview { background: #000; color: #00ff88; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; word-break: break-all; border: 1px solid #00ff88; margin-top: 10px; min-height: 40px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#00ff88;">MANDO DE EVENTOS</h2>

    <!-- 1. COMPETICIÓN -->
    <div class="seccion">
        <h3>1. Competición</h3>
        <div class="grid-logos">
            <button onclick="cargarLiga('laligaespana')"><img src="assets/deporte/1.png"><br>LA LIGA</button>
            <button onclick="cargarLiga('premierleague')"><img src="assets/deporte/2.png"><br>PREMIER</button>
        </div>
    </div>

    <!-- 2. EQUIPOS -->
    <div id="zonaEquipos" class="seccion hidden">
        <h3 id="tituloLiga">Equipos</h3>
        <div id="listaEquipos" class="grid-items"></div>
    </div>

    <!-- 3. CANALES (Basado en tu estructura) -->
    <div class="seccion">
        <h3>2. Seleccionar Canal</h3>
        <div class="grid-items">
            <!-- Ejemplo de canales basados en tu carpeta assets/canales/ -->
            <button onclick="setCanal('DAZN LALIGA', 'assets/canales/daznlaliga.png', this)">
                <img src="assets/canales/daznlaliga.png" class="img-canal" onerror="this.style.display='none'"> DAZN LP
            </button>
            <button onclick="setCanal('M+ LALIGA', 'assets/canales/movistarlaliga.png', this)">
                <img src="assets/canales/movistarlaliga.png" class="img-canal" onerror="this.style.display='none'"> M+ LIGA
            </button>
            <button onclick="setCanal('DAZN 1', 'assets/canales/dazn1.png', this)">
                <img src="assets/canales/dazn1.png" class="img-canal" onerror="this.style.display='none'"> DAZN 1
            </button>
            <button onclick="setCanal('M+ CHAMPIONS', 'assets/canales/movistarchampions.png', this)">
                <img src="assets/canales/movistarchampions.png" class="img-canal" onerror="this.style.display='none'"> M+ CH
            </button>
        </div>
    </div>

    <!-- 4. GENERADOR -->
    <div class="seccion">
        <h3>3. Código para Evento</h3>
        <div id="codigoFinal" class="preview">Selecciona equipos y canal...</div>
        <button onclick="copiarCodigo()" style="width:100%; margin-top:15px; background:#00ff88; color:#000; font-weight:bold; font-size:1rem;">COPIAR CÓDIGO</button>
    </div>

<script>
    const db = {
        laligaespana: [
            {n:"Alavés", a:"ala.png"}, {n:"Athletic", a:"ath.png"}, {n:"Atlético", a:"atm.png"}, {n:"Barcelona", a:"bar.png"}, {n:"Betis", a:"bet.png"}, {n:"Celta", a:"cel.png"}, {n:"Espanyol", a:"esp.png"}, {n:"Getafe", a:"get.png"}, {n:"Girona", a:"gir.png"}, {n:"Las Palmas", a:"lpa.png"}, {n:"Leganés", a:"leg.png"}, {n:"Mallorca", a:"mal.png"}, {n:"Osasuna", a:"osa.png"}, {n:"Rayo", a:"ray.png"}, {n:"Real Madrid", a:"rma.png"}, {n:"Real Sociedad", a:"rso.png"}, {n:"Sevilla", a:"sev.png"}, {n:"Valencia", a:"val.png"}, {n:"Valladolid", a:"vld.png"}, {n:"Villarreal", a:"vil.png"}
        ],
        premierleague: [
            {n:"Bournemouth", a:"bou.png"}, {n:"Arsenal", a:"ars.png"}, {n:"Aston Villa", a:"av.png"}, {n:"Brentford", a:"bre.png"}, {n:"Brighton", a:"bri.png"}, {n:"Burnley", a:"bur.png"}, {n:"Chelsea", a:"che.png"}, {n:"Crystal Palace", a:"cri.png"}, {n:"Everton", a:"eve.png"}, {n:"Fulham", a:"ful.png"}, {n:"Leeds", a:"lee.png"}, {n:"Liverpool", a:"liv.png"}, {n:"Man City", a:"manc.png"}, {n:"Man Utd", a:"manu.png"}, {n:"Newcastle", a:"new.png"}, {n:"Nottingham", a:"not.png"}, {n:"Sunderland", a:"sun.png"}, {n:"Tottenham", a:"tot.png"}, {n:"West Ham", a:"whu.png"}, {n:"Wolves", a:"wol.png"}
        ]
    };

    let partido = { local: "", visita: "", imgL: "", imgV: "", canal: "", imgC: "" };

    function cargarLiga(liga) {
        document.getElementById('zonaEquipos').classList.remove('hidden');
        document.getElementById('tituloLiga').innerText = liga.replace('espana', ' ESPAÑA').toUpperCase();
        const lista = document.getElementById('listaEquipos');
        lista.innerHTML = '';
        
        db[liga].forEach(e => {
            const btn = document.createElement('button');
            const ruta = `assets/equipos/${liga}/${e.a}`;
            btn.innerHTML = `<img src="${ruta}" onerror="this.src='assets/equipos/placeholder.png'"><br>${e.n}`;
            btn.onclick = () => seleccionarEquipo(e.n, ruta, btn);
            lista.appendChild(btn);
        });
    }

    function seleccionarEquipo(nombre, img, el) {
        if (!partido.local || (partido.local && partido.visita)) {
            partido.local = nombre; partido.imgL = img; partido.visita = "";
            document.querySelectorAll('#listaEquipos button').forEach(b => b.classList.remove('selected'));
        } else {
            partido.visita = nombre; partido.imgV = img;
        }
        el.classList.add('selected');
        generar();
    }

    function setCanal(nombre, img, el) {
        partido.canal = nombre;
        partido.imgC = img;
        document.querySelectorAll('.grid-items button').forEach(b => {
            if(!b.closest('#listaEquipos')) b.classList.remove('selected');
        });
        el.classList.add('selected');
        generar();
    }

    function generar() {
        if (partido.local && partido.visita && partido.canal) {
            const code = `{"evento": "${partido.local} vs ${partido.visita}", "canal": "${partido.canal}", "logoL": "${partido.imgL}", "logoV": "${partido.imgV}", "logoC": "${partido.imgC}"}`;
            document.getElementById('codigoFinal').innerText = code;
        } else {
            document.getElementById('codigoFinal').innerText = "Faltan datos (Local, Visitante o Canal)...";
        }
    }

    function copiarCodigo() {
        const text = document.getElementById('codigoFinal').innerText;
        if(text.includes('{')) {
            navigator.clipboard.writeText(text);
            alert("¡Código copiado para el evento!");
        }
    }
</script>
</body>
</html>
