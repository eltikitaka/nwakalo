<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANDO PEPE - WHITE CONTROL</title>
    <style>
        :root {
            --main: #00cc6a;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --border: #e0e0e0;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
        }
        .container { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 20px; letter-spacing: 2px; color: var(--main); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; opacity: 0.7; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); 
            background: #f9f9f9; color: var(--text); font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--main); background: #fff; }

        .row { display: flex; gap: 10px; }
        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; transition: 0.2s; margin-top: 10px;
        }
        .btn-add { background: var(--main); color: white; }
        .btn-save { background: #1a1a1a; color: white; margin-top: 20px; font-size: 16px; }
        .btn:active { transform: scale(0.98); }

        hr { border: 0; border-top: 1px solid var(--border); margin: 25px 0; }

        .lista-eventos { margin-top: 20px; }
        .item-evento { 
            background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            border-left: 5px solid var(--main); position: relative; font-size: 13px;
        }
        .item-evento b { color: var(--main); }
        .actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; }
        .btn-mini { padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 10px; font-weight: bold; }
        .btn-edit { background: #ffcc00; color: #000; }
        .btn-del { background: #ff4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>MANDO PEPE 3.0</h2>
    
    <div id="formulario">
        <div class="row">
            <div class="form-group" style="flex:2">
                <label>Equipo 1 / Evento</label>
                <input type="text" id="e1" placeholder="Ej: Real Madrid">
            </div>
            <div class="form-group" style="flex:1">
                <label>Logo 1</label>
                <input type="text" id="l1" placeholder="madrid.png">
            </div>
        </div>

        <div class="row">
            <div class="form-group" style="flex:2">
                <label>Equipo 2 (Opcional)</label>
                <input type="text" id="e2" placeholder="Ej: FC Barcelona">
            </div>
            <div class="form-group" style="flex:1">
                <label>Logo 2</label>
                <input type="text" id="l2" placeholder="barca.png">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fecha">
            </div>
            <div class="form-group">
                <label>Hora</label>
                <input type="time" id="hora">
            </div>
        </div>

        <div class="form-group">
            <label>Nombre del Canal (Opciones TV)</label>
            <input type="text" id="canal" placeholder="Ej: Opción 1, M+ La Liga, DAZN...">
        </div>

        <div class="form-group">
            <label>ID AceStream / Link</label>
            <input type="text" id="link" placeholder="Solo el ID o acestream://...">
        </div>

        <button class="btn btn-add" id="btn-accion" onclick="agregarEvento()">+ Añadir a la Lista</button>
        <button class="btn btn-save" onclick="subirAGitHub()">🚀 Subir Todo a GitHub</button>
    </div>

    <hr>
    <div class="lista-eventos" id="lista-eventos">
        </div>
</div>

<script>
    // CONFIGURACIÓN (Pon tus datos aquí)
    const TOKEN = "TU_TOKEN_GITHUB_AQUI"; 
    const URL_API = "https://api.github.com/repos/eltikitaka/nwakalo/contents/eventos.json";
    
    let agenda = [];
    let editandoID = null;

    // Cargar datos actuales al abrir
    async function cargarActuales() {
        try {
            const r = await fetch(URL_API + '?v=' + Date.now());
            const d = await r.json();
            const b64 = d.content.replace(/\n/g, '');
            agenda = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
            renderizar();
        } catch (e) { console.log("Iniciando agenda vacía"); }
    }

    function agregarEvento() {
        const ev = {
            e1: document.getElementById('e1').value.trim(),
            e2: document.getElementById('e2').value.trim(),
            fecha: document.getElementById('fecha').value,
            hora: document.getElementById('hora').value,
            logo1: document.getElementById('l1').value.trim(),
            logo2: document.getElementById('l2').value.trim(),
            canal: document.getElementById('canal').value.trim() || "Opción 1",
            link: document.getElementById('link').value.trim()
        };

        if(!ev.e1 || !ev.fecha || !ev.hora || !ev.link) return alert("Rellena lo básico");

        // Limpiar link
        ev.link = ev.link.replace('acestream://', '').trim();
        if(!ev.link.includes('http')) ev.link = "acestream://" + ev.link;

        if(editandoID !== null) {
            agenda[editandoID] = ev;
            editandoID = null;
            document.getElementById('btn-accion').innerText = "+ Añadir a la Lista";
        } else {
            agenda.push(ev);
        }

        renderizar();
        limpiar();
    }

    function renderizar() {
        const div = document.getElementById('lista-eventos');
        div.innerHTML = "";
        agenda.sort((a,b) => (a.fecha+a.hora).localeCompare(b.fecha+b.hora));
        
        agenda.forEach((ev, i) => {
            const item = document.createElement('div');
            item.className = "item-evento";
            item.innerHTML = `
                <b>${ev.hora}</b> | ${ev.e1} ${ev.e2 ? 'vs '+ev.e2 : ''}<br>
                <small>Canal: ${ev.canal}</small>
                <div class="actions">
                    <button class="btn-mini btn-edit" onclick="editar(${i})">✏️</button>
                    <button class="btn-mini btn-del" onclick="borrar(${i})">🗑️</button>
                </div>
            `;
            div.appendChild(item);
        });
    }

    function borrar(i) {
        if(confirm("¿Borrar evento?")) {
            agenda.splice(i, 1);
            renderizar();
        }
    }

    function editar(i) {
        const ev = agenda[i];
        document.getElementById('e1').value = ev.e1;
        document.getElementById('e2').value = ev.e2;
        document.getElementById('fecha').value = ev.fecha;
        document.getElementById('hora').value = ev.hora;
        document.getElementById('l1').value = ev.logo1;
        document.getElementById('l2').value = ev.logo2;
        document.getElementById('canal').value = ev.canal;
        document.getElementById('link').value = ev.link;
        editandoID = i;
        document.getElementById('btn-accion').innerText = "✅ Actualizar Evento";
        window.scrollTo(0,0);
    }

    function limpiar() {
        document.getElementById('e1').value = "";
        document.getElementById('e2').value = "";
        document.getElementById('canal').value = "";
        document.getElementById('link').value = "";
    }

    async function subirAGitHub() {
        if(!confirm("¿Subir cambios a GitHub?")) return;
        
        try {
            const rGet = await fetch(URL_API);
            const dGet = await rGet.json();
            const sha = dGet.sha;

            const jsonString = JSON.stringify(agenda, null, 2);
            const b64 = window.btoa(unescape(encodeURIComponent(jsonString)));

            const rPut = await fetch(URL_API, {
                method: 'PUT',
                headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Actualización Mando Pepe",
                    content: b64,
                    sha: sha
                })
            });

            if(rPut.ok) alert("✅ ¡GitHub Actualizado!");
            else alert("❌ Error al subir");
        } catch (e) { alert("Error de conexión"); }
    }

    cargarActuales();
</script>

</body>
</html>
