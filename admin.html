<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin nwakalo 25/26</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; border: 1px solid #ccc; padding: 15px; max-height: 400px; overflow-y: auto; margin-bottom: 20px; background: #fafafa; }
        .logo-item { cursor: pointer; text-align: center; border: 2px solid transparent; padding: 5px; border-radius: 8px; background: white; }
        .logo-item:hover { border-color: #1877f2; }
        .logo-item img { width: 50px; height: 50px; object-fit: contain; display: block; margin: 0 auto 5px; pointer-events: none; }
        .logo-item small { font-size: 10px; font-weight: bold; pointer-events: none; text-transform: uppercase; }
        .selected-e1 { border-color: #007bff !important; background: #e7f3ff; }
        .selected-e2 { border-color: #dc3545 !important; background: #ffeef0; }
        .form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #28a745; color: white; font-weight: bold; cursor: pointer; grid-column: span 3; border: none; }
        textarea { width: 100%; height: 120px; font-family: monospace; padding: 10px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">Admin nwakalo</h2>
    <p style="text-align:center; font-size: 12px; color: #666;">Click Izquierdo: Local | Click Derecho: Visitante</p>
    
    <div id="listaEquipos" class="grid"></div>

    <div class="form">
        <input type="time" id="hora">
        <input type="text" id="canal" placeholder="Canal">
        <input type="text" id="ace" placeholder="ID Acestream">
        <button onclick="generar()">GENERAR CÓDIGO</button>
    </div>

    <textarea id="resultado" readonly placeholder="Copia el código aquí..."></textarea>
</div>

<script>
    // DATOS DE TUS ARCHIVOS
    const EQUIPOS = [
        { n: "Real Madrid CF", f: "rmadrid.png" }, { n: "FC Barcelona", f: "fcb.png" },
        { n: "Atlético de Madrid", f: "atm.png" }, { n: "Athletic Club", f: "ath.png" },
        { n: "Villarreal CF", f: "vil.png" }, { n: "Real Sociedad", f: "rsoc.png" },
        { n: "Real Betis", f: "bet.png" }, { n: "Valencia CF", f: "vcf.png" },
        { n: "Girona FC", f: "gir.png" }, { n: "RC Celta", f: "cel.png" },
        { n: "Sevilla FC", f: "sev.png" }, { n: "RCD Espanyol", f: "esp.png" },
        { n: "Rayo Vallecano", f: "ray.png" }, { n: "CA Osasuna", f: "osa.png" },
        { n: "Elche CF", f: "elc.png" }, { n: "Levante UD", f: "lev.png" },
        { n: "RCD Mallorca", f: "mal.png" }, { n: "Getafe CF", f: "get.png" },
        { n: "Real Oviedo", f: "ovi.png" }, { n: "Alaves", f: "ala.png" }
    ];

    // USAMOS RUTA RELATIVA DIRECTA
    const RUTA_BASE = "assets/equipos/";
    let e1 = null, e2 = null;

    const contenedor = document.getElementById('listaEquipos');
    
    EQUIPOS.forEach(eq => {
        const div = document.createElement('div');
        div.className = 'logo-item';
        div.innerHTML = `
            <img src="${RUTA_BASE}${eq.f}" onerror="this.src='https://placeholder.com'">
            <small>${eq.n}</small>
        `;
        
        div.onclick = () => {
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e1'));
            div.classList.add('selected-e1');
            e1 = eq;
        };
        
        div.oncontextmenu = (e) => {
            e.preventDefault();
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e2'));
            div.classList.add('selected-e2');
            e2 = eq;
        };
        
        contenedor.appendChild(div);
    });

    function generar() {
        if (!e1 || !e2) return alert("Selecciona Local y Visitante");
        const res = document.getElementById('resultado');
        const ev = {
            hora: document.getElementById('hora').value || "00:00",
            e1: e1.n, logo1: e1.f,
            e2: e2.n, logo2: e2.f,
            canal: document.getElementById('canal').value || "TV",
            link: "acestream://" + (document.getElementById('ace').value || "0")
        };
        res.value = (res.value ? res.value + ",\n" : "") + JSON.stringify(ev, null, 2);
    }
</script>

</body>
</html>
