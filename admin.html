<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin nwakalo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; border: 1px solid #ccc; padding: 10px; min-height: 100px; margin-bottom: 20px; }
        .logo-item { cursor: pointer; text-align: center; border: 2px solid transparent; }
        .logo-item img { width: 50px; height: 50px; object-fit: contain; }
        .selected-e1 { border-color: blue !important; }
        .selected-e2 { border-color: red !important; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        textarea { width: 100%; height: 100px; margin-top: 10px; }
        #debug { color: red; font-size: 12px; background: #eee; padding: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel Admin - nwakalo</h2>
    <div id="debug"></div>
    <div id="listaEquipos" class="grid">Intentando cargar logos...</div>

    <input type="time" id="hora">
    <input type="text" id="canal" placeholder="Canal">
    <input type="text" id="ace" placeholder="ID Acestream">
    <button onclick="generar()">GENERAR CÓDIGO</button>
    <textarea id="resultado" readonly></textarea>
</div>

<script>
    const USUARIO = "eltikitaka";
    const REPO = "nwakalo";
    const RUTA = "assets/equipos";

    async function cargar() {
        const debug = document.getElementById('debug');
        const lista = document.getElementById('listaEquipos');
        
        try {
            // Usamos un parámetro aleatorio (?t=...) para saltar la caché
            const url = `https://github.com{USUARIO}/${REPO}/contents/${RUTA}?t=${Date.now()}`;
            const res = await fetch(url);
            
            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(`GitHub dice: ${errorData.message}`);
            }

            const archivos = await res.json();
            lista.innerHTML = "";

            archivos.forEach(file => {
                if (file.name.toLowerCase().endsWith('.png')) {
                    const div = document.createElement('div');
                    div.className = 'logo-item';
                    div.innerHTML = `<img src="${file.download_url}"><br><small>${file.name.split('.')[0]}</small>`;
                    
                    div.onclick = () => {
                        document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e1'));
                        div.classList.add('selected-e1');
                        window.e1 = file.name;
                    };
                    div.oncontextmenu = (e) => {
                        e.preventDefault();
                        document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e2'));
                        div.classList.add('selected-e2');
                        window.e2 = file.name;
                    };
                    lista.appendChild(div);
                }
            });
        } catch (e) {
            debug.style.display = "block";
            debug.innerText = "ERROR DE CARGA: " + e.message;
            lista.innerText = "No se pudieron cargar los logos automáticamente.";
        }
    }

    function generar() {
        if (!window.e1 || !window.e2) return alert("Selecciona equipos");
        const obj = {
            hora: document.getElementById('hora').value,
            e1: window.e1,
            e2: window.e2,
            canal: document.getElementById('canal').value,
            url: "acestream://" + document.getElementById('ace').value
        };
        document.getElementById('resultado').value += JSON.stringify(obj, null, 2) + ",\n";
    }

    cargar();
</script>
</body>
</html>
