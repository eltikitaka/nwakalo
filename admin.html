<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Multi-Link nwakalo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .seccion { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; border: 1px solid #ccc; padding: 15px; max-height: 300px; overflow-y: auto; background: #fafafa; }
        .logo-item { cursor: pointer; text-align: center; border: 2px solid transparent; padding: 5px; border-radius: 8px; }
        .logo-item img { width: 50px; height: 50px; object-fit: contain; display: block; margin: 0 auto; pointer-events: none; }
        .logo-item small { font-size: 10px; font-weight: bold; pointer-events: none; }
        .selected-e1 { border-color: #007bff !important; background: #e7f3ff; }
        .selected-e2 { border-color: #dc3545 !important; background: #ffeef0; }
        .canal-btn { padding: 10px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 8px; font-weight: bold; margin-right: 5px; margin-bottom: 5px; }
        .canal-btn.active { background: #28a745; color: white; border-color: #1e7e34; }
        .form { display: flex; gap: 10px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; }
        
        /* BOTONES DE ACCIÓN */
        .btn-gen { background: #1877f2; color: white; font-weight: bold; cursor: pointer; border: none; flex: 2; font-size: 16px; }
        .btn-borrar { background: #ff9800; color: white; font-weight: bold; cursor: pointer; border: none; flex: 1; font-size: 16px; }
        .btn-gen:hover { background: #166fe5; }
        .btn-borrar:hover { background: #e68a00; }

        textarea { width: 100%; height: 150px; margin-top: 20px; font-family: monospace; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel Admin Pro - 25/26</h2>

    <div class="seccion">
        <h3>1. Selecciona Equipos (Click Izq / Click Der)</h3>
        <div id="listaEquipos" class="grid"></div>
    </div>

    <div class="seccion">
        <h3>2. Selecciona Canal (Multi-Opción)</h3>
        <div id="listaCanales">Cargando canales...</div>
    </div>

    <div class="seccion">
        <h3>3. Datos finales</h3>
        <div class="form">
            <span>Hora:</span> <input type="time" id="hora">
            <button class="btn-gen" onclick="generar()">GENERAR EVENTO</button>
            <button class="btn-borrar" onclick="limpiarTodo()">BORRAR SELECCIÓN</button>
        </div>
    </div>

    <textarea id="resultado" readonly placeholder="Copia este código en tu eventos.json..."></textarea>
</div>

<script>
    const EQUIPOS = [
        { n: "Real Madrid CF", f: "rmadrid.png" }, { n: "FC Barcelona", f: "fcb.png" },
        { n: "Atlético de Madrid", f: "atm.png" }, { n: "Athletic Club", f: "ath.png" },
        { n: "Villarreal CF", f: "vil.png" }, { n: "Real Sociedad", f: "rsoc.png" },
        { n: "Real Betis", f: "bet.png" }, { n: "Valencia CF", f: "vcf.png" },
        { n: "Girona FC", f: "gir.png" }, { n: "RC Celta", f: "cel.png" },
        { n: "Sevilla FC", f: "sev.png" }, { n: "RCD Espanyol", f: "esp.png" },
        { n: "Rayo Vallecano", f: "ray.png" }, { n: "CA Osasuna", f: "osa.png" },
        { n: "Elche CF", f: "elc.png" }, { n: "Levante UD", f: "lev.png" },
        { n: "RCD Mallorca", f: "mal.png" }, { n: "Getafe CF", f: "get.png" },
        { n: "Real Oviedo", f: "ovi.png" }, { n: "Alaves", f: "ala.png" }
    ];

    let canalSeleccionado = null;
    let local = null, visitante = null;

    // Cargar equipos
    const contEq = document.getElementById('listaEquipos');
    EQUIPOS.forEach(eq => {
        const div = document.createElement('div');
        div.className = 'logo-item';
        div.innerHTML = `<img src="assets/equipos/${eq.f}" onerror="this.src='https://placeholder.com'"><small>${eq.n}</small>`;
        div.onclick = () => {
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e1'));
            div.classList.add('selected-e1'); local = eq;
        };
        div.oncontextmenu = (e) => {
            e.preventDefault();
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e2'));
            div.classList.add('selected-e2'); visitante = eq;
        };
        contEq.appendChild(div);
    });

    // Cargar canales
    async function cargarCanales() {
        try {
            const res = await fetch('canales.json?t=' + Date.now());
            const canales = await res.json();
            const contCan = document.getElementById('listaCanales');
            contCan.innerHTML = "";

            Object.keys(canales).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'canal-btn';
                btn.innerText = canales[key].nombre;
                btn.onclick = () => {
                    document.querySelectorAll('.canal-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    canalSeleccionado = canales[key];
                };
                contCan.appendChild(btn);
            });
        } catch (e) { console.error("Error cargando canales:", e); }
    }

    // Función para borrar la selección actual
    function limpiarTodo() {
        local = null;
        visitante = null;
        canalSeleccionado = null;
        document.getElementById('hora').value = "";
        document.getElementById('resultado').value = "";
        document.querySelectorAll('.logo-item').forEach(i => {
            i.classList.remove('selected-e1');
            i.classList.remove('selected-e2');
        });
        document.querySelectorAll('.canal-btn').forEach(b => b.classList.remove('active'));
        alert("Selección borrada");
    }

    function generar() {
        if (!local || !visitante || !canalSeleccionado) return alert("Faltan datos (Equipos o Canal)");
        
        const evento = {
            hora: document.getElementById('hora').value || "00:00",
            e1: local.n, logo1: local.f,
            e2: visitante.n, logo2: visitante.f,
            canal: canalSeleccionado.nombre,
            links: canalSeleccionado.opciones
        };

        const area = document.getElementById('resultado');
        area.value = (area.value ? area.value + ",\n" : "") + JSON.stringify(evento, null, 2);
    }

    cargarCanales();
</script>
</body>
</html>
