<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin nwakalo 25/26</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1877f2; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; border: 1px solid #ccc; padding: 15px; max-height: 450px; overflow-y: auto; margin-bottom: 20px; background: #fafafa; border-radius: 8px; }
        .logo-item { cursor: pointer; text-align: center; border: 3px solid transparent; padding: 10px; border-radius: 8px; background: white; transition: 0.2s; }
        .logo-item:hover { border-color: #1877f2; transform: translateY(-2px); }
        .logo-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; pointer-events: none; }
        .logo-item small { display: block; font-size: 10px; font-weight: bold; line-height: 1.1; pointer-events: none; }
        .selected-e1 { border-color: #007bff !important; background: #e7f3ff; }
        .selected-e2 { border-color: #dc3545 !important; background: #ffeef0; }
        .form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #28a745; color: white; font-weight: bold; cursor: pointer; border: none; grid-column: span 3; }
        button:hover { background: #218838; }
        textarea { width: 100%; height: 150px; margin-top: 20px; font-family: monospace; padding: 10px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel Admin - Temporada 25/26</h2>
    <p style="text-align:center; font-size: 0.85em; color: #666;">
        Clic Izquierdo: <b>Local (Azul)</b> | Clic Derecho / Mantener: <b>Visitante (Rojo)</b>
    </p>
    
    <div id="listaEquipos" class="grid"></div>

    <div class="form">
        <input type="time" id="hora">
        <input type="text" id="canal" placeholder="Canal (Ej: DAZN 1)">
        <input type="text" id="ace" placeholder="ID Acestream (solo código)">
        <button onclick="generar()">GENERAR EVENTO</button>
    </div>

    <textarea id="resultado" readonly placeholder="Copia el código aquí..."></textarea>
</div>

<script>
    // DATOS SEGÚN TU IMAGEN
    const EQUIPOS = [
        { n: "Real Madrid CF", f: "rmadrid.png" }, { n: "FC Barcelona", f: "fcb.png" },
        { n: "Atlético de Madrid", f: "atm.png" }, { n: "Athletic Club", f: "ath.png" },
        { n: "Villarreal CF", f: "vil.png" }, { n: "Real Sociedad", f: "rsoc.png" },
        { n: "Real Betis", f: "bet.png" }, { n: "Valencia CF", f: "vcf.png" },
        { n: "Girona FC", f: "gir.png" }, { n: "RC Celta de Vigo", f: "cel.png" },
        { n: "Sevilla FC", f: "sev.png" }, { n: "RCD Espanyol", f: "esp.png" },
        { n: "Rayo Vallecano", f: "ray.png" }, { n: "CA Osasuna", f: "osa.png" },
        { n: "Elche CF", f: "elc.png" }, { n: "Levante UD", f: "lev.png" },
        { n: "RCD Mallorca", f: "mal.png" }, { n: "Getafe CF", f: "get.png" },
        { n: "Real Oviedo", f: "ovi.png" }, { n: "Deportivo Alavés", f: "ala.png" }
    ];

    const RUTA_BASE = "assets/equipos/";
    let e1 = null, e2 = null;

    const lista = document.getElementById('listaEquipos');
    EQUIPOS.forEach(eq => {
        const div = document.createElement('div');
        div.className = 'logo-item';
        div.innerHTML = `<img src="${RUTA_BASE}${eq.f}" onerror="this.src='https://placeholder.com'"><small>${eq.n}</small>`;
        
        div.onclick = () => {
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e1'));
            div.classList.add('selected-e1');
            e1 = eq;
        };
        div.oncontextmenu = (e) => {
            e.preventDefault();
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e2'));
            div.classList.add('selected-e2');
            e2 = eq;
        };
        lista.appendChild(div);
    });

    function generar() {
        if (!e1 || !e2) return alert("Selecciona Local y Visitante");
        const res = document.getElementById('resultado');
        const evento = {
            hora: document.getElementById('hora').value || "00:00",
            e1: e1.n, logo1: e1.f,
            e2: e2.n, logo2: e2.f,
            canal: document.getElementById('canal').value || "TV",
            link: "acestream://" + (document.getElementById('ace').value || "0")
        };
        res.value = (res.value ? res.value + ",\n" : "") + JSON.stringify(evento, null, 2);
    }
</script>
</body>
</html>
