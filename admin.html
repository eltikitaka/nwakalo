<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin nwakalo 25/26</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; margin: 0; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        .instrucciones { background: #fff8e1; padding: 12px; border-radius: 8px; font-size: 0.9em; margin-bottom: 20px; border-left: 5px solid #ffc107; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; border: 1px solid #ddd; padding: 15px; max-height: 400px; overflow-y: auto; background: #fafafa; border-radius: 8px; }
        .logo-item { cursor: pointer; text-align: center; border: 3px solid transparent; padding: 10px; border-radius: 10px; background: white; transition: 0.2s; }
        .logo-item:hover { border-color: #1a73e8; }
        .logo-item img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        .logo-item small { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #333; }
        .selected-e1 { border-color: #1a73e8 !important; background: #e8f0fe; }
        .selected-e2 { border-color: #d93025 !important; background: #fce8e6; }
        .form { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
        .btn-gen { background: #34a853; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; grid-column: span 3; margin-top: 10px; }
        .btn-gen:hover { background: #2d8e47; }
        textarea { width: 100%; height: 140px; margin-top: 20px; font-family: monospace; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background: #f8f9fa; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel Admin - Temporada 25/26</h2>
    
    <div class="instrucciones">
        <b>Manual rápido:</b><br>
        1. Clic normal para <b>Local</b> (Borde Azul).<br>
        2. Clic derecho (o mantener pulsado) para <b>Visitante</b> (Borde Rojo).
    </div>
    
    <div id="listaEquipos" class="grid"></div>

    <div class="form">
        <input type="time" id="hora">
        <input type="text" id="canal" placeholder="Canal (Ej: DAZN 1)">
        <input type="text" id="ace" placeholder="ID Acestream (solo código)">
        <button class="btn-gen" onclick="generar()">GENERAR CÓDIGO PARA EVENTOS.JSON</button>
    </div>

    <textarea id="resultado" readonly placeholder="Copia el código aquí..."></textarea>
</div>

<script>
    // LISTADO DE EQUIPOS SEGÚN TU IMAGEN
    const EQUIPOS = [
        { n: "Real Madrid CF", f: "rmadrid.png" }, { n: "FC Barcelona", f: "fcb.png" },
        { n: "Atlético de Madrid", f: "atm.png" }, { n: "Athletic Club", f: "ath.png" },
        { n: "Villarreal CF", f: "vil.png" }, { n: "Real Sociedad", f: "rsoc.png" },
        { n: "Real Betis Balompié", f: "bet.png" }, { n: "Valencia CF", f: "vcf.png" },
        { n: "Girona FC", f: "gir.png" }, { n: "RC Celta de Vigo", f: "cel.png" },
        { n: "Sevilla FC", f: "sev.png" }, { n: "RCD Espanyol", f: "esp.png" },
        { n: "Rayo Vallecano", f: "ray.png" }, { n: "CA Osasuna", f: "osa.png" },
        { n: "Elche CF", f: "elc.png" }, { n: "Levante UD", f: "lev.png" },
        { n: "RCD Mallorca", f: "mal.png" }, { n: "Getafe CF", f: "get.png" },
        { n: "Real Oviedo", f: "ovi.png" }, { n: "Deportivo Alavés", f: "ala.png" }
    ];

    // USAMOS RUTA RELATIVA DIRECTA
    const RUTA_BASE = "assets/equipos/"; 
    let e1 = null, e2 = null;

    const lista = document.getElementById('listaEquipos');

    EQUIPOS.forEach(eq => {
        const div = document.createElement('div');
        div.className = 'logo-item';
        
        // Creamos la imagen con una ruta simple
        const imgPath = RUTA_BASE + eq.f;
        
        div.innerHTML = `
            <img src="${imgPath}" onerror="this.onerror=null; this.src='https://placeholder.com';">
            <small>${eq.n}</small>
        `;
        
        div.onclick = () => {
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e1'));
            div.classList.add('selected-e1');
            e1 = eq;
        };
        
        div.oncontextmenu = (e) => {
            e.preventDefault();
            document.querySelectorAll('.logo-item').forEach(i => i.classList.remove('selected-e2'));
            div.classList.add('selected-e2');
            e2 = eq;
        };
        
        lista.appendChild(div);
    });

    function generar() {
        if (!e1 || !e2) return alert("Selecciona Local y Visitante");
        const res = document.getElementById('resultado');
        const ev = {
            hora: document.getElementById('hora').value || "00:00",
            e1: e1.n, logo1: e1.f,
            e2: e2.n, logo2: e2.f,
            canal: document.getElementById('canal').value || "TV",
            link: "acestream://" + (document.getElementById('ace').value || "0")
        };
        res.value = (res.value ? res.value + ",\n" : "") + JSON.stringify(ev, null, 2);
    }

    // Esto detiene el "giro" de carga si algún recurso tarda demasiado
    window.onload = () => { window.stop(); };
</script>

</body>
</html>
