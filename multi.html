<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO DUAL - STABLE</title>
    <style>
        :root { --main: #00cc6a; }
        * { box-sizing: border-box; margin: 0; padding: 0; background: #000; }
        body { height: 100vh; width: 100vw; display: flex; overflow: hidden; font-family: sans-serif; }

        /* DOS COLUMNAS IGUALES */
        .player-box { 
            flex: 1; height: 100%; border: 3px solid #222; 
            position: relative; transition: 0.2s;
        }
        
        /* EL BORDE VERDE INDICA CUÁL TIENE EL AUDIO */
        .player-box:focus { border: 6px solid var(--main); outline: none; z-index: 10; }

        video { width: 100%; height: 100%; object-fit: contain; }
        
        .overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; background: rgba(0,0,0,0.6); z-index: 5; text-align: center;
        }

        #selector-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal-content { width: 85%; max-width: 450px; background: #fff; padding: 20px; border-radius: 20px; color: #000; }
        .event-item { padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; font-weight: bold; text-align: center; font-size: 14px; background: #fff; color: #000; }
        .event-item.focus { background: var(--main); color: #fff; border-color: var(--main); }
    </style>
</head>
<body>

    <div id="slot1" class="player-box" tabindex="1">
        <div class="overlay" id="ov1"><h2>IZQUIERDA</h2><p>PULSA OK</p></div>
        <video id="video1" autoplay muted playsinline></video>
    </div>

    <div id="slot2" class="player-box" tabindex="2">
        <div class="overlay" id="ov2"><h2>DERECHA</h2><p>PULSA OK</p></div>
        <video id="video2" autoplay muted playsinline></video>
    </div>

    <div id="selector-modal">
        <div class="modal-content"><div id="event-list"></div></div>
    </div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let todosLosEventos = [];
    let ladoSeleccionando = 1;

    async function cargarDatos() {
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const b64 = text.trim().replace(/["\s]/g, '');
            todosLosEventos = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
        } catch(e) { console.error("Error al decodificar"); }
    }

    function abrirMenu(lado) {
        ladoSeleccionando = lado;
        const divLista = document.getElementById('event-list');
        divLista.innerHTML = "<h2 style='text-align:center;margin-bottom:10px;'>ELIGE CANAL</h2>";
        todosLosEventos.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = "event-item" + (i === 0 ? " focus" : "");
            el.innerText = `${item.hora} - ${item.e1} (${item.canal})`;
            el.onclick = () => {
                const idAce = item.link.replace('acestream://', '').trim();
                const v = document.getElementById(`video${ladoSeleccionando}`);
                const ov = document.getElementById(`ov${ladoSeleccionando}`);
                
                // SID UNICO PARA CADA LADO
                v.src = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${idAce}&output=m3u8&sid=dual_${ladoSeleccionando}_${Date.now()}&transcode=0`;
                v.play().then(() => { 
                    ov.style.display = "none"; 
                    actualizarAudio(); 
                }).catch(() => {
                    setTimeout(() => v.play(), 2000);
                });
                document.getElementById('selector-modal').style.display = "none";
            };
            divLista.appendChild(el);
        });
        document.getElementById('selector-modal').style.display = "flex";
    }

    function actualizarAudio() {
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        if (document.activeElement.id === 'slot1') { v1.muted = false; v2.muted = true; } 
        else { v1.muted = true; v2.muted = false; }
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('selector-modal');
        if (modal.style.display === "flex") {
            const items = Array.from(document.querySelectorAll('.event-item'));
            let idx = items.findIndex(i => i.classList.contains('focus'));
            if(e.key === 'ArrowDown') { items[idx].classList.remove('focus'); idx = (idx + 1) % items.length; items[idx].classList.add('focus'); }
            else if(e.key === 'ArrowUp') { items[idx].classList.remove('focus'); idx = (idx - 1 + items.length) % items.length; items[idx].classList.add('focus'); }
            else if(e.key === 'Enter') items[idx].click();
            else if(e.key === 'Backspace' || e.keyCode === 461) modal.style.display = "none";
            e.preventDefault();
        } else {
            if(e.key === 'ArrowRight') { document.getElementById('slot2').focus(); actualizarAudio(); }
            else if(e.key === 'ArrowLeft') { document.getElementById('slot1').focus(); actualizarAudio(); }
            else if(e.key === 'Enter') abrirMenu(document.activeElement.id === 'slot1' ? 1 : 2);
            else if(e.key === 'Backspace' || e.keyCode === 461) window.location.href = 'index.html';
        }
    });

    document.getElementById('slot1').focus();
    cargarDatos();
</script>
</body>
</html>
