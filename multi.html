<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO DUAL - WHITE EDITION</title>
    <style>
        :root { --main: #00cc6a; --bg: #000; --text: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            height: 100vh; width: 100vw; background: #000; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; overflow: hidden;
        }

        /* DIVISIÓN 50/50 */
        .player-box {
            flex: 1; height: 100%; border: 4px solid #222;
            position: relative; display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: #000;
        }

        /* FOCO DEL MANDO */
        .player-box:focus { border-color: var(--main); outline: none; }
        .player-box.active-audio { border-bottom: 8px solid var(--main); }

        /* REPRODUCTOR (Usa el motor local de AceStream) */
        .video-frame { width: 100%; height: 100%; background: #000; display: none; }
        
        /* OVERLAY DE SELECCIÓN */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            text-align: center; color: #fff;
        }
        .overlay h2 { font-size: 18px; margin-bottom: 10px; color: var(--main); }
        .overlay p { font-size: 12px; opacity: 0.8; }

        /* MINI MENÚ DE EVENTOS */
        #selector-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            width: 80%; max-width: 500px; background: #fff; padding: 20px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .event-item {
            padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #eee;
            font-weight: 800; color: #333; text-transform: uppercase; font-size: 13px;
        }
        .event-item.focus { background: var(--main); color: #fff; border-color: var(--main); }

        #indicador-audio {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: var(--main); color: #fff; padding: 5px 15px;
            border-radius: 20px; font-size: 10px; font-weight: 900; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="indicador-audio">AUDIO: LADO IZQUIERDO</div>

    <div id="slot1" class="player-box focus active-audio" tabindex="1">
        <div class="overlay" id="ov1">
            <h2>PANTALLA 1</h2>
            <p>PULSA OK PARA ELEGIR</p>
        </div>
        <iframe id="iframe1" class="video-frame"></iframe>
    </div>

    <div id="slot2" class="player-box" tabindex="2">
        <div class="overlay" id="ov2">
            <h2>PANTALLA 2</h2>
            <p>PULSA OK PARA ELEGIR</p>
        </div>
        <iframe id="iframe2" class="video-frame"></iframe>
    </div>

    <div id="selector-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color:#333; margin-bottom:15px; text-align:center;">ELIGE PARTIDO</h2>
            <div id="event-list"></div>
        </div>
    </div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let eventos = [];
    let ladoSeleccionando = null;
    let audioEnLado = 1;

    // Función para decodificar tu B64
    function b64DecodeUnicode(str) {
        try {
            return decodeURIComponent(Array.prototype.map.call(window.atob(str), function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch(e) { return decodeURIComponent(escape(window.atob(str))); }
    }

    async function cargarEventos() {
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const text = await r.text();
            const b64 = text.trim().replace(/["\s]/g, '');
            eventos = JSON.parse(b64DecodeUnicode(b64));
        } catch (e) { console.error("Error multi-json"); }
    }

    function mostrarSelector(lado) {
        ladoSeleccionando = lado;
        const modal = document.getElementById('selector-modal');
        const list = document.getElementById('event-list');
        list.innerHTML = "";
        
        // Solo mostramos partidos únicos
        let procesados = [];
        eventos.forEach(ev => {
            let id = ev.e1 + ev.hora;
            if(!procesados.includes(id)){
                const div = document.createElement('div');
                div.className = "event-item";
                div.innerText = `${ev.hora} - ${ev.e1} ${ev.e2 ? 'vs '+ev.e2 : ''}`;
                div.onclick = () => seleccionarPartido(ev);
                list.appendChild(div);
                procesados.push(id);
            }
        });

        modal.style.display = "flex";
        list.firstChild.classList.add('focus');
    }

    function seleccionarPartido(ev) {
        const idAce = ev.link.replace('acestream://', '').trim();
        const frame = document.getElementById(`iframe${ladoSeleccionando}`);
        const overlay = document.getElementById(`ov${ladoSeleccionando}`);
        
        // Truco: Usamos el reproductor HTTP del motor local
        // Nota: En Android TV el puerto suele ser 6878
        frame.src = `http://127.0.0.1:6878/ace/getstream?id=${idAce}&format=hls`;
        frame.style.display = "block";
        overlay.style.display = "none";
        
        document.getElementById('selector-modal').style.display = "none";
    }

    function switchAudio(lado) {
        audioEnLado = lado;
        const s1 = document.getElementById('slot1');
        const s2 = document.getElementById('slot2');
        const indicador = document.getElementById('indicador-audio');

        if(lado === 1) {
            s1.classList.add('active-audio');
            s2.classList.remove('active-audio');
            indicador.innerText = "AUDIO: LADO IZQUIERDO";
            // Aquí se enviaría comando de volumen si el frame fuera nativo
        } else {
            s2.classList.add('active-audio');
            s1.classList.remove('active-audio');
            indicador.innerText = "AUDIO: LADO DERECHO";
        }
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('selector-modal');
        const current = document.activeElement;

        if (modal.style.display === "flex") {
            const items = Array.from(document.querySelectorAll('.event-item'));
            let idx = items.findIndex(i => i.classList.contains('focus'));
            items[idx].classList.remove('focus');

            if(e.key === 'ArrowDown') idx = (idx + 1) % items.length;
            if(e.key === 'ArrowUp') idx = (idx - 1 + items.length) % items.length;
            if(e.key === 'Enter') items[idx].click();
            if(e.key === 'Backspace' || e.keyCode === 461) modal.style.display = "none";

            items[idx].classList.add('focus');
            e.preventDefault();
            return;
        }

        // Navegación principal
        if(e.key === 'ArrowRight') {
            document.getElementById('slot2').focus();
            switchAudio(2);
        }
        if(e.key === 'ArrowLeft') {
            document.getElementById('slot1').focus();
            switchAudio(1);
        }
        if(e.key === 'Enter') {
            const lado = current.id === "slot1" ? 1 : 2;
            mostrarSelector(lado);
        }
        if(e.key === 'Backspace' || e.keyCode === 461) {
            window.location.href = 'index.html';
        }
    });

    cargarEventos();
</script>
</body>
</html>
