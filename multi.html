<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO DUAL - ULTIMATE</title>
    <style>
        :root { --main: #00cc6a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; width: 100vw; background: #000; display: flex; overflow: hidden; font-family: sans-serif; }
        .player-box { flex: 1; height: 100%; border: 2px solid #333; position: relative; background: #000; }
        .player-box:focus { border-color: var(--main); outline: none; }
        .player-box.audio-on { border-bottom: 8px solid var(--main); }
        video { width: 100%; height: 100%; object-fit: contain; display: none; background: #000; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 5; background: rgba(0,0,0,0.5); }
        #selector-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { width: 85%; max-width: 500px; background: #fff; padding: 20px; border-radius: 20px; color: #000; }
        .event-item { padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; font-weight: bold; text-align: center; text-transform: uppercase; font-size: 13px; }
        .event-item.focus { background: var(--main); color: #fff; }
    </style>
</head>
<body>

    <div id="slot1" class="player-box focus audio-on" tabindex="1">
        <div class="overlay" id="ov1"><h2>IZQUIERDA</h2><p>PULSA OK</p></div>
        <video id="video1" autoplay muted playsinline></video>
    </div>

    <div id="slot2" class="player-box" tabindex="2">
        <div class="overlay" id="ov2"><h2>DERECHA</h2><p>PULSA OK</p></div>
        <video id="video2" autoplay muted playsinline></video>
    </div>

    <div id="selector-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="text-align:center; margin-bottom:15px; color:#000;"></h2>
            <div id="event-list"></div>
        </div>
    </div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let todosLosEventos = [];
    let partidosUnicos = [];
    let ladoSeleccionando = 1;
    let menuNivel = "partidos";

    function b64DecodeUnicode(str) {
        try { return decodeURIComponent(Array.prototype.map.call(window.atob(str), function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join('')); } 
        catch(e) { return decodeURIComponent(escape(window.atob(str))); }
    }

    async function cargarDatos() {
        const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
        const text = await r.text();
        const b64 = text.trim().replace(/["\s]/g, '');
        todosLosEventos = JSON.parse(b64DecodeUnicode(b64));
        let procesados = [];
        todosLosEventos.forEach(ev => {
            let id = ev.e1 + ev.hora;
            if(!procesados.includes(id)){
                ev.linksDelPartido = todosLosEventos.filter(x => (x.e1 + x.hora) === id);
                partidosUnicos.push(ev);
                procesados.push(id);
            }
        });
    }

    function abrirMenu(lado) {
        ladoSeleccionando = lado;
        menuNivel = "partidos";
        renderizar(partidosUnicos);
        document.getElementById('selector-modal').style.display = "flex";
    }

    function renderizar(lista) {
        const divLista = document.getElementById('event-list');
        divLista.innerHTML = "";
        document.getElementById('modal-title').innerText = menuNivel === "partidos" ? "ELIGE PARTIDO" : "ELIGE CANAL";
        lista.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = "event-item" + (i === 0 ? " focus" : "");
            el.innerText = menuNivel === "partidos" ? `${item.hora} - ${item.e1}` : (item.canal || "CANAL " + (i+1));
            el.onclick = () => {
                if(menuNivel === "partidos") { menuNivel = "canales"; renderizar(item.linksDelPartido); }
                else { lanzarVideo(item.link); }
            };
            divLista.appendChild(el);
        });
    }

    function lanzarVideo(acelink) {
        const idAce = acelink.replace('acestream://', '').trim();
        const v = document.getElementById(`video${ladoSeleccionando}`);
        const ov = document.getElementById(`ov${ladoSeleccionando}`);
        
        // RESET TOTAL DEL VÍDEO ANTES DE CARGAR
        v.pause();
        v.removeAttribute('src');
        v.load();

        // Parámetro SID aleatorio para que AceStream no se lie
        const sid = Math.floor(Math.random() * 1000);
        const streamUrl = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${idAce}&output=m3u8&sid=${sid}`;
        
        setTimeout(() => {
            v.src = streamUrl;
            v.style.display = "block";
            ov.style.display = "none";
            v.muted = true;
            v.play().then(() => {
                actualizarAudio();
            }).catch(err => {
                console.log("Esperando datos...");
            });
        }, 400);
        
        document.getElementById('selector-modal').style.display = "none";
    }

    function actualizarAudio() {
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        if (document.activeElement.id === 'slot1') {
            v1.muted = false; v2.muted = true;
            document.getElementById('slot1').classList.add('audio-on');
            document.getElementById('slot2').classList.remove('audio-on');
        } else {
            v1.muted = true; v2.muted = false;
            document.getElementById('slot1').classList.remove('audio-on');
            document.getElementById('slot2').classList.add('audio-on');
        }
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('selector-modal');
        if (modal.style.display === "flex") {
            const items = Array.from(document.querySelectorAll('.event-item'));
            let idx = items.findIndex(i => i.classList.contains('focus'));
            if(e.key === 'ArrowDown') { items[idx].classList.remove('focus'); idx = (idx + 1) % items.length; items[idx].classList.add('focus'); }
            else if(e.key === 'ArrowUp') { items[idx].classList.remove('focus'); idx = (idx - 1 + items.length) % items.length; items[idx].classList.add('focus'); }
            else if(e.key === 'Enter') items[idx].click();
            else if(e.key === 'Backspace' || e.keyCode === 461) modal.style.display = "none";
            e.preventDefault();
        } else {
            if(e.key === 'ArrowRight') { document.getElementById('slot2').focus(); actualizarAudio(); }
            else if(e.key === 'ArrowLeft') { document.getElementById('slot1').focus(); actualizarAudio(); }
            else if(e.key === 'Enter') abrirMenu(document.activeElement.id === 'slot1' ? 1 : 2);
            else if(e.key === 'Backspace' || e.keyCode === 461) window.location.href = 'index.html';
        }
    });

    cargarDatos();
</script>
</body>
</html>
