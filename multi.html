<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO PiP FINAL</title>
    <style>
        :root { --main: #00cc6a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; width: 100vw; background: #000; overflow: hidden; font-family: sans-serif; }

        /* FONDO COMPLETO */
        .slot-main {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; border: 5px solid transparent;
        }
        .slot-main:focus { border-color: var(--main); outline: none; }

        /* CUADRO FLOTANTE */
        .slot-pip {
            position: absolute; bottom: 50px; right: 50px; 
            width: 400px; height: 225px; /* Proporción 16:9 */
            z-index: 10; border: 3px solid #444; 
            background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .slot-pip:focus { border-color: var(--main); outline: none; transform: scale(1.05); }

        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        
        .overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; background: rgba(0,0,0,0.5); z-index: 5; text-align: center;
        }

        #selector-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.96); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal-content { width: 85%; max-width: 450px; background: #fff; padding: 20px; border-radius: 20px; color: #000; }
        .event-item { padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; font-weight: bold; text-align: center; text-transform: uppercase; }
        .event-item.focus { background: var(--main); color: #fff; }
    </style>
</head>
<body>

    <div id="slot1" class="slot-main" tabindex="1">
        <div class="overlay" id="ov1"><h2>PRINCIPAL</h2><p>PULSA OK</p></div>
        <video id="video1" autoplay muted playsinline></video>
    </div>

    <div id="slot2" class="slot-pip" tabindex="2">
        <div class="overlay" id="ov2"><h3>PiP</h3><p>PULSA OK</p></div>
        <video id="video2" autoplay muted playsinline></video>
    </div>

    <div id="selector-modal">
        <div class="modal-content"><h2 style="text-align:center;margin-bottom:10px;">ELIGE CANAL</h2><div id="event-list"></div></div>
    </div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let todosLosEventos = [];
    let ladoSeleccionando = 1;

    async function cargarDatos() {
        const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
        const text = await r.text();
        const b64 = text.trim().replace(/["\s]/g, '');
        todosLosEventos = JSON.parse(decodeURIComponent(escape(window.atob(b64))));
    }

    function abrirMenu(lado) {
        ladoSeleccionando = lado;
        const divLista = document.getElementById('event-list');
        divLista.innerHTML = "";
        todosLosEventos.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = "event-item" + (i === 0 ? " focus" : "");
            el.innerText = `${item.hora} - ${item.e1} (${item.canal})`;
            el.onclick = () => {
                const idAce = item.link.replace('acestream://', '').trim();
                const v = document.getElementById(`video${ladoSeleccionando}`);
                const ov = document.getElementById(`ov${ladoSeleccionando}`);
                
                v.src = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${idAce}&output=m3u8&sid=x_${ladoSeleccionando}`;
                v.play().then(() => { 
                    ov.style.display = "none"; 
                    actualizarAudio();
                });
                document.getElementById('selector-modal').style.display = "none";
            };
            divLista.appendChild(el);
        });
        document.getElementById('selector-modal').style.display = "flex";
    }

    function actualizarAudio() {
        const v1 = document.getElementById('video1');
        const v2 = document.getElementById('video2');
        if (document.activeElement.id === 'slot1') { v1.muted = false; v2.muted = true; } 
        else { v1.muted = true; v2.muted = false; }
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('selector-modal');
        if (modal.style.display === "flex") {
            const items = Array.from(document.querySelectorAll('.event-item'));
            let idx = items.findIndex(i => i.classList.contains('focus'));
            if(e.key === 'ArrowDown') { items[idx].classList.remove('focus'); idx = (idx + 1) % items.length; items[idx].classList.add('focus'); }
            else if(e.key === 'ArrowUp') { items[idx].classList.remove('focus'); idx = (idx - 1 + items.length) % items.length; items[idx].classList.add('focus'); }
            else if(e.key === 'Enter') items[idx].click();
            else if(e.key === 'Backspace' || e.keyCode === 461) modal.style.display = "none";
            e.preventDefault();
        } else {
            if(e.key === 'ArrowRight' || e.key === 'ArrowDown') { document.getElementById('slot2').focus(); actualizarAudio(); }
            if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') { document.getElementById('slot1').focus(); actualizarAudio(); }
            if(e.key === 'Enter') abrirMenu(document.activeElement.id === 'slot1' ? 1 : 2);
            if(e.key === 'Backspace' || e.keyCode === 461) window.location.href = 'index.html';
        }
    });

    document.getElementById('slot1').focus();
    cargarDatos();
</script>
</body>
</html>
