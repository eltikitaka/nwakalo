<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO DUAL - FIX EDITION</title>
    <style>
        :root { --main: #00cc6a; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; width: 100vw; background: #000; display: flex; overflow: hidden; font-family: sans-serif; }

        .player-box {
            flex: 1; height: 100%; border: 2px solid #333;
            position: relative; background: #000;
        }
        .player-box:focus { border-color: var(--main); outline: none; }
        
        /* EL REPRODUCTOR REAL */
        video { width: 100%; height: 100%; object-fit: contain; display: none; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;
            color: #fff; z-index: 5; text-align: center;
        }

        /* MODAL */
        #selector-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { width: 80%; background: #fff; padding: 20px; border-radius: 20px; color: #000; }
        .event-item { padding: 12px; margin: 5px 0; border: 1px solid #eee; border-radius: 10px; font-weight: bold; text-align: center; }
        .event-item.focus { background: var(--main); color: #fff; }
    </style>
</head>
<body>

    <div id="slot1" class="player-box focus" tabindex="1">
        <div class="overlay" id="ov1">PANTALLA 1<br>PULSA OK</div>
        <video id="video1" controls autoplay></video>
    </div>

    <div id="slot2" class="player-box" tabindex="2">
        <div class="overlay" id="ov2">PANTALLA 2<br>PULSA OK</div>
        <video id="video2" controls autoplay></video>
    </div>

    <div id="selector-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom:15px; text-align:center;"></h2>
            <div id="event-list"></div>
        </div>
    </div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let todosLosEventos = [];
    let partidosUnicos = [];
    let ladoSeleccionando = 1;
    let menuNivel = "partidos";

    function b64DecodeUnicode(str) {
        try { return decodeURIComponent(Array.prototype.map.call(window.atob(str), function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join('')); } 
        catch(e) { return decodeURIComponent(escape(window.atob(str))); }
    }

    async function cargarDatos() {
        const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
        const text = await r.text();
        const b64 = text.trim().replace(/["\s]/g, '');
        todosLosEventos = JSON.parse(b64DecodeUnicode(b64));
        let procesados = [];
        todosLosEventos.forEach(ev => {
            let id = ev.e1 + ev.hora;
            if(!procesados.includes(id)){
                ev.linksDelPartido = todosLosEventos.filter(x => (x.e1 + x.hora) === id);
                partidosUnicos.push(ev);
                procesados.push(id);
            }
        });
    }

    function abrirMenu(lado) {
        ladoSeleccionando = lado;
        menuNivel = "partidos";
        renderizar(partidosUnicos);
        document.getElementById('selector-modal').style.display = "flex";
    }

    function renderizar(lista) {
        const divLista = document.getElementById('event-list');
        divLista.innerHTML = "";
        lista.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = "event-item" + (i === 0 ? " focus" : "");
            el.innerText = menuNivel === "partidos" ? item.e1 : (item.canal || "Canal");
            el.onclick = () => {
                if(menuNivel === "partidos") {
                    menuNivel = "canales";
                    renderizar(item.linksDelPartido);
                } else {
                    lanzarVideo(item.link);
                }
            };
            divLista.appendChild(el);
        });
    }

    function lanzarVideo(acelink) {
        const id = acelink.replace('acestream://', '').trim();
        const v = document.getElementById(`video${ladoSeleccionando}`);
        const ov = document.getElementById(`ov${ladoSeleccionando}`);
        
        // Probamos con el stream directo del motor
        v.src = `http://127.0.0.1:6878/ace/getstream?id=${id}&format=hls`;
        v.style.display = "block";
        ov.style.display = "none";
        v.play();
        
        document.getElementById('selector-modal').style.display = "none";
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('selector-modal');
        if (modal.style.display === "flex") {
            const items = Array.from(document.querySelectorAll('.event-item'));
            let idx = items.findIndex(i => i.classList.contains('focus'));
            items[idx].classList.remove('focus');
            if(e.key === 'ArrowDown') idx = (idx + 1) % items.length;
            if(e.key === 'ArrowUp') idx = (idx - 1 + items.length) % items.length;
            if(e.key === 'Enter') items[idx].click();
            if(e.key === 'Backspace' || e.keyCode === 461) modal.style.display = "none";
            items[idx].classList.add('focus');
            e.preventDefault();
        } else {
            if(e.key === 'ArrowRight') document.getElementById('slot2').focus();
            if(e.key === 'ArrowLeft') document.getElementById('slot1').focus();
            if(e.key === 'Enter') abrirMenu(document.activeElement.id === 'slot1' ? 1 : 2);
            if(e.key === 'Backspace' || e.keyCode === 461) window.location.href = 'index.html';
        }
    });

    cargarDatos();
</script>
</body>
</html>
