<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO DUAL - COMPATIBILITY MODE</title>
    <style>
        :root { --main: #00cc6a; --bg: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; width: 100vw; background: #000; display: flex; overflow: hidden; font-family: sans-serif; }

        .player-box {
            flex: 1; height: 100%; border: 4px solid #333;
            position: relative; background: #111;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; color: #fff;
        }
        .player-box:focus { border-color: var(--main); outline: none; background: #222; }
        
        .status-tag { 
            margin-top: 10px; padding: 5px 15px; background: var(--main); 
            border-radius: 5px; font-weight: bold; font-size: 12px; display: none;
        }

        /* MODAL */
        #selector-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { width: 85%; max-width: 500px; background: #fff; padding: 25px; border-radius: 25px; color: #000; }
        .event-item { padding: 15px; margin: 8px 0; border: 1px solid #eee; border-radius: 12px; font-weight: 800; text-align: center; text-transform: uppercase; }
        .event-item.focus { background: var(--main); color: #fff; }

        h2 { font-size: 18px; color: var(--main); margin-bottom: 5px; }
        p { font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="slot1" class="player-box focus" tabindex="1">
        <h2>PANTALLA 1</h2>
        <p id="p1-name">VACÍO</p>
        <div id="tag1" class="status-tag">CARGANDO...</div>
        <p style="position:absolute; bottom:20px; font-size:10px;">PULSA OK PARA ELEGIR</p>
    </div>

    <div id="slot2" class="player-box" tabindex="2">
        <h2>PANTALLA 2</h2>
        <p id="p2-name">VACÍO</p>
        <div id="tag2" class="status-tag">CARGANDO...</div>
        <p style="position:absolute; bottom:20px; font-size:10px;">PULSA OK PARA ELEGIR</p>
    </div>

    <div id="selector-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color:#000; margin-bottom:20px; text-align:center;"></h2>
            <div id="event-list"></div>
        </div>
    </div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let todosLosEventos = [];
    let partidosUnicos = [];
    let ladoSeleccionando = 1;
    let menuNivel = "partidos";

    function b64DecodeUnicode(str) {
        try { return decodeURIComponent(Array.prototype.map.call(window.atob(str), function(c) { return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2); }).join('')); } 
        catch(e) { return decodeURIComponent(escape(window.atob(str))); }
    }

    async function cargarDatos() {
        const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
        const text = await r.text();
        const b64 = text.trim().replace(/["\s]/g, '');
        todosLosEventos = JSON.parse(b64DecodeUnicode(b64));
        let procesados = [];
        todosLosEventos.forEach(ev => {
            let id = ev.e1 + ev.hora;
            if(!procesados.includes(id)){
                ev.linksDelPartido = todosLosEventos.filter(x => (x.e1 + x.hora) === id);
                partidosUnicos.push(ev);
                procesados.push(id);
            }
        });
    }

    function abrirMenu(lado) {
        ladoSeleccionando = lado;
        menuNivel = "partidos";
        renderizar(partidosUnicos);
        document.getElementById('selector-modal').style.display = "flex";
    }

    function renderizar(lista) {
        const divLista = document.getElementById('event-list');
        divLista.innerHTML = "";
        lista.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = "event-item" + (i === 0 ? " focus" : "");
            el.innerText = menuNivel === "partidos" ? item.e1 : (item.canal || "Canal");
            el.onclick = () => {
                if(menuNivel === "partidos") {
                    menuNivel = "canales";
                    renderizar(item.linksDelPartido);
                } else {
                    lanzarVideo(item);
                }
            };
            divLista.appendChild(el);
        });
    }

    function lanzarVideo(canal) {
        const idAce = canal.link.replace('acestream://', '').trim();
        document.getElementById(`p${ladoSeleccionando}-name`).innerText = canal.e1;
        document.getElementById(`tag${ladoSeleccionando}`).style.display = "block";
        
        // --- LA SOLUCIÓN FINAL ---
        // En lugar de un iframe o video, usamos una redirección invisible 
        // que el motor de AceStream captura sin cerrar tu web.
        const intentUrl = `acestream://?content_id=${idAce}&transport_type=hls&multi=true`;
        
        const launcher = document.createElement('iframe');
        launcher.style.display = 'none';
        launcher.src = intentUrl;
        document.body.appendChild(launcher);

        setTimeout(() => { document.body.removeChild(launcher); }, 2000);
        document.getElementById('selector-modal').style.display = "none";
    }

    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('selector-modal');
        if (modal.style.display === "flex") {
            const items = Array.from(document.querySelectorAll('.event-item'));
            let idx = items.findIndex(i => i.classList.contains('focus'));
            items[idx].classList.remove('focus');
            if(e.key === 'ArrowDown') idx = (idx + 1) % items.length;
            if(e.key === 'ArrowUp') idx = (idx - 1 + items.length) % items.length;
            if(e.key === 'Enter') items[idx].click();
            if(e.key === 'Backspace' || e.keyCode === 461) modal.style.display = "none";
            items[idx].classList.add('focus');
            e.preventDefault();
        } else {
            if(e.key === 'ArrowRight') document.getElementById('slot2').focus();
            if(e.key === 'ArrowLeft') document.getElementById('slot1').focus();
            if(e.key === 'Enter') abrirMenu(document.activeElement.id === 'slot1' ? 1 : 2);
            if(e.key === 'Backspace' || e.keyCode === 461) window.location.href = 'index.html';
        }
    });

    cargarDatos();
</script>
</body>
</html>
