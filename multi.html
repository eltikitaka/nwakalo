<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO ULTRA LIGHT</title>
    <style>
        :root { --main: #00cc6a; }
        body { height: 100vh; width: 100vw; display: flex; margin: 0; background: #000; font-family: sans-serif; }
        .slot { flex: 1; border: 2px solid #222; position: relative; }
        .slot:focus { border: 5px solid var(--main); outline: none; }
        video { width: 100%; height: 100%; background: #000; }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .item { padding: 15px; margin: 5px; border: 1px solid #ddd; border-radius: 10px; width: 80%; text-align: center; color: #000; font-weight: bold; }
        .item.focus { background: var(--main); color: #fff; }
    </style>
</head>
<body>

    <div id="s1" class="slot" tabindex="1"><video id="v1" autoplay muted></video></div>
    <div id="s2" class="slot" tabindex="2"><video id="v2" autoplay muted></video></div>

    <div id="modal"><div id="list" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div></div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let eventos = [];
    let lado = 1;

    async function carga() {
        const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
        const t = await r.text();
        const b = t.trim().replace(/["\s]/g, '');
        eventos = JSON.parse(decodeURIComponent(escape(window.atob(b))));
    }

    function menu(l) {
        lado = l;
        const div = document.getElementById('list');
        div.innerHTML = "<h2 style='color:#000'>CANAL " + l + "</h2>";
        eventos.forEach((ev, i) => {
            const d = document.createElement('div');
            d.className = "item" + (i===0?" focus":"");
            d.innerText = ev.e1 + " (" + ev.canal + ")";
            d.onclick = () => play(ev.link);
            div.appendChild(d);
        });
        document.getElementById('modal').style.display = "flex";
    }

    function play(link) {
        const id = link.replace('acestream://', '').trim();
        const vid = document.getElementById('v' + lado);
        
        // LIMPIEZA TOTAL ANTES DE CARGAR
        vid.pause();
        vid.removeAttribute('src');
        vid.load();
        
        // USAMOS UN SID MUY CORTO Y FORZAMOS HLS SIN TRANSCODE
        vid.src = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${id}&sid=l${lado}_${Math.floor(Math.random()*9)}&transcode=0`;
        
        vid.play().then(() => audio());
        document.getElementById('modal').style.display = "none";
    }

    function audio() {
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        if (document.activeElement.id === 's1') { v1.muted = false; v2.muted = true; }
        else { v1.muted = true; v2.muted = false; }
    }

    document.addEventListener('keydown', (e) => {
        const m = document.getElementById('modal');
        if (m.style.display === "flex") {
            const its = Array.from(document.querySelectorAll('.item'));
            let i = its.findIndex(x => x.classList.contains('focus'));
            if(e.key === 'ArrowDown') { its[i].classList.remove('focus'); i = (i+1)%its.length; its[i].classList.add('focus'); }
            else if(e.key === 'ArrowUp') { its[i].classList.remove('focus'); i = (i-1+its.length)%its.length; its[i].classList.add('focus'); }
            else if(e.key === 'Enter') its[i].click();
            else if(e.key === 'Backspace' || e.keyCode === 461) m.style.display = "none";
        } else {
            if(e.key === 'ArrowRight') { document.getElementById('s2').focus(); audio(); }
            else if(e.key === 'ArrowLeft') { document.getElementById('s1').focus(); audio(); }
            else if(e.key === 'Enter') menu(document.activeElement.id === 's1' ? 1 : 2);
            else if(e.key === 'Backspace' || e.keyCode === 461) window.location.href = 'index.html';
        }
    });

    document.getElementById('s1').focus();
    carga();
</script>
</body>
</html>
