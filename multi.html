<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NWAKALO FINAL FIX</title>
    <style>
        :root { --main: #00cc6a; }
        body { height: 100vh; width: 100vw; display: flex; margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        .slot { flex: 1; border: 2px solid #222; position: relative; height: 100vh; background: #000; }
        .slot:focus { border: 6px solid var(--main); outline: none; }
        video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        
        #modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: none; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999; 
        }
        #list { width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .item { 
            padding: 18px; border-radius: 12px; text-align: center; 
            color: #fff; border: 2px solid #444; font-size: 1.3rem; 
            background: #111; cursor: pointer;
        }
        .item.focus { background: var(--main); border-color: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="s1" class="slot" tabindex="1"><video id="v1" autoplay muted playsinline></video></div>
    <div id="s2" class="slot" tabindex="2"><video id="v2" autoplay muted playsinline></video></div>

    <div id="modal">
        <h1 id="m-tit" style="color:var(--main); margin-bottom:20px;">ELIGE CANAL</h1>
        <div id="list"></div>
    </div>

<script>
    const REPO = 'https://raw.githubusercontent.com/eltikitaka/nwakalo/main/';
    let eventos = [];
    let ladoActivo = 1;

    async function carga() {
        try {
            const r = await fetch(REPO + 'eventos.json?v=' + Date.now());
            const t = await r.text();
            const b = t.trim().replace(/["\s]/g, '');
            eventos = JSON.parse(decodeURIComponent(escape(window.atob(b))));
        } catch(e) { console.error("Error carga"); }
    }

    function abrirMenu(n) {
        ladoActivo = n;
        const div = document.getElementById('list');
        div.innerHTML = "";
        document.getElementById('m-tit').innerText = "CANAL LADO " + (n==1?"IZQUIERDO":"DERECHO");
        
        eventos.forEach((ev, i) => {
            const d = document.createElement('div');
            d.className = "item" + (i === 0 ? " focus" : "");
            d.innerText = ev.e1 + " (" + ev.canal + ")";
            // Guardamos el link en un atributo del elemento
            d.setAttribute('data-link', ev.link); 
            div.appendChild(d);
        });
        document.getElementById('modal').style.display = "flex";
    }

    function playCanal(link) {
        const id = link.replace('acestream://', '').trim();
        const vid = document.getElementById('v' + ladoActivo);
        
        vid.pause();
        vid.src = "";
        vid.load();

        setTimeout(() => {
            // URL limpia para la Xiaomi
            vid.src = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${id}&sid=dual_${ladoActivo}_${Math.floor(Math.random()*999)}&transcode=0`;
            vid.play().then(() => {
                document.getElementById('modal').style.display = "none";
                gestionarAudio();
            });
        }, 300);
    }

    function gestionarAudio() {
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        if (document.activeElement.id === 's1') { v1.muted = false; v2.muted = true; }
        else { v1.muted = true; v2.muted = false; }
    }

    document.addEventListener('keydown', (e) => {
        const m = document.getElementById('modal');
        if (m.style.display === "flex") {
            const its = Array.from(document.querySelectorAll('.item'));
            let i = its.findIndex(x => x.classList.contains('focus'));
            
            if(e.key === 'ArrowDown') { its[i].classList.remove('focus'); i = (i+1)%its.length; its[i].classList.add('focus'); }
            else if(e.key === 'ArrowUp') { its[i].classList.remove('focus'); i = (i-1+its.length)%its.length; its[i].classList.add('focus'); }
            else if(e.key === 'Enter') {
                const link = its[i].getAttribute('data-link');
                playCanal(link);
            }
            else if(e.key === 'Backspace' || e.keyCode === 461) m.style.display = "none";
            e.preventDefault();
        } else {
            if(e.key === 'ArrowRight') { document.getElementById('s2').focus(); gestionarAudio(); }
            else if(e.key === 'ArrowLeft') { document.getElementById('s1').focus(); gestionarAudio(); }
            else if(e.key === 'Enter') abrirMenu(document.activeElement.id === 's1' ? 1 : 2);
            else if(e.key === 'Backspace' || e.keyCode === 461) window.location.href = 'index.html';
        }
    });

    document.getElementById('s1').focus();
    carga();
</script>
</body>
</html>
