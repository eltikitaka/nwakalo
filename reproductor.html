<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Deportivo Pro</title>
    <script src="https://acestream.net"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* Menú de Eventos */
        #menu-eventos { 
            height: 70px; background: rgba(0,0,0,0.8); display: flex; 
            align-items: center; padding: 0 15px; gap: 10px; 
            overflow-x: auto; border-bottom: 1px solid #333;
        }
        .btn-evento { 
            background: #222; color: #fff; border: 1px solid #444; padding: 8px 12px; 
            border-radius: 4px; cursor: pointer; white-space: nowrap; font-size: 12px;
            min-width: 160px; text-align: left; transition: 0.2s;
        }
        .btn-evento:hover { background: #cc0000; }
        .btn-evento span { display: block; font-size: 9px; color: #999; text-transform: uppercase; }

        /* Contenedor Video */
        #player-container { width: 100%; height: calc(100vh - 110px); display: flex; align-items: center; justify-content: center; background: #000; }

        /* TICKER ESPN (Transparente y Rápido) */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: rgba(204, 0, 0, 0.6); /* Rojo ESPN Transparente */
            backdrop-filter: blur(5px); /* Efecto cristal */
            overflow: hidden; line-height: 40px; 
            font-weight: bold; border-top: 1px solid rgba(255,255,255,0.2); z-index: 999;
        }
        .ticker-move {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: marquee 25s linear infinite; /* 25s es más rápido */
            font-size: 15px; text-transform: uppercase;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="menu-eventos">Cargando eventos...</div>

    <div id="player-container">
        <p style="text-align: center; color: #666;">📺 Selecciona un canal para conectar.</p>
    </div>

    <div class="ticker-wrap">
        <div class="ticker-move" id="ticker">⚽ CARGANDO MARCADORES ESPN: LALIGA, PREMIER, SERIE A, NBA, ACB...</div>
    </div>

    <script>
        // 1. CARGAR REPRODUCTOR
        function cargarCanal(id) {
            document.getElementById("player-container").innerHTML = "<p>Conectando...</p>";
            if (typeof AceStream !== 'undefined') {
                AceStream.createPlayer("#player-container", {
                    onLoad: function (player) { player.loadContentId(id); },
                    onError: function() { document.getElementById("player-container").innerHTML = "<p style='color:red'>Error: Abre AceStream.</p>"; }
                });
            } else {
                document.getElementById("player-container").innerHTML = "<p>ID: <b>" + id + "</b></p>";
            }
        }

        // 2. TICKER MULTI-LIGA BASADO EN ESPN
        async function fetchESPN(url, label) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                return data.events.map(e => `${label}: ${e.shortName} (${e.status.type.detail})`).join(" | ");
            } catch (e) { return ""; }
        }

        async function actualizarTicker() {
            const endpoints = [
                { url: 'https://espn.com', label: 'LALIGA' },
                { url: 'https://espn.com', label: 'LALIGA 2' },
                { url: 'https://espn.com', label: 'PREMIER' },
                { url: 'https://espn.com', label: 'SERIE A' },
                { url: 'https://espn.com', label: 'UCL' },
                { url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard', label: 'NBA' },
                { url: 'https://espn.com', label: 'EUROLEAGUE' },
                { url: 'https://espn.com', label: 'ACB' }
            ];

            let todosLosResultados = [];
            for (const league of endpoints) {
                const res = await fetchESPN(league.url, league.label);
                if (res) todosLosResultados.push(res);
            }

            const textoFinal = todosLosResultados.join(" | ") || "ESPERANDO RESULTADOS EN DIRECTO...";
            document.getElementById("ticker").innerText = textoFinal + " | " + textoFinal;
        }

        // 3. LEER TU EVENTOS.JSON (Base64)
        fetch('./eventos.json')
            .then(res => res.text())
            .then(base64 => {
                const data = JSON.parse(atob(base64.trim()));
                const menu = document.getElementById("menu-eventos");
                menu.innerHTML = ""; 
                data.forEach(ev => {
                    let btn = document.createElement("button");
                    btn.className = "btn-evento";
                    btn.innerHTML = `<span>${ev.hora} - ${ev.canal}</span> ${ev.e1} vs ${ev.e2}`;
                    btn.onclick = () => cargarCanal(ev.link);
                    menu.appendChild(btn);
                });
            });

        actualizarTicker();
        setInterval(actualizarTicker, 60000); // Actualiza cada minuto
    </script>
</body>
</html>
