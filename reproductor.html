<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Deportivo Real-Time</title>
    <script src="https://acestream.net"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #111; font-family: sans-serif; color: white; overflow: hidden; }
        #menu-eventos { 
            height: 75px; background: #000; display: flex; 
            align-items: center; padding: 0 15px; gap: 10px; 
            overflow-x: auto; border-bottom: 2px solid #333;
        }
        .btn-evento { 
            background: #222; color: #fff; border: 1px solid #444; padding: 10px 15px; 
            border-radius: 5px; cursor: pointer; white-space: nowrap; font-size: 13px;
            min-width: 180px; text-align: left;
        }
        .btn-evento:hover { background: #cc0000; border-color: #ff0000; }
        .btn-evento span { display: block; font-size: 10px; color: #aaa; text-transform: uppercase; }
        #player-container { width: 100%; height: calc(100vh - 115px); display: flex; align-items: center; justify-content: center; background: #000; }
        
        /* Ticker Rojo ESPN */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: #cc0000; overflow: hidden; line-height: 40px; 
            font-weight: bold; border-top: 1px solid #fff; z-index: 999;
        }
        .ticker-move {
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: marquee 50s linear infinite; font-size: 15px;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="menu-eventos">Cargando eventos...</div>

    <div id="player-container">
        <p style="text-align: center; color: #888;">📺 Selecciona un evento arriba para conectar.</p>
    </div>

    <div class="ticker-wrap">
        <div class="ticker-move" id="ticker">⚽ ACTUALIZANDO MARCADORES EN VIVO... ESPERE UN MOMENTO...</div>
    </div>

    <script>
        // 1. CARGAR REPRODUCTOR
        function cargarCanal(id) {
            document.getElementById("player-container").innerHTML = "<p>Conectando...</p>";
            if (typeof AceStream !== 'undefined') {
                AceStream.createPlayer("#player-container", {
                    onLoad: function (player) { player.loadContentId(id); },
                    onError: function() { document.getElementById("player-container").innerHTML = "<p style='color:red'>Error: Abre AceStream en tu PC.</p>"; }
                });
            } else {
                document.getElementById("player-container").innerHTML = "<p>ID: <b>" + id + "</b> (Instala AceStream para ver)</p>";
            }
        }

        // 2. TICKER AUTOMÁTICO DE PARTIDOS EN DIRECTO
        async function actualizarMarcadores() {
            try {
                // Usamos un lector de RSS gratuito para obtener marcadores mundiales en vivo
                const response = await fetch('https://rss2json.com');
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const marcadores = data.items.map(item => " 🔴 " + item.title.toUpperCase()).join(" | ");
                    document.getElementById("ticker").innerText = marcadores + " | " + marcadores;
                } else {
                    document.getElementById("ticker").innerText = "⚽ LALIGA, PREMIER, NBA Y MÁS EN DIRECTO | RECUERDA TENER ACESTREAM ABIERTO";
                }
            } catch (e) {
                document.getElementById("ticker").innerText = "⚽ SIGUE LOS RESULTADOS EN VIVO AQUÍ | CARGANDO PRÓXIMOS EVENTOS...";
            }
        }

        // 3. LEER TU EVENTOS.JSON (Base64)
        fetch('./eventos.json')
            .then(res => res.text())
            .then(base64 => {
                const data = JSON.parse(atob(base64.trim()));
                const menu = document.getElementById("menu-eventos");
                menu.innerHTML = ""; 
                data.forEach(ev => {
                    let btn = document.createElement("button");
                    btn.className = "btn-evento";
                    btn.innerHTML = `<span>${ev.hora} - ${ev.canal}</span> ${ev.e1} vs ${ev.e2}`;
                    btn.onclick = () => cargarCanal(ev.link);
                    menu.appendChild(btn);
                });
            });

        // Iniciar marcadores y actualizar cada 5 minutos
        actualizarMarcadores();
        setInterval(actualizarMarcadores, 300000); 
    </script>
</body>
</html>
