<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Eventos AceStream</title>
    <script src="https://acestream.net"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; overflow: hidden; }
        
        /* Menú superior con los eventos del JSON */
        #menu-eventos { 
            height: 70px; background: #000; display: flex; 
            align-items: center; padding: 0 15px; gap: 10px; 
            overflow-x: auto; border-bottom: 2px solid #333;
        }
        
        .btn-evento { 
            background: #222; color: #fff; border: 1px solid #444; padding: 10px 15px; 
            border-radius: 5px; cursor: pointer; white-space: nowrap; font-size: 13px;
            transition: 0.3s;
        }
        .btn-evento:hover { background: #cc0000; border-color: #ff0000; }
        .btn-evento span { display: block; font-size: 10px; color: #aaa; }

        /* Contenedor del reproductor */
        #player-container { width: 100%; height: calc(100vh - 110px); display: flex; align-items: center; justify-content: center; background: #000; }

        /* Ticker estilo ESPN abajo */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: #cc0000; overflow: hidden; line-height: 40px; 
            font-weight: bold; border-top: 1px solid #fff;
        }
        .ticker-move {
            display: inline-block; white-space: nowrap; padding-right: 100%;
            animation: marquee 40s linear infinite;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="menu-eventos">Cargando eventos de hoy...</div>

    <div id="player-container">
        <p style="text-align: center;">Selecciona un evento arriba para comenzar la reproducción.<br><small>Recuerda tener AceStream Engine abierto.</small></p>
    </div>

    <div class="ticker-wrap">
        <div class="ticker-move" id="ticker">⚽ ACTUALIZANDO NOTICIAS DEPORTIVAS... ESPERA UN MOMENTO...</div>
    </div>

    <script>
        let acePlayer = null;

        // Función para cargar el canal en el reproductor
        function cargarCanal(id) {
            document.getElementById("player-container").innerHTML = ""; // Limpiar pantalla
            AceStream.createPlayer("#player-container", {
                onLoad: function (player) {
                    acePlayer = player;
                    player.loadContentId(id);
                },
                onError: function(err) {
                    alert("Error: Asegúrate de tener AceStream abierto en tu PC/Android.");
                }
            });
        }

        // Leer tu archivo eventos.json
        fetch('eventos.json')
            .then(response => response.json())
            .then(data => {
                const menu = document.getElementById("menu-eventos");
                menu.innerHTML = ""; 
                
                data.forEach(evento => {
                    let btn = document.createElement("button");
                    btn.className = "btn-evento";
                    // Usamos los campos de tu JSON: hora, e1, e2 y canal
                    btn.innerHTML = `<span>${evento.hora} - ${evento.canal}</span> ${evento.e1} vs ${evento.e2}`;
                    btn.onclick = () => cargarCanal(evento.link); // El ID es el campo "link"
                    menu.appendChild(btn);
                });
            })
            .catch(err => {
                document.getElementById("menu-eventos").innerText = "No se pudo cargar eventos.json";
            });

        // Ticker de noticias (obteniendo datos de Marca/Deportes)
        async function updateTicker() {
            try {
                const res = await fetch('https://rss2json.com');
                const data = await res.json();
                const texto = data.items.map(i => " 🔥 " + i.title.toUpperCase()).join(" | ");
                document.getElementById("ticker").innerText = texto + " | " + texto;
            } catch (e) {
                document.getElementById("ticker").innerText = "Sigue los mejores eventos deportivos en directo.";
            }
        }
        updateTicker();
    </script>
</body>
</html>
